      claims as each proceeding represents potential indemnification obligation and defense cost
  rap_class: agent
  rap_subcategory: agent.disclosure_conduct
  evaluation:
    mechanism: trend
  presentation:
    do_context:
      TRIGGERED_RED: '{company} Legal Proceedings Change (YoY) at {value} (threshold: >2 net new legal proceedings added)
        signals elevated Litigation History / Settlement Patterns risk (F1, F4). Changes in legal proceedings disclosure signal evolving litigation exposure. Newly disclosed or escalated legal proceedings create the disclosure timeline that plaintiffs use to establish class period boundaries.'
      TRIGGERED_YELLOW: '{company} Legal Proceedings Change (YoY) at {value} (threshold: 1-2 net new legal proceedings) is
        in the caution zone for Litigation History / Settlement Patterns (F1, F4). Monitor for deterioration — trend direction
        and peer comparison inform the D&O risk assessment.'
