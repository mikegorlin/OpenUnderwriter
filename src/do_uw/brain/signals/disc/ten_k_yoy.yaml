    confidence: designed
    last_validated:
    source_url:
    source_date:
    source_author: v6.0
    added_by:
    data_source: SEC_10K
    threshold_provenance:
      source: d_and_o_claims_analysis
      rationale: Material weakness disclosure is among the strongest SCA triggers — companies disclosing new MW face 
        6.2x baseline SCA filing rate within 12 months. Critical for D&O pricing.
    render_target: ten_k_yoy
    formula: material_weakness_change == APPEARED
  display:
    value_format: text
    source_type: SEC_10K
    threshold_context: Whether a material weakness in internal controls appeared or was remediated YoY
  group: ten_k_yoy
  signal_class: evaluative
  field_path: yoy_material_weakness_appeared
  depends_on: []
  schema_version: 3
  epistemology:
    rule_origin: 'SOX Section 302/404 internal controls requirements: material weakness disclosure is among the strongest
      SCA triggers in SCAC data'
    threshold_basis: Material weakness disclosure is among the strongest SCA triggers — companies disclosing new MW face
      6.2x baseline SCA filing rate within 12 months. Critical for D&O pricing.
  rap_class: agent
  rap_subcategory: agent.disclosure_conduct
  evaluation:
    mechanism: trend
  presentation:
    do_context:
      TRIGGERED_RED: '{company} triggered Material Weakness Change (F1, F6) — this agent risk (executive/director actions
        and decisions that create D&O exposure) indicates Litigation History / Settlement Patterns. Evidence: {evidence}.'
      TRIGGERED_YELLOW: '{company} shows moderate signal on Material Weakness Change (F1, F6) at {value} — review recommended
        for Litigation History / Settlement Patterns implications.'
      CLEAR: '{company} clear on Material Weakness Change (F1, F6) — no Litigation History / Settlement Patterns concern identified
        at this level.'
