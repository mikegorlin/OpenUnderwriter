# Domain: disc/ten_k_yoy.yaml  |  Count: 6
# 10-K year-over-year disclosure change signals for D&O underwriting.
# Evaluates risk factor evolution, material weakness emergence,
# disclosure changes, and legal proceedings delta across consecutive filings.
- id: DISC.YOY.new_risk_factors
  name: New Risk Factors (YoY)
  work_type: evaluate
  layer: signal
  factors:
  - F1
  - F10
  peril_ids: []
  chain_roles: {}
  unlinked: false
  acquisition_tier: L1
  required_data:
  - SEC_10K
  data_locations:
    SEC_10K:
    - item_1a_risk_factors
  threshold:
    type: tiered
    red: '>5 new risk factors added year-over-year'
    yellow: 2-5 new risk factors added
    clear: 0-1 new risk factors
  claims_correlation: 0.6
  tier: 2
  depth: 3
  plaintiff_lenses:
  - SHAREHOLDERS
  v6_subsection_ids:
  - '1.4'
  data_strategy:
    field_key: yoy_new_risk_count
    primary_source: SEC_10K
  worksheet_section: company_profile
  display_when: has_data
  provenance:
    origin: v6_disc
    confidence: designed
    last_validated:
    source_url:
    source_date:
    source_author: v6.0
    added_by:
    data_source: SEC_10K
    threshold_provenance:
      source: d_and_o_claims_analysis
      rationale: Companies adding multiple new risk factors signal emerging threats management has identified — 
        plaintiff attorneys use risk factor additions to establish scienter (company knew of risk but allegedly failed 
        to disclose impact)
    render_target: ten_k_yoy
    formula: count(risk_factor_changes[change_type=NEW])
  display:
    value_format: count
    source_type: SEC_10K
    threshold_context: Count of entirely new risk factors appearing in latest 10-K vs prior year
  group: ten_k_yoy
  signal_class: evaluative
  field_path: yoy_new_risk_count
  depends_on: []
  schema_version: 3
  epistemology:
    rule_origin: 'SEC Regulation S-K Item 1A disclosure requirements + plaintiff scienter theory: additions to risk factors
      used to establish ''company knew'' in SCA complaints'
    threshold_basis: Companies adding multiple new risk factors signal emerging threats management has identified — 
      plaintiff attorneys use risk factor additions to establish scienter (company knew of risk but allegedly failed to 
      disclose impact)
  rap_class: agent
  rap_subcategory: agent.disclosure_conduct
  evaluation:
    mechanism: trend
  presentation:
    do_context:
      TRIGGERED_RED: '{company} New Risk Factors (YoY) at {value} (threshold: >5 new risk factors added year-over-year) signals
        elevated Litigation History / Settlement Patterns risk (F1, F10). New risk factors in the annual filing signal management has identified emerging threats. If these risks subsequently materialize, plaintiffs allege the risk factor disclosure was inadequate relative to what management actually knew.'
      TRIGGERED_YELLOW: '{company} New Risk Factors (YoY) at {value} (threshold: 2-5 new risk factors added) is in the caution
        zone for Litigation History / Settlement Patterns (F1, F10). Monitor for deterioration — trend direction and peer
        comparison inform the D&O risk assessment.'
      CLEAR: '{company} New Risk Factors (YoY) at {value} is within acceptable range for Litigation History / Settlement Patterns
        (F1, F10) — this level is a protective factor in D&O risk assessment, reducing claim probability.'
