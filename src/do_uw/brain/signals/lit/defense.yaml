      fields:
      - contingent_liabilities_total
    context_templates:
      TRIGGERED: 'Litigation exposure: ${value}M in contingent liabilities'
      CLEAR: Contingent liabilities below material threshold
    do_context:
      TRIGGERED_RED: '{company} Contingent Liabilities Disclosure (ASC 450) at {value} (threshold: >$100M contingent liabilities)
        signals elevated Litigation History / Settlement Patterns risk (F1). ASC 450 contingent liability disclosure is among
        the most judgment-dependent accounting areas. Inadequate loss contingency reserves are a common restatement trigger
        and a frequent SCA allegation basis. Defense cost and coverage thresholds from Advisen D&O loss data and D&O program
        benchmarking.'
      TRIGGERED_YELLOW: '{company} Contingent Liabilities Disclosure (ASC 450) at {value} (threshold: $10M-$100M contingent
        liabilities) is in the caution zone for Litigation History / Settlement Patterns (F1). Monitor for deterioration —
        trend direction and peer comparison inform the D&O risk assessment.'
