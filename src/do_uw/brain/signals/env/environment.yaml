- id: ENVR.macro_sensitivity
  name: Macroeconomic Sensitivity
  work_type: evaluate
  layer: signal
  factors:
  - F1
  peril_ids: []
  chain_roles: {}
  unlinked: false
  acquisition_tier: L1
  required_data:
  - SEC_10K
  data_locations:
    SEC_10K:
    - item_1a_risk_factors
    - item_7a_market_risk
  threshold:
    type: tiered
    red: Sensitive to 3+ macro dimensions (rates, currency, commodity, inflation, recession, tariff)
    yellow: Sensitive to 1-2 macro dimensions
    clear: Minimal macroeconomic sensitivity
  claims_correlation: 0.55
  tier: 2
  depth: 3
  plaintiff_lenses:
  - SHAREHOLDERS
  v6_subsection_ids:
  - '1.5'
  data_strategy:
    field_key: macro_sensitivity_score
    primary_source: SEC_10K
  worksheet_section: company_profile
  display_when: has_data
  provenance:
    origin: v6_envr
    confidence: designed
    last_validated:
    source_url:
    source_date:
    source_author: v6.0
    added_by:
    data_source: SEC_10K
    threshold_provenance:
      source: d_and_o_claims_analysis
      rationale: Multi-dimensional macro sensitivity amplifies D&O risk during economic downturns through stock price 
        declines, covenant breaches, and going concern issues
    render_target: external_environment
    formula: count_macro_dimensions(interest_rate, currency, commodity, inflation, recession, tariff)
  display:
    value_format: count
    source_type: SEC_10K
    threshold_context: Count of macro dimensions with material exposure (interest rate, currency, commodity, inflation, 
      recession, tariff)
  group: external_environment
  signal_class: evaluative
  field_path: macro_sensitivity_score
  depends_on: []
  schema_version: 3
  acquisition:
    sources:
    - type: SEC_10K
      fields:
      - llm.interest_rate_risk
      - llm.currency_risk
      - extracted.risk_factors[category=FINANCIAL]
  evaluation:
    formula: macro_sensitivity_score
    thresholds:
    - op: '>='
      value: 3
      label: RED
    - op: '>='
      value: 1
      label: YELLOW
    mechanism: threshold
  presentation:
    detail_levels:
    - level: glance
      template: '{value} macro dimensions'
    - level: standard
      template: '{value} macroeconomic sensitivity dimensions identified'
    - level: deep
      fields:
      - macro_sensitivity_score
      - macro_sensitivity_details
    context_templates:
      TRIGGERED: 'Multi-dimensional macro exposure: {value} sensitivity dimensions (economic downturn amplifier)'
      CLEAR: Minimal macroeconomic sensitivity
    do_context:
      TRIGGERED_RED: '{company} Macroeconomic Sensitivity at {value} (threshold: Sensitive to 3+ macro dimensions (rates,
        currency, commodity, inflation, recession, tariff)) signals elevated Litigation History / Settlement Patterns risk
        (F1). Elevated macroeconomic sensitivity means external economic shocks disproportionately impact this company. When macro events trigger stock declines, plaintiffs allege management failed to disclose the sensitivity.'
      TRIGGERED_YELLOW: '{company} Macroeconomic Sensitivity at {value} (threshold: Sensitive to 1-2 macro dimensions) is
        in the caution zone for Litigation History / Settlement Patterns (F1). Monitor for deterioration — trend direction
        and peer comparison inform the D&O risk assessment.'
      CLEAR: '{company} Macroeconomic Sensitivity at {value} is within acceptable range for Litigation History / Settlement
        Patterns (F1) — this level is a protective factor in D&O risk assessment, reducing claim probability.'
  epistemology:
    rule_origin: 'D&O claims analysis: multi-dimensional macro sensitivity amplifies D&O risk during economic downturns through
      stock price volatility'
    threshold_basis: Multi-dimensional macro sensitivity amplifies D&O risk during economic downturns through stock 
      price declines, covenant breaches, and going concern issues
  rap_class: host
  rap_subcategory: host.environment_exposure
