    formula: ''
  display:
    value_format: numeric_2dp
    source_type: SEC_10K
    threshold_context: ''
  group: audit_profile
  signal_class: evaluative
  field_path: xbrl_material_weakness_flag
  depends_on: []
  schema_version: 4
  epistemology:
    rule_origin: 'SOX Section 302/906 certification requirements and PCAOB Auditing Standard No. 5: material weaknesses in
      internal control over financial reporting (ICFR) are the strongest predictor of future restatement. Rice & Weber (2012)
      found material weakness disclosure increases restatement probability by 3.4x. Virtually every restatement-driven SCA
      cites pre-existing material weaknesses as scienter evidence.'
    threshold_basis: 'RED: Any material weakness = management has certified financials under SOX while knowing controls are
      deficient. YELLOW: Significant deficiencies are precursors — 22% escalate to material weaknesses within 2 years per
      Doyle et al. (2007).'
  rap_class: agent
  rap_subcategory: agent.financial_conduct
  evaluation:
    mechanism: threshold
  presentation:
    do_context:
      TRIGGERED_RED: '{company} disclosed {value} material weakness(es) in internal controls over financial reporting (F3).
        Material weaknesses are cited in virtually every restatement-driven SCA as evidence that management was reckless in
        certifying financial statements under SOX 302/906. Research shows material weakness disclosure increases restatement
        probability by 3.4x. Evaluate the specific control deficiency: revenue recognition weaknesses carry the highest SCA
        risk, followed by asset valuation and expense timing controls.'
      TRIGGERED_YELLOW: '{company} disclosed significant deficiencies in internal controls (F3). While not yet material weaknesses,
        22% of significant deficiencies escalate within 2 years. Monitor remediation progress — failure to remediate is itself
        a scienter indicator in subsequent litigation.'
      CLEAR: '{company} reports effective internal controls with no material weaknesses or significant deficiencies (F3) —
        this is a protective factor indicating robust financial reporting infrastructure.'
