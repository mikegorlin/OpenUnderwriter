# field_key prefix: forensic_ (avoids collision per Pitfall 5).
- id: FIN.FORENSIC.goodwill_impairment_risk
  name: Goodwill Impairment Risk
  work_type: evaluate
  layer: signal
  factors:
  - F3
  peril_ids: []
  chain_roles: {}
  unlinked: false
  acquisition_tier: L1
  required_data:
  - SEC_10K
  data_locations:
    SEC_10K:
    - item_8_financials
  data_strategy:
    field_key: xbrl_goodwill_to_assets
    primary_source: SEC_10K
  threshold:
    type: tiered
    red: '> 0.40'
    yellow: '> 0.25'
    clear: <= 0.25
  tier: 1
  depth: 3
  plaintiff_lenses:
  - SHAREHOLDERS
  v6_subsection_ids:
  - '3.4'
  worksheet_section: management
  display_when: has_data
  provenance:
    origin: v3.1_xbrl_forensic
    confidence: HIGH
    source_author: system
    added_by: Phase70
    data_source: XBRL
    threshold_provenance:
      source: standard
      rationale: ''
    render_target: forensic_dashboard
    formula: ''
  display:
    value_format: pct_1dp
    source_type: SEC_10K
    threshold_context: Goodwill exceeds 40% of total assets — significant impairment
      risk
  group: forensic_dashboard
  signal_class: evaluative
  field_path: xbrl_goodwill_to_assets
  depends_on:
  - signal: BASE.FORENSIC.balance_sheet
    field: xbrl_goodwill_to_assets
  schema_version: 3
  epistemology:
    rule_origin: 'Financial analysis: quantitative financial metrics as D&O risk indicators
      from accounting research and claims data'
    threshold_basis: 'Thresholds (RED: > 0.40; YELLOW: > 0.25) from D&O underwriting
      practice and claims experience'
  rap_class: agent
  rap_subcategory: agent.financial_conduct
  evaluation:
    mechanism: threshold
  presentation:
    do_context:
      TRIGGERED_RED: '{company} Goodwill Impairment Risk at {value} (threshold: >
        0.40) signals elevated Financial Irregularities / Restatement Risk risk (F3).
        Annual ASC 350 impairment testing creates a recurring disclosure risk event.
        When goodwill is subsequently written down, plaintiffs allege management knew
        acquisitions were overvalued, triggering Section 10(b) claims with strong
        scienter evidence. Thresholds (RED: > 0.40; YELLOW: > 0.25) from D&O underwriting
        practice and claims experience.'
      TRIGGERED_YELLOW: '{company} Goodwill Impairment Risk at {value} (threshold:
        > 0.25) is in the caution zone for Financial Irregularities / Restatement
        Risk (F3). Monitor for deterioration — trend direction and peer comparison
        inform the D&O risk assessment.'
      CLEAR: '{company} Goodwill Impairment Risk at {value} is within acceptable range
        for Financial Irregularities / Restatement Risk (F3) — this level is a protective
        factor in D&O risk assessment, reducing claim probability.'
  execution_mode: AUTO
