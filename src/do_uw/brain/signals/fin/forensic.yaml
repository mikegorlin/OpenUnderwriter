    rule_origin: 'Forensic accounting research (Dechow et al. 2011, Beneish 1999): disproportionate Q4 revenue concentration
      is one of the strongest predictors of subsequent restatement. Companies with >40% Q4 concentration are 2.8x more likely
      to face restatement-related SCAs. The pattern suggests management is accelerating revenue recognition to meet annual
      targets.'
