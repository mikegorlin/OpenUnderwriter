    do_context:
      TRIGGERED_RED: '{company} Q4 revenue represents {value}% of annual revenue (threshold: >40%), a strong revenue stuffing
        indicator (F3, F5). Disproportionate Q4 concentration is a classic revenue pull-forward pattern — when subsequent
        quarters disappoint, plaintiffs allege management accelerated recognition to meet annual targets. Investigate whether
        the concentration reflects legitimate seasonality (retail, enterprise software year-end deals) or potential channel
        stuffing, bill-and-hold, or premature recognition.'
      TRIGGERED_YELLOW: '{company} Q4 revenue represents {value}% of annual revenue (threshold: >35%), indicating elevated
        quarter-end loading (F3, F5). While some industries have natural Q4 skew, this level warrants investigation into whether
