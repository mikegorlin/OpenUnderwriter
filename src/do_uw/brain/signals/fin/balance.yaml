- id: FIN.LIQ.cash_burn
  execution_mode: AUTO
  name: Cash Burn Analysis
  work_type: evaluate
  layer: signal
  factors:
  - F3
  peril_ids: []
  chain_roles:
    distress_to_bankruptcy: trigger
  unlinked: false
  acquisition_tier: L1
  required_data:
  - SEC_10Q
  - SEC_10K
  data_locations:
    SEC_10Q:
    - cash_flow_statement
    - balance_sheet
    SEC_10K:
    - going_concern
  threshold:
    type: tiered
    red: Runway <12 months with no clear funding path
    yellow: Runway 12-18 months
    clear: Runway >18 months or company is cash flow positive
  tier: 1
  depth: 2
  plaintiff_lenses:
  - CREDITORS
  - SHAREHOLDERS
  v6_subsection_ids:
  - '3.1'
  extraction_hints:
    field_patterns:
    - us-gaap:CashAndCashEquivalentsAtCarryingValue
    - us-gaap:NetCashProvidedByUsedInOperatingActivities
    expected_type: numeric
    no_data_sentinel: Cash balance or operating cash flow missing from XBRL
    validation_rule: months > 0 when OCF is negative
  data_strategy:
    field_key: xbrl_cash_burn_months
    primary_source: SEC_10K
  worksheet_section: management
  display_when: has_data
  provenance:
    origin: migrated_from_json
    confidence: inherited
    last_validated: null
    source_url: null
    source_date: null
    source_author: null
    added_by: null
    data_source: SEC_10K
    threshold_provenance:
      source: standard
      rationale: ''
    render_target: key_metrics
    formula: ''
  display:
    value_format: currency
    source_type: SEC_10K
    threshold_context: ''
  schema_version: 3
  acquisition:
    sources:
    - type: SEC_10Q
      fields:
      - extracted.financials.earnings_quality
      fallback_to: SEC_10K
    - type: SEC_10K
      fields:
      - extracted.financials.earnings_quality
  evaluation:
    formula: cash_burn_months
    thresholds:
    - op: <
      value: 12
      label: RED
    - op: <
      value: 18
      label: YELLOW
    clear_conditions:
    - type: qualitative_value
      pattern: Profitable
      result: CLEAR
    window_years: 1
    mechanism: threshold
  presentation:
    detail_levels:
    - level: glance
      template: 'Cash runway: {value}'
    - level: standard
      template: Cash burn ({cash_burn_months} months) — {status_label}
    context_templates:
      TRIGGERED: 'Cash runway concern: {value} months remaining'
      CLEAR: Company is cash flow positive
    do_context:
      TRIGGERED_RED: '{company} Cash Burn Analysis at {value} (threshold: Runway <12 months with no clear funding path) signals
        elevated Financial Irregularities / Restatement Risk risk (F3). Cash runway below 12 months without clear funding
        forces going-concern disclosure -- the disclosure event itself becomes the corrective disclosure in SCA complaints,
        with plaintiffs alleging management concealed the cash crisis. Cash position thresholds based on operating expense
        coverage (months of runway) from financial distress research.'
      TRIGGERED_YELLOW: '{company} Cash Burn Analysis at {value} (threshold: Runway 12-18 months) is in the caution zone for
        Financial Irregularities / Restatement Risk (F3). Monitor for deterioration — trend direction and peer comparison
        inform the D&O risk assessment.'
      CLEAR: '{company} Cash Burn Analysis at {value} is within acceptable range for Financial Irregularities / Restatement
        Risk (F3) — this level is a protective factor in D&O risk assessment, reducing claim probability.'
  group: key_metrics
  signal_class: evaluative
  field_path: xbrl_cash_burn_months
  depends_on: []
  epistemology:
    rule_origin: 'Financial distress research: cash position and burn rate as indicators of runway and liquidity risk'
    threshold_basis: Cash position thresholds based on operating expense coverage (months of runway) from financial distress
      research
  rap_class: host
  rap_subcategory: host.financials
