- id: FIN.LIQ.position
  name: Liquidity Position
  work_type: evaluate
  layer: signal
  factors:
  - F3
  peril_ids: []
  chain_roles:
    distress_to_bankruptcy: amplifier
  unlinked: false
  acquisition_tier: L1
  required_data:
  - SEC_10Q
  data_locations:
    SEC_10Q:
    - balance_sheet
  threshold:
    type: tiered
    red: <1.0 current ratio (inadequate liquidity)
    yellow: <1.5 current ratio (tight liquidity)
    clear: Current ratio at or above 1.5
  tier: 1
  depth: 2
  plaintiff_lenses:
  - CREDITORS
  - SHAREHOLDERS
  v6_subsection_ids:
  - '3.1'
  extraction_hints:
    field_patterns:
    - us-gaap:AssetsCurrent
    - us-gaap:LiabilitiesCurrent
    expected_type: numeric
    no_data_sentinel: XBRL facts missing for current assets or current liabilities
    validation_rule: ratio > 0
  data_strategy:
    field_key: xbrl_current_ratio
    primary_source: SEC_10K
  worksheet_section: management
  display_when: has_data
  provenance:
    origin: migrated_from_json
    confidence: inherited
    last_validated: null
    source_url: null
    source_date: null
    source_author: null
    added_by: null
    data_source: SEC_10Q
    threshold_provenance:
      source: standard
      rationale: ''
    render_target: key_metrics
    formula: ''
  display:
    value_format: numeric_2dp
    source_type: SEC_10Q
    threshold_context: ''
  schema_version: 3
  acquisition:
    sources:
    - type: SEC_10Q
      fields:
      - extracted.financials.liquidity
      fallback_to: SEC_10K
    - type: SEC_10K
      fields:
      - extracted.financials.liquidity
  evaluation:
    formula: current_ratio
    thresholds:
    - op: <
      value: 1.0
      label: RED
    - op: <
      value: 1.5
      label: YELLOW
    window_years: 1
    mechanism: threshold
  presentation:
    detail_levels:
    - level: glance
      template: 'Current ratio: {value}'
    - level: standard
      template: Liquidity ({current_ratio}x) — {status_label}
    - level: deep
      fields:
      - current_ratio
      - quick_ratio
      - cash_ratio
    context_templates:
      TRIGGERED: 'Liquidity concern: current ratio {value} is below {threshold}'
      CLEAR: Adequate liquidity with current ratio of {value}
    do_context:
      TRIGGERED_RED: '{company} Liquidity Position at {value} (threshold: <1.0 current ratio (inadequate liquidity)) signals
        elevated Financial Irregularities / Restatement Risk risk (F3). Liquidity deterioration at this level triggers covenant
        monitoring and increases probability of going-concern qualification -- the single strongest SCA catalyst, present
        in 78% of distressed-company securities class actions.'
      TRIGGERED_YELLOW: '{company} Liquidity Position at {value} (threshold: <1.5 current ratio (tight liquidity)) is in the
        caution zone for Financial Irregularities / Restatement Risk (F3). Monitor for deterioration — trend direction and
        peer comparison inform the D&O risk assessment.'
      CLEAR: '{company} Liquidity Position at {value} is within acceptable range for Financial Irregularities / Restatement
        Risk (F3) — this level is a protective factor in D&O risk assessment, reducing claim probability.'
  group: key_metrics
  signal_class: evaluative
  field_path: xbrl_current_ratio
  depends_on: []
  epistemology:
    rule_origin: 'Financial analysis: balance sheet metrics as indicators of financial health and solvency risk'
    threshold_basis: 'Thresholds (RED: <1.0 current ratio (inadequate liquidity); YELLOW: <1.5 current ratio (tight liquidity))
      from D&O underwriting practice and claims experience'
  rap_class: host
  rap_subcategory: host.financials
