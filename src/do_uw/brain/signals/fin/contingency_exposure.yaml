    primary_source: SEC_10K
  worksheet_section: management
  display_when: has_data
  provenance:
    origin: phase_111_xbrl_signals
    confidence: HIGH
    last_validated:
    source_url:
    source_date:
    source_author:
    added_by:
    data_source: XBRL
    threshold_provenance:
      source: standard
      rationale: Warranty accrual >2% of revenue signals product quality concerns that may escalate to recalls, regulatory action, or class action litigation
    render_target: key_metrics
    formula: product_warranty_accrual / revenue
  display:
    value_format: percent
    source_type: SEC_10K
    threshold_context: ''
  group: key_metrics
  signal_class: evaluative
  field_path: xbrl_warranty_reserve_pct
  depends_on: []
  schema_version: 4
  epistemology:
    rule_origin: 'Product liability and D&O nexus: elevated warranty reserves indicate known product quality issues that can escalate to recalls, regulatory investigations, and securities claims when investors allege management concealed defect severity'
    threshold_basis: 'Warranty accrual >2% of revenue: elevated product quality concern based on consumer products sector median; >5%: significant quality issue indicating potential recall or regulatory exposure'
  rap_class: host
  rap_subcategory: host.financials
  evaluation:
    mechanism: threshold
  presentation:
    do_context:
      TRIGGERED_RED: '{company} product warranty reserve at {value} of revenue (threshold: >5%) signals significant product quality concern (F6). Elevated warranty reserves often precede product recalls and CPSC/FDA enforcement actions — when the underlying defect is revealed to be more widespread than disclosed, the resulting stock decline and consumer class actions create both direct and D&O liability exposure.'
      TRIGGERED_YELLOW: '{company} product warranty reserve at {value} of revenue (threshold: >2%) indicates elevated product quality risk (F6). Monitor for warranty accrual increases and product complaint trends — rising reserves are a leading indicator of potential recall or regulatory action.'
      CLEAR: '{company} product warranty reserve at {value} of revenue is within normal parameters (F6) — warranty levels do not indicate outsized product quality concerns.'
