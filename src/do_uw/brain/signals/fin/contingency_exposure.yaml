# Contingency & Legal Exposure Signals — XBRL-sourced D&O risk indicators
# Domain: fin/contingency_exposure.yaml  |  Count: 4
- id: FIN.CONT.loss_accrual
  name: Loss Contingency Accrual
  work_type: evaluate
  layer: signal
  factors:
  - F1
  - F3
  peril_ids: []
  chain_roles:
    litigation_to_sca: evidence
  unlinked: false
  acquisition_tier: L1
  required_data:
  - SEC_10K
  - SEC_10Q
  data_locations:
    SEC_10K:
    - commitments_contingencies_note
    SEC_10Q:
    - commitments_contingencies_note
  threshold:
    type: tiered
    red: Loss contingency accrual > 1% of total assets — material active legal exposure
    yellow: Loss contingency accrual > 0 — company has probable and estimable legal liabilities
    clear: No loss contingency accrual
  tier: 1
  depth: 2
  plaintiff_lenses:
  - SHAREHOLDERS
  - CREDITORS
  v6_subsection_ids:
  - '3.5'
  extraction_hints:
    field_patterns:
    - us-gaap:LossContingencyAccrualAtCarryingValue
    - us-gaap:LossContingencyAccrualProvision
    - us-gaap:LitigationReserve
    expected_type: numeric
    no_data_sentinel: Loss contingency accrual data not found in XBRL
    validation_rule: loss_accrual >= 0
  data_strategy:
    field_key: xbrl_loss_contingency_accrual
    primary_source: SEC_10K
  worksheet_section: management
  display_when: has_data
  provenance:
    origin: phase_111_xbrl_signals
    confidence: HIGH
    last_validated:
    source_url:
    source_date:
    source_author:
    added_by:
    data_source: XBRL
    threshold_provenance:
      source: standard
      rationale: Any loss contingency accrual means management has determined a loss is both probable and estimable per ASC 450; >1% of assets is material
    render_target: key_metrics
    formula: loss_contingency_accrual
  display:
    value_format: currency
    source_type: SEC_10K
    threshold_context: ''
  group: key_metrics
  signal_class: evaluative
  field_path: xbrl_loss_contingency_accrual
  depends_on: []
  schema_version: 4
  epistemology:
    rule_origin: 'ASC 450 loss contingencies: accrual means management has concluded a loss is probable and estimable — the existence of an accrual confirms active legal exposure that may expand'
    threshold_basis: 'Any accrual > 0: probable and estimable legal liability exists per ASC 450-20; >1% of assets: material exposure per SAB 99 materiality guidance'
  rap_class: host
  rap_subcategory: host.financials
  evaluation:
    mechanism: threshold
  presentation:
    do_context:
      TRIGGERED_RED: '{company} loss contingency accrual at {value} (threshold: >1% of total assets) confirms material active legal exposure (F1/F3). The accrual itself is management''s admission that loss is probable — but the accrued amount often understates ultimate exposure. When settlements exceed accruals, the resulting charge triggers SCA claims alleging management concealed the true magnitude of litigation risk.'
      TRIGGERED_YELLOW: '{company} loss contingency accrual at {value} (threshold: >$0) indicates the company has probable and estimable legal liabilities (F1/F3). Any accrual under ASC 450 means management has concluded loss is likely — monitor for accrual increases and reasonably possible additional losses disclosed in footnotes.'
      CLEAR: '{company} has no loss contingency accrual — no legal matters currently assessed as probable and estimable losses under ASC 450 (F1/F3).'

- id: FIN.CONT.loss_estimate
  name: Loss Contingency Estimate
  work_type: evaluate
  layer: signal
  factors:
  - F1
  peril_ids: []
  chain_roles:
    litigation_to_sca: amplifier
  unlinked: false
  acquisition_tier: L1
  required_data:
  - SEC_10K
  data_locations:
    SEC_10K:
    - commitments_contingencies_note
  threshold:
    type: tiered
    red: Loss contingency estimate > $500M — major litigation risk
    yellow: Loss contingency estimate > $100M — material litigation risk
    clear: Loss contingency estimate <= $100M or not disclosed
  tier: 1
  depth: 2
  plaintiff_lenses:
  - SHAREHOLDERS
  - CREDITORS
  v6_subsection_ids:
  - '3.5'
  extraction_hints:
    field_patterns:
    - us-gaap:LossContingencyEstimateOfPossibleLoss
    - us-gaap:LossContingencyRangeOfPossibleLossPortionNotAccrued
    - us-gaap:LossContingencyDamagesSoughtValue
    expected_type: numeric
    no_data_sentinel: Loss contingency estimate not found in XBRL
    validation_rule: loss_estimate >= 0
  data_strategy:
    field_key: xbrl_loss_contingency_estimate
    primary_source: SEC_10K
  worksheet_section: management
  display_when: has_data
  provenance:
    origin: phase_111_xbrl_signals
    confidence: HIGH
    last_validated:
    source_url:
    source_date:
    source_author:
    added_by:
    data_source: XBRL
    threshold_provenance:
      source: standard
      rationale: Loss contingency estimate >$100M is material for most public companies; >$500M represents major litigation risk per settlement database analysis
    render_target: key_metrics
    formula: loss_contingency_estimate
  display:
    value_format: currency
    source_type: SEC_10K
    threshold_context: ''
  group: key_metrics
  signal_class: evaluative
  field_path: xbrl_loss_contingency_estimate
  depends_on: []
  schema_version: 4
  epistemology:
    rule_origin: 'D&O claims analysis: disclosed loss contingency estimates directly quantify litigation exposure — when actual settlements exceed estimates, the gap becomes the basis for inadequate disclosure claims'
    threshold_basis: 'Loss estimate >$100M: material litigation exposure for most public companies per Cornerstone Research settlement data; >$500M: mega-litigation category with elevated D&O claim frequency'
  rap_class: host
  rap_subcategory: host.financials
  evaluation:
    mechanism: threshold
  presentation:
    do_context:
      TRIGGERED_RED: '{company} loss contingency estimate at {value} (threshold: >$500M) signals major litigation risk (F1). Mega-litigation exposure at this level often exceeds D&O policy limits and creates the kind of existential threat that drives derivative suits alongside the underlying claims — directors face both direct liability and allegations of inadequate litigation risk oversight.'
      TRIGGERED_YELLOW: '{company} loss contingency estimate at {value} (threshold: >$100M) indicates material litigation risk (F1). Disclosed estimates represent the lower bound of management''s assessment — actual exposure may exceed the stated range. Monitor for estimate revisions that signal deteriorating settlement dynamics.'
      CLEAR: '{company} loss contingency estimate at {value} is below material litigation thresholds (F1) — disclosed estimates do not indicate outsized litigation exposure.'

