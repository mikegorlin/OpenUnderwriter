# Restructuring & Impairment Signals — XBRL-sourced D&O risk indicators
# Domain: fin/restructuring.yaml  |  Count: 4
- id: FIN.RESTRUCT.charges
  name: Restructuring Charges
  work_type: evaluate
  layer: signal
  factors:
  - F6
  peril_ids: []
  chain_roles: {}
  unlinked: true
  acquisition_tier: L1
  required_data:
  - SEC_10K
  - SEC_10Q
  data_locations:
    SEC_10K:
    - income_statement
    - restructuring_note
    SEC_10Q:
    - income_statement
  threshold:
    type: tiered
    red: Restructuring charges > 2% of revenue — major restructuring program impacting operations
    yellow: Restructuring charges > 0 — active restructuring in progress
    clear: No restructuring charges
  tier: 2
  depth: 2
  plaintiff_lenses:
  - SHAREHOLDERS
  v6_subsection_ids:
  - '3.3'
  extraction_hints:
    field_patterns:
    - us-gaap:RestructuringCharges
    - us-gaap:RestructuringAndRelatedCostIncurredCost
    - us-gaap:RestructuringCostsAndAssetImpairmentCharges
    expected_type: numeric
    no_data_sentinel: Restructuring charge data not found in XBRL
    validation_rule: restructuring_charges >= 0
  data_strategy:
    field_key: xbrl_restructuring_charges
    primary_source: SEC_10K
  worksheet_section: management
  display_when: has_data
  provenance:
    origin: phase_111_xbrl_signals
    confidence: HIGH
    last_validated:
    source_url:
    source_date:
    source_author:
    added_by:
    data_source: XBRL
    threshold_provenance:
      source: standard
      rationale: Any restructuring charges indicate active organizational upheaval; >2% of revenue signals major program that may indicate fundamental business model problems
    render_target: key_metrics
    formula: restructuring_charges / revenue
  display:
    value_format: currency
    source_type: SEC_10K
    threshold_context: ''
  group: key_metrics
  signal_class: evaluative
  field_path: xbrl_restructuring_charges
  depends_on: []
  schema_version: 4
  epistemology:
    rule_origin: 'D&O claims analysis: restructuring programs often follow periods of poor performance that were inadequately disclosed — the restructuring announcement itself can be the corrective disclosure event that defines the SCA class period end'
    threshold_basis: 'Any charges > 0: active restructuring indicates business model stress; >2% of revenue: major program indicating fundamental problems per restructuring frequency analysis'
  rap_class: host
  rap_subcategory: host.financials
  evaluation:
    mechanism: threshold
  presentation:
    do_context:
      TRIGGERED_RED: '{company} restructuring charges at {value} (threshold: >2% of revenue) signals a major restructuring program (F6). Restructuring at this scale indicates fundamental business model problems — the restructuring announcement often serves as the corrective disclosure that ends a SCA class period, with plaintiffs alleging management concealed the severity of operational deterioration before the restructuring was announced.'
      TRIGGERED_YELLOW: '{company} restructuring charges at {value} (threshold: >$0) indicates active restructuring in progress (F6). Restructuring programs signal organizational stress — monitor for scope expansion, additional charges beyond initial estimates, and employee litigation arising from workforce actions.'
      CLEAR: '{company} has no restructuring charges in the current period (F6) — no evidence of active restructuring programs or organizational upheaval.'

