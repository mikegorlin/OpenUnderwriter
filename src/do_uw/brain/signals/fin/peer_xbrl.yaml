# Phase 72 — Peer-Relative XBRL Benchmarking Signals
# 6 signals evaluating company position vs SEC filer universe.
# Data source: state.benchmark.frames_percentiles (populated by frames_benchmarker).
# field_key prefix: benchmarked.frames_percentiles.{metric}
- id: FIN.PEER.revenue_bottom_quartile
  execution_mode: AUTO
  name: Revenue Bottom Quartile (Cross-Filer)
  work_type: evaluate
  layer: signal
  factors:
  - F3
  peril_ids: []
  chain_roles: {}
  unlinked: false
  acquisition_tier: L1
  required_data:
  - SEC_FRAMES
  data_locations:
    SEC_FRAMES:
    - frames_revenue
  data_strategy:
    field_key: benchmarked.frames_percentiles.revenue.overall
    primary_source: SEC_FRAMES
  threshold:
    type: tiered
    red: < 10
    yellow: < 25
    clear: '>= 25'
  tier: 2
  depth: 2
  plaintiff_lenses:
  - SHAREHOLDERS
  v6_subsection_ids:
  - '3.1'
  worksheet_section: financial
  display_when: has_data
  provenance:
    origin: v3.1_peer_benchmarking
    confidence: HIGH
    source_author: system
    added_by: Phase72
    data_source: SEC_FRAMES
    threshold_provenance:
      source: standard
      rationale: ''
    render_target: peer_matrix
    formula: ''
  display:
    value_format: percentile
    source_type: SEC_FRAMES
    threshold_context: Revenue below 25th percentile of all SEC filers — small company
      risk premium
  schema_version: 3
  evaluation:
    formula: THRESHOLD_COMPARE
    mechanism: peer_comparison
  group: peer_matrix
  signal_class: evaluative
  field_path: benchmarked.frames_percentiles.revenue.overall
  depends_on: []
  epistemology:
    rule_origin: 'Peer comparison methodology: deviation from sector median financial
      metrics indicates relative over/under-performance risk'
    threshold_basis: 'Peer deviation >1.5 standard deviations from sector median:
      statistical outlier threshold for relative risk assessment'
  rap_class: environment
  rap_subcategory: environment.peer_context
  presentation:
    do_context:
      TRIGGERED_RED: '{company} Revenue Bottom Quartile (Cross-Filer) at {value} (threshold:
        < 10) signals elevated Financial Irregularities / Restatement Risk risk (F3).
        Peer-relative revenue underperformance makes the company a statistical outlier
        -- outlier financial metrics are disproportionately represented in SCA filing
        populations, and revenue laggards face elevated analyst scrutiny. Peer deviation
        >1.5 standard deviations from sector median: statistical outlier threshold
        for relative risk assessment.'
      TRIGGERED_YELLOW: '{company} Revenue Bottom Quartile (Cross-Filer) at {value}
        (threshold: < 25) is in the caution zone for Financial Irregularities / Restatement
        Risk (F3). Monitor for deterioration — trend direction and peer comparison
        inform the D&O risk assessment.'
      CLEAR: '{company} Revenue Bottom Quartile (Cross-Filer) at {value} is within
        acceptable range for Financial Irregularities / Restatement Risk (F3) — this
        level is a protective factor in D&O risk assessment, reducing claim probability.'
