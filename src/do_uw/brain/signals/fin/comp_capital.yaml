    type: tiered
    red: Short-term debt > 40% of total debt AND days cash < 90 — acute refinancing risk with insufficient liquidity buffer
    yellow: Short-term debt > 30% of total debt — elevated near-term maturity concentration
    clear: Short-term debt <= 30% of total debt or adequate cash buffer
  tier: 2
  depth: 2
  plaintiff_lenses:
  - CREDITORS
  - SHAREHOLDERS
  v6_subsection_ids:
