# Compensation & Capital Return Signals — XBRL-sourced D&O risk indicators
# Domain: fin/comp_capital.yaml  |  Count: 5
- id: FIN.COMP.sbc_dilution
  name: Stock-Based Compensation Dilution
  work_type: evaluate
  layer: signal
  factors:
  - F6
  - F8
  peril_ids: []
  chain_roles: {}
  unlinked: true
  acquisition_tier: L1
  required_data:
  - SEC_10K
  data_locations:
    SEC_10K:
    - income_statement
    - equity_compensation_note
  threshold:
    type: tiered
    red: SBC > 20% of net income — excessive shareholder dilution
    yellow: SBC > 10% of net income — material dilution concern
    clear: SBC <= 10% of net income
  tier: 2
  depth: 2
  plaintiff_lenses:
  - SHAREHOLDERS
  v6_subsection_ids:
  - '3.4'
  extraction_hints:
    field_patterns:
    - us-gaap:ShareBasedCompensation
    - us-gaap:AllocatedShareBasedCompensationExpense
    - us-gaap:NetIncomeLoss
    expected_type: numeric
    no_data_sentinel: SBC data not found in XBRL
    validation_rule: sbc >= 0
  data_strategy:
    field_key: xbrl_sbc_dilution_pct
    primary_source: SEC_10K
  worksheet_section: management
  display_when: has_data
  provenance:
    origin: phase_111_xbrl_signals
    confidence: HIGH
    last_validated:
    source_url:
    source_date:
    source_author:
    added_by:
    data_source: XBRL
    threshold_provenance:
      source: standard
      rationale: SBC >10% of net income indicates material shareholder dilution per proxy advisory firm guidelines and shareholder activist thresholds
    render_target: key_metrics
    formula: stock_based_compensation / net_income
  display:
    value_format: percent
    source_type: SEC_10K
    threshold_context: ''
  group: key_metrics
  signal_class: evaluative
  field_path: xbrl_sbc_dilution_pct
  depends_on: []
  schema_version: 4
  epistemology:
    rule_origin: 'Shareholder dilution analysis: excessive SBC erodes per-share value and creates the governance concern that drives ''say on pay'' failures, proxy contests, and derivative suits alleging excessive executive compensation'
    threshold_basis: 'SBC >10% of net income: material dilution threshold based on ISS/Glass Lewis say-on-pay guidelines; >20%: excessive dilution triggering shareholder activist intervention'
  rap_class: agent
  rap_subcategory: agent.compensation
  evaluation:
    mechanism: threshold
  presentation:
    do_context:
      TRIGGERED_RED: '{company} stock-based compensation at {value} of net income (threshold: >20%) signals excessive shareholder dilution (F6/F8). SBC at this level erodes per-share value substantially — proxy advisory firms will flag this for ''against'' say-on-pay recommendations, creating the governance controversy that invites derivative suits and shareholder activist campaigns.'
      TRIGGERED_YELLOW: '{company} stock-based compensation at {value} of net income (threshold: >10%) indicates material dilution concern (F6/F8). Monitor for say-on-pay vote results and ISS/Glass Lewis recommendations — SBC-driven dilution is a leading indicator of shareholder governance challenges.'
      CLEAR: '{company} stock-based compensation at {value} of net income is within normal parameters (F6/F8) — compensation-related dilution does not indicate outsized governance risk.'

- id: FIN.COMP.unvested_cost
  name: Unvested SBC Pipeline
  work_type: evaluate
  layer: signal
  factors:
  - F6
  peril_ids: []
  chain_roles: {}
  unlinked: true
  acquisition_tier: L1
  required_data:
  - SEC_10K
  data_locations:
    SEC_10K:
    - equity_compensation_note
  threshold:
    type: tiered
    red: Unvested SBC cost > 5x annual SBC expense — massive future dilution pipeline
    yellow: Unvested SBC cost > 3x annual SBC expense — significant future dilution
    clear: Unvested SBC cost <= 3x annual SBC expense
  tier: 2
  depth: 2
  plaintiff_lenses:
  - SHAREHOLDERS
  v6_subsection_ids:
  - '3.4'
  extraction_hints:
    field_patterns:
    - us-gaap:EmployeeServiceShareBasedCompensationNonvestedAwardsTotalCompensationCostNotYetRecognized
    - us-gaap:ShareBasedCompensation
    expected_type: numeric
    no_data_sentinel: Unvested SBC cost data not found in XBRL
    validation_rule: unvested_cost >= 0
  data_strategy:
    field_key: xbrl_unvested_sbc_ratio
    primary_source: SEC_10K
  worksheet_section: management
  display_when: has_data
  provenance:
    origin: phase_111_xbrl_signals
    confidence: HIGH
    last_validated:
    source_url:
    source_date:
    source_author:
    added_by:
    data_source: XBRL
    threshold_provenance:
      source: standard
      rationale: Unvested SBC >3x annual expense signals growing dilution pipeline that will suppress future EPS as awards vest
    render_target: key_metrics
    formula: unvested_sbc_cost / annual_sbc_expense
  display:
    value_format: numeric_2dp
    source_type: SEC_10K
    threshold_context: ''
  group: key_metrics
  signal_class: evaluative
  field_path: xbrl_unvested_sbc_ratio
  depends_on: []
  schema_version: 4
  epistemology:
    rule_origin: 'Future dilution analysis: unvested SBC represents committed future dilution that will flow through the income statement — a growing pipeline signals accelerating dilution trajectory'
    threshold_basis: 'Unvested >3x annual expense: significant pipeline indicating SBC expense will remain elevated or grow; >5x: massive committed dilution that will materially suppress future EPS'
  rap_class: agent
  rap_subcategory: agent.compensation
  evaluation:
    mechanism: threshold
  presentation:
    do_context:
      TRIGGERED_RED: '{company} unvested SBC pipeline at {value}x annual expense (threshold: >5x) signals massive committed future dilution (F6). This level of unvested awards means SBC expense will remain elevated for years — when investors realize the full dilution impact on forward EPS, the repricing creates SCA risk, especially if management highlighted ''adjusted'' (ex-SBC) metrics.'
      TRIGGERED_YELLOW: '{company} unvested SBC pipeline at {value}x annual expense (threshold: >3x) indicates significant future dilution commitment (F6). Monitor the vesting schedule and grant activity — an expanding pipeline signals accelerating dilution that may surprise investors focused on adjusted earnings.'
      CLEAR: '{company} unvested SBC pipeline at {value}x annual expense is within normal parameters (F6) — committed dilution pipeline does not indicate outsized future EPS compression.'

- id: FIN.COMP.rsu_grants
