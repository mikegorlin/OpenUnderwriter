    - us-gaap:ShortTermBorrowings
    - us-gaap:LongTermDebt
    - us-gaap:CashAndCashEquivalentsAtCarryingValue
    expected_type: numeric
    no_data_sentinel: Debt maturity data not found in XBRL
    validation_rule: st_debt_pct between 0 and 100
  data_strategy:
    field_key: computed_refinancing_risk
    primary_source: SEC_10K
  worksheet_section: management
  display_when: has_data
  provenance:
    origin: phase_tier_a_computable
    confidence: HIGH
    last_validated:
    source_url:
    source_date:
    source_author:
    added_by: tier_a_build
    data_source: XBRL
    threshold_provenance:
      source: standard
      rationale: Short-term debt >40% with insufficient cash creates acute refinancing wall; >30% signals elevated concentration per maturity analysis
    render_target: debt_structure
    formula: short_term_debt / total_debt combined with days_cash_on_hand check
  display:
    value_format: percent
    source_type: SEC_10K
    threshold_context: ''
  group: key_metrics
  signal_class: evaluative
  field_path: computed_refinancing_risk
  depends_on: []
  schema_version: 4
  epistemology:
    rule_origin: 'Credit analysis: refinancing risk combines maturity concentration with liquidity adequacy. Companies with heavy near-term maturities AND insufficient cash face acute default risk when credit markets tighten'
    threshold_basis: 'Short-term debt >40% of total with days cash <90: acute refinancing wall per credit analysis; >30%: elevated concentration per maturity schedule analysis'
  rap_class: host
  rap_subcategory: host.financials
  evaluation:
    mechanism: threshold
  presentation:
    do_context:
      TRIGGERED_RED: '{company} short-term debt at {value} of total debt with limited cash buffer (threshold: >40% AND days cash <90) signals acute refinancing risk (F3). Concentrated near-term maturities without sufficient liquidity create a refinancing wall — inability to roll over debt triggers going-concern disclosures and potential default events that are primary SCA catalysts.'
      TRIGGERED_YELLOW: '{company} short-term debt at {value} of total debt (threshold: >30%) indicates elevated maturity concentration (F3). Monitor upcoming maturities against available liquidity and credit facility capacity — bunched maturities amplify the impact of any credit deterioration.'
      CLEAR: '{company} refinancing risk profile is manageable (F3) — well-distributed maturities with adequate liquidity buffer.'

