    - us-gaap:UnrecognizedTaxBenefitsIncomeTaxPenaltiesAccrued
    - us-gaap:UnrecognizedTaxBenefitsInterestOnIncomeTaxesAccrued
    expected_type: numeric
    no_data_sentinel: UTB penalties and interest data not found in XBRL
    validation_rule: utb_penalties >= 0
  data_strategy:
    field_key: xbrl_utb_penalties
    primary_source: SEC_10K
  worksheet_section: management
  display_when: has_data
  provenance:
    origin: phase_111_xbrl_signals
    confidence: HIGH
    last_validated:
    source_url:
    source_date:
    source_author:
    added_by:
    data_source: XBRL
    threshold_provenance:
      source: standard
      rationale: Any UTB penalties/interest accrual indicates tax authority has challenged positions; >$50M signals material active dispute
    render_target: key_metrics
    formula: utb_penalties_interest_accrued
  display:
    value_format: currency
    source_type: SEC_10K
    threshold_context: ''
  group: key_metrics
  signal_class: evaluative
  field_path: xbrl_utb_penalties
  depends_on: []
  schema_version: 4
  epistemology:
    rule_origin: 'Tax dispute indicator: accrued penalties and interest on uncertain tax positions signal active IRS/state challenges where the company acknowledges potential liability'
    threshold_basis: 'Any accrual > 0: tax authority has formally challenged positions; >$50M: material dispute likely requiring disclosure in risk factors and MD&A'
  rap_class: host
  rap_subcategory: host.financials
  evaluation:
    mechanism: threshold
  presentation:
    do_context:
      TRIGGERED_RED: '{company} UTB penalties and interest at {value} (threshold: >$50M) confirms an active, material tax dispute with penalties assessed (F3). Penalty accruals mean the tax authority has formally challenged the company''s positions — resolution may produce a material charge that management has been downplaying, creating the disclosure gap that supports scienter in SCA claims.'
      TRIGGERED_YELLOW: '{company} UTB penalties and interest at {value} (threshold: >$0) indicates tax authority has asserted penalties on uncertain positions (F3). Any penalty accrual signals the company''s tax positions are under active challenge — monitor for escalation and disclosure adequacy.'
      CLEAR: '{company} has no UTB penalties or interest accrued — no evidence of active tax authority challenges on uncertain positions (F3).'

- id: FIN.TAX.etr_deviation
  name: Effective Tax Rate Deviation
  work_type: evaluate
  layer: signal
  factors:
  - F6
  peril_ids: []
  chain_roles: {}
  unlinked: true
  acquisition_tier: L1
  required_data:
  - SEC_10K
  data_locations:
    SEC_10K:
    - income_tax_note
  threshold:
    type: tiered
    red: ETR deviates from statutory rate by > 15 percentage points — aggressive tax strategy or one-time items
    yellow: ETR deviates from statutory rate by > 10 percentage points — material rate benefit requiring explanation
    clear: ETR within 10 percentage points of statutory rate
  tier: 2
  depth: 2
  plaintiff_lenses:
  - SHAREHOLDERS
  - REGULATORS
  v6_subsection_ids:
  - '3.3'
  extraction_hints:
    field_patterns:
    - us-gaap:EffectiveIncomeTaxRateContinuingOperations
    - us-gaap:IncomeTaxExpenseBenefit
    - us-gaap:IncomeLossFromContinuingOperationsBeforeIncomeTaxesExtraordinaryItemsNoncontrollingInterest
    expected_type: numeric
    no_data_sentinel: Effective tax rate data not found in XBRL
    validation_rule: etr between -100 and 100
  data_strategy:
    field_key: xbrl_etr_deviation
    primary_source: SEC_10K
  worksheet_section: management
  display_when: has_data
  provenance:
    origin: phase_111_xbrl_signals
    confidence: HIGH
    last_validated:
    source_url:
    source_date:
    source_author:
    added_by:
    data_source: XBRL
    threshold_provenance:
      source: standard
      rationale: ETR deviation >10pp from 21% statutory rate indicates material tax benefits or aggressive positioning per SEC rate reconciliation review focus
    render_target: key_metrics
    formula: abs(effective_tax_rate - 0.21)
  display:
    value_format: percent
    source_type: SEC_10K
    threshold_context: ''
  group: key_metrics
  signal_class: evaluative
  field_path: xbrl_etr_deviation
  depends_on: []
  schema_version: 4
  epistemology:
    rule_origin: 'SEC review focus: effective tax rate reconciliation is a frequent SEC comment letter topic; material deviations from statutory rate require clear disclosure of drivers per ASC 740-10-50'
    threshold_basis: 'ETR deviation >10pp: material rate benefit threshold based on SEC comment letter patterns; >15pp: aggressive positioning likely requiring detailed rate reconciliation disclosure'
  rap_class: host
  rap_subcategory: host.financials
  evaluation:
    mechanism: threshold
  presentation:
    do_context:
      TRIGGERED_RED: '{company} effective tax rate deviation at {value} from statutory rate (threshold: >15pp) signals aggressive tax strategy or material one-time items (F6). Large ETR deviations attract SEC comment letter scrutiny and may indicate unsustainable tax benefits — when these benefits expire or are challenged, the resulting ETR normalization compresses earnings in ways that surprise investors and trigger SCA filings.'
      TRIGGERED_YELLOW: '{company} effective tax rate deviation at {value} from statutory rate (threshold: >10pp) indicates material rate benefit requiring explanation (F6). Monitor for sustainability of tax benefits and SEC comment letter inquiries — rate reconciliation is a frequent SEC review focus area.'
      CLEAR: '{company} effective tax rate at {value} is within normal range of statutory rate (F6) — no indication of aggressive tax positioning or unsustainable rate benefits.'
