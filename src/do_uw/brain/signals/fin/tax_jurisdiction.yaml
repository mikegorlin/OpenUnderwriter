# Tax Jurisdiction Signals — XBRL-sourced D&O risk indicators
# Domain: fin/tax_jurisdiction.yaml  |  Count: 5
- id: FIN.TAX.jurisdiction_mix
  name: Tax Jurisdiction Mix
  work_type: evaluate
  layer: signal
  factors:
  - F6
  peril_ids: []
  chain_roles: {}
  unlinked: true
  acquisition_tier: L1
  required_data:
  - SEC_10K
  data_locations:
    SEC_10K:
    - income_tax_note
  threshold:
    type: tiered
    red: Foreign tax > 60% of total tax provision — high transfer pricing and repatriation risk
    yellow: Foreign tax > 40% of total tax provision — elevated transfer pricing scrutiny
    clear: Foreign tax <= 40% of total tax provision
  tier: 2
  depth: 2
  plaintiff_lenses:
  - SHAREHOLDERS
  - REGULATORS
  v6_subsection_ids:
  - '3.3'
  extraction_hints:
    field_patterns:
    - us-gaap:CurrentFederalTaxExpenseBenefit
    - us-gaap:CurrentStateAndLocalTaxExpenseBenefit
    - us-gaap:CurrentForeignTaxExpenseBenefit
    - us-gaap:IncomeTaxExpenseBenefit
    expected_type: numeric
    no_data_sentinel: Tax jurisdiction breakdown not found in XBRL tax note
    validation_rule: foreign_tax_pct between 0 and 100
  data_strategy:
    field_key: xbrl_foreign_tax_pct
    primary_source: SEC_10K
  worksheet_section: management
  display_when: has_data
  provenance:
    origin: phase_111_xbrl_signals
    confidence: HIGH
    last_validated:
    source_url:
    source_date:
    source_author:
    added_by:
    data_source: XBRL
    threshold_provenance:
      source: standard
      rationale: Foreign tax concentration >40% indicates material transfer pricing exposure per IRS enforcement data and OECD BEPS guidelines
    render_target: key_metrics
    formula: foreign_tax_current / (federal_tax_current + state_tax_current + foreign_tax_current)
  display:
    value_format: percent
    source_type: SEC_10K
    threshold_context: ''
  group: key_metrics
  signal_class: evaluative
  field_path: xbrl_foreign_tax_pct
  depends_on: []
  schema_version: 4
  epistemology:
    rule_origin: 'D&O claims analysis: transfer pricing disputes and tax repatriation events trigger shareholder suits when previously undisclosed tax liabilities materialize, per OECD BEPS enforcement and IRS audit data'
    threshold_basis: 'Foreign tax >40%: elevated transfer pricing scrutiny threshold based on IRS Large Business & International audit selection criteria; >60%: high risk per OECD BEPS Action 13 country-by-country reporting triggers'
  rap_class: host
  rap_subcategory: host.financials
  evaluation:
    mechanism: threshold
  presentation:
    do_context:
      TRIGGERED_RED: '{company} foreign tax concentration at {value} (threshold: >60% of total provision) signals high transfer pricing and repatriation risk (F6). Concentrated foreign tax jurisdictions create exposure to coordinated multi-jurisdiction enforcement actions and treaty renegotiations that can produce sudden, material tax liabilities — the kind of ''surprise'' that triggers SCA filings when previously undisclosed risks materialize.'
      TRIGGERED_YELLOW: '{company} foreign tax concentration at {value} (threshold: >40% of total provision) indicates elevated transfer pricing scrutiny risk (F6). Monitor for OECD BEPS developments and IRS enforcement actions — material transfer pricing adjustments often precede earnings restatements and corrective disclosures that create SCA class periods.'
      CLEAR: '{company} foreign tax concentration at {value} is within normal parameters for transfer pricing risk (F6) — domestic-weighted tax profile reduces exposure to multi-jurisdiction enforcement surprises.'

- id: FIN.TAX.deferred_tax_gap
  name: Deferred Tax Asset Gap
  work_type: evaluate
  layer: signal
  factors:
  - F3
  peril_ids: []
  chain_roles: {}
  unlinked: true
  acquisition_tier: L1
  required_data:
  - SEC_10K
  data_locations:
    SEC_10K:
    - balance_sheet
    - income_tax_note
  threshold:
    type: tiered
    red: Deferred tax asset > 10% of total assets — valuation allowance risk and potential writedown
    yellow: Deferred tax asset > 5% of total assets — elevated realizability concern
    clear: Deferred tax asset <= 5% of total assets
  tier: 2
  depth: 2
  plaintiff_lenses:
  - SHAREHOLDERS
  v6_subsection_ids:
  - '3.1'
  extraction_hints:
    field_patterns:
    - us-gaap:DeferredTaxAssetsNet
    - us-gaap:DeferredTaxAssetsGross
    - us-gaap:DeferredTaxAssetsValuationAllowance
    - us-gaap:Assets
    expected_type: numeric
    no_data_sentinel: Deferred tax asset data not found in XBRL
    validation_rule: dta_pct >= 0
  data_strategy:
    field_key: xbrl_deferred_tax_asset_pct
    primary_source: SEC_10K
  worksheet_section: management
  display_when: has_data
  provenance:
    origin: phase_111_xbrl_signals
    confidence: HIGH
    last_validated:
    source_url:
    source_date:
    source_author:
    added_by:
    data_source: XBRL
    threshold_provenance:
      source: standard
      rationale: DTA >5% of assets signals realizability risk per ASC 740 valuation allowance assessment standards
    render_target: key_metrics
    formula: deferred_tax_assets_net / total_assets
  display:
    value_format: percent
    source_type: SEC_10K
    threshold_context: ''
  group: key_metrics
  signal_class: evaluative
  field_path: xbrl_deferred_tax_asset_pct
  depends_on: []
  schema_version: 4
  epistemology:
    rule_origin: 'ASC 740 valuation allowance assessment: large DTAs require ''more likely than not'' realizability judgment, creating disclosure risk when conditions deteriorate'
    threshold_basis: 'DTA >5% of assets: threshold where valuation allowance changes become material to earnings per SEC Staff Accounting Bulletin guidance; >10%: high risk of sudden writedown'
  rap_class: host
  rap_subcategory: host.financials
  evaluation:
    mechanism: threshold
  presentation:
    do_context:
      TRIGGERED_RED: '{company} deferred tax asset at {value} of total assets (threshold: >10%) signals material valuation allowance risk (F3). Large DTAs depend on management''s judgment about future taxable income — when that judgment proves wrong, the resulting writedown produces the kind of sudden, non-cash earnings hit that drives SCA filings, especially when management previously represented the DTA as ''fully realizable.'''
      TRIGGERED_YELLOW: '{company} deferred tax asset at {value} of total assets (threshold: >5%) indicates elevated realizability concern (F3). Monitor for changes in valuation allowance and management''s ''more likely than not'' assessment — shifts in this judgment are leading indicators of earnings surprises.'
      CLEAR: '{company} deferred tax asset at {value} of total assets is within normal parameters for valuation allowance risk (F3) — modest DTA relative to asset base limits writedown exposure.'

- id: FIN.TAX.utb_exposure
  name: Unrecognized Tax Benefit Exposure
  work_type: evaluate
  layer: signal
  factors:
  - F3
  - F6
  peril_ids: []
  chain_roles: {}
  unlinked: true
  acquisition_tier: L1
  required_data:
  - SEC_10K
  data_locations:
    SEC_10K:
    - income_tax_note
  threshold:
    type: tiered
    red: UTB > $500M or > 3% of total assets — material tax dispute exposure
    yellow: UTB > $100M or > 2% of total assets — elevated tax dispute risk
    clear: UTB <= $100M and <= 2% of total assets
  tier: 2
  depth: 2
  plaintiff_lenses:
  - SHAREHOLDERS
  - REGULATORS
  v6_subsection_ids:
  - '3.3'
  extraction_hints:
    field_patterns:
    - us-gaap:UnrecognizedTaxBenefits
    - us-gaap:UnrecognizedTaxBenefitsThatWouldImpactEffectiveTaxRate
    - us-gaap:Assets
    expected_type: numeric
    no_data_sentinel: UTB data not found in XBRL tax note
    validation_rule: utb >= 0
  data_strategy:
    field_key: xbrl_utb_exposure
    primary_source: SEC_10K
  worksheet_section: management
  display_when: has_data
  provenance:
    origin: phase_111_xbrl_signals
    confidence: HIGH
    last_validated:
    source_url:
    source_date:
    source_author:
    added_by:
    data_source: XBRL
    threshold_provenance:
      source: standard
      rationale: UTB >$500M or >2% of assets per ASC 740-10 uncertain tax position disclosure and SEC enforcement focus areas
    render_target: key_metrics
    formula: unrecognized_tax_benefits / total_assets
  display:
    value_format: currency
    source_type: SEC_10K
    threshold_context: ''
  group: key_metrics
  signal_class: evaluative
  field_path: xbrl_utb_exposure
  depends_on: []
  schema_version: 4
  epistemology:
    rule_origin: 'ASC 740-10 uncertain tax positions: UTBs represent positions where management has taken aggressive tax stances that may not survive IRS examination, creating contingent liability exposure'
    threshold_basis: 'UTB >$500M: threshold for material tax dispute based on SEC enforcement actions targeting inadequate UTB disclosure; >2% of assets: materiality threshold per SAB 99'
  rap_class: host
  rap_subcategory: host.financials
  evaluation:
    mechanism: threshold
  presentation:
    do_context:
      TRIGGERED_RED: '{company} unrecognized tax benefits at {value} (threshold: >$500M or >3% of assets) signals material tax dispute exposure (F3/F6). Large UTBs represent aggressive tax positions that may not survive examination — when the IRS prevails, the resulting tax liability and back-interest produce earnings surprises that trigger SCA filings, particularly when management understated the risk in prior disclosures.'
      TRIGGERED_YELLOW: '{company} unrecognized tax benefits at {value} (threshold: >$100M or >2% of assets) indicates elevated tax dispute risk (F3/F6). Monitor for IRS examination outcomes and UTB roll-forward changes — material settlements or increases signal evolving tax controversy exposure.'
      CLEAR: '{company} unrecognized tax benefits at {value} are within normal parameters for tax dispute risk (F3/F6) — UTB level does not indicate aggressive tax positioning.'

- id: FIN.TAX.utb_penalties
