- id: BASE.XBRL.balance_sheet
  name: XBRL Balance Sheet Data
  work_type: acquire
  tier: 0
  depth: 1
  threshold:
    type: info
  provenance:
    origin: v3.1_tier1_manifest
    confidence: HIGH
    source_author: system
    added_by: Phase70
    data_source: XBRL
    threshold_provenance:
      source: unattributed
      rationale: ''
    render_target: statement_tables
    formula: ''
  acquisition:
    sources:
    - type: SEC_10K
      fields:
      - extracted.financials.statements.balance_sheet
      fallback_to: null
  description: 'Annual balance sheet line items from XBRL filing. Includes assets, liabilities, equity, and all sub-components.
    State path: extracted.financials.statements[type=balance_sheet]

    '
  group: statement_tables
  signal_class: foundational
  field_path: ''
  depends_on: []
  schema_version: 3
  epistemology:
    rule_origin: 'Data foundation: XBRL balance sheet data extraction per SEC inline XBRL mandate (2019+)'
    threshold_basis: Binary data availability -- XBRL data either parseable from SEC filings or not; no risk threshold
  rap_class: host
  rap_subcategory: host.data_foundation
  evaluation:
    mechanism: threshold
  presentation:
    do_context:
      TRIGGERED_RED: '{company} xbrl balance sheet data at {value} represents host risk (company-level characteristics that
        attract or deter D&O claims) — this level is associated with D&O risk assessment exposure based on D&O claims experience.'
      TRIGGERED_YELLOW: '{company} xbrl balance sheet data at {value} is a moderate indicator for D&O risk assessment, warranting
        review of supporting evidence: {evidence}.'
      CLEAR: '{company} xbrl balance sheet data at {value} is within normal parameters for D&O risk assessment — no D&O concern
        at this level.'
