- id: CONJ.GOV.governance_event
  name: Weak Governance + Adverse Event
  work_type: evaluate
  layer: signal
  factors: []
  peril_ids: []
  chain_roles: {}
  unlinked: false
  tier: 1
  depth: 2
  threshold:
    type: info
    red: Weak governance indicators combined with material adverse event (restatement, enforcement, executive departure)
  provenance:
    origin: phase_110_conjunction
    confidence: HIGH
    data_source: DERIVED
    formula: Conjunction of governance weakness + adverse event signals
    threshold_provenance:
      source: calibrated
      rationale: ISS governance quality research shows 3.1x settlement multiplier when governance failures precede 
        adverse events
  signal_class: inference
  group: structural_governance
