    do_context:
      TRIGGERED_RED: '{company} weak governance + adverse event at {value} represents agent risk (executive/director actions
        and decisions that create D&O exposure) — this level is associated with D&O risk assessment exposure based on D&O
        claims experience.'
      TRIGGERED_YELLOW: '{company} weak governance + adverse event at {value} is a moderate indicator for D&O risk assessment,
        warranting review of supporting evidence: {evidence}.'
      CLEAR: '{company} weak governance + adverse event at {value} is within normal parameters for D&O risk assessment — no
        D&O concern at this level.'
