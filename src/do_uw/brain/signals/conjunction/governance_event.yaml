    rule_origin: 'ISS governance quality research and D&O claims experience: weak boards amplify adverse event severity'
    threshold_basis: 3+ of 5 conditions met triggers RED; calibrated from governance-event co-occurrence in SCAC filings
  evaluation:
    mechanism: conjunction
    conjunction_rules:
      required_signals:
      - GOV.BOARD.independence
      - GOV.BOARD.expertise
      - FIN.ACCT.restatement
      - LIT.SEC.enforcement
      - EXEC.TURN.c_suite
      minimum_matches: 3
      signal_conditions: {}
      recommendation_floor: ELEVATED
