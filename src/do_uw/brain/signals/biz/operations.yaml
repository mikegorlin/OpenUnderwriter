# Operational data signals — Phase 94 (OPS-02, OPS-03, OPS-04)
# Domain: biz/operations.yaml  |  Count: 3
- id: BIZ.OPS.subsidiary_structure
  name: Subsidiary Jurisdiction Structure
  work_type: evaluate
  layer: hazard
  factors:
  - F9
  peril_ids: []
  chain_roles: {}
  unlinked: true
  acquisition_tier: L1
  required_data:
  - SEC_10K
  data_locations:
    SEC_10K:
    - exhibit_21
    - item_1_business
  threshold:
    type: tiered
    red: '>20 jurisdictions OR >5 high-regulatory jurisdictions'
    yellow: '>10 jurisdictions OR >3 high-regulatory jurisdictions'
    clear: <=10 jurisdictions AND <=3 high-regulatory jurisdictions
  claims_correlation: 0.6
  tier: 2
  depth: 3
  plaintiff_lenses:
  - SHAREHOLDERS
  - GOVERNMENT
  v6_subsection_ids:
  - '1.3'
  - '1.9'
  data_strategy:
    field_key: subsidiary_structure
    primary_source: SEC_10K
  worksheet_section: company_profile
  display_when: has_data
  provenance:
    origin: v6_phase_94
    confidence: high
    last_validated: '2026-03-10'
    source_url:
    source_date:
    source_author:
    added_by: phase_94
    data_source: SEC_10K
    threshold_provenance:
      source: underwriting_practice
      rationale: '>20 jurisdictions creates material regulatory coordination risk; >5 high-regulatory jurisdictions amplifies
        compliance exposure'
    render_target: subsidiary_structure
    formula: jurisdiction_count + regulatory_regime_count
  display:
    value_format: text
    source_type: SEC_10K
    threshold_context: Jurisdiction count and regulatory regime complexity
  schema_version: 3
  acquisition:
    sources:
    - type: SEC_10K
      fields:
      - company.subsidiary_structure
  evaluation:
    formula: jurisdiction_count + regulatory_regime_count
    thresholds:
    - op: '>'
      value: 20.0
      label: RED
    - op: '>'
      value: 5.0
      label: RED
    - op: '>'
      value: 10.0
      label: YELLOW
    - op: '>'
      value: 3.0
      label: YELLOW
    mechanism: threshold
  presentation:
    detail_levels:
    - level: glance
      template: '{jurisdiction_count} jurisdictions'
    - level: standard
      template: '{jurisdiction_count} jurisdictions across {high_reg_count} high-regulatory regimes'
    - level: deep
      fields:
      - jurisdictions
      - high_reg_count
      - low_reg_count
      - tax_haven_count
    context_templates:
      TRIGGERED: 'Complex multi-jurisdiction structure: {jurisdiction_count} jurisdictions including {high_reg_count} high-regulatory'
      CLEAR: Jurisdictional structure within normal range
    do_context:
      TRIGGERED_RED: '{company} Subsidiary Jurisdiction Structure at {value} (threshold: >20 jurisdictions OR >5 high-regulatory
        jurisdictions) signals elevated SEC Enforcement / Regulatory Compliance risk (F9). Multi-jurisdiction subsidiary structure creates FCPA exposure and cross-border regulatory risk. Complex jurisdictional presence increases the probability of regulatory action that triggers D&O disclosure obligations.'
      TRIGGERED_YELLOW: '{company} Subsidiary Jurisdiction Structure at {value} (threshold: >10 jurisdictions OR >3 high-regulatory
        jurisdictions) is in the caution zone for SEC Enforcement / Regulatory Compliance (F9). Monitor for deterioration
        — trend direction and peer comparison inform the D&O risk assessment.'
      CLEAR: '{company} Subsidiary Jurisdiction Structure at {value} is within acceptable range for SEC Enforcement / Regulatory
        Compliance (F9) — this level is a protective factor in D&O risk assessment, reducing claim probability.'
  group: operational_complexity
  signal_class: evaluative
  field_path: subsidiary_structure
  depends_on:
  - signal: BASE.FILING.10K
    field: exhibit_21
  epistemology:
    rule_origin: 'D&O underwriting practice: operational complexity as predictor of regulatory and governance risk'
    threshold_basis: '>20 jurisdictions creates material regulatory coordination risk; >5 high-regulatory jurisdictions amplifies
      compliance exposure'
  rap_class: host
  rap_subcategory: host.structure
- id: BIZ.OPS.workforce
