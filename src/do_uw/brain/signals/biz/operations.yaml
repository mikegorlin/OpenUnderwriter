    thresholds:
    - op: '>'
      value: 60.0
      label: RED
    - op: '>'
      value: 40.0
      label: RED
    - op: '>'
      value: 40.0
      label: YELLOW
    - op: '>'
      value: 20.0
      label: YELLOW
    mechanism: threshold
  presentation:
