  rap_subcategory: host.structure
- id: BIZ.OPS.resilience
  name: Operational Resilience
  work_type: evaluate
  layer: hazard
  factors:
  - F9
  peril_ids: []
  chain_roles: {}
  unlinked: true
  acquisition_tier: L1
  required_data:
  - SEC_10K
  data_locations:
    SEC_10K:
    - item_1_business
    - item_1a_risk_factors
  threshold:
    type: tiered
    red: Geographic concentration >80 OR single facility risk
    yellow: Geographic concentration >60 OR shallow supply chain
    clear: Geographic concentration <=60 AND no single facility risk AND non-shallow supply chain
  claims_correlation: 0.4
  tier: 2
  depth: 3
  plaintiff_lenses:
  - SHAREHOLDERS
  v6_subsection_ids:
  - '1.3'
  - '1.9'
  data_strategy:
    field_key: operational_resilience
    primary_source: SEC_10K
  worksheet_section: company_profile
  display_when: has_data
  provenance:
    origin: v6_phase_94
    confidence: high
    last_validated: '2026-03-10'
    source_url:
    source_date:
    source_author:
    added_by: phase_94
    data_source: SEC_10K
    threshold_provenance:
      source: underwriting_practice
      rationale: Geographic concentration and single-facility dependency create catastrophic loss potential; shallow 
        supply chains amplify disruption risk
    render_target: operational_resilience
    formula: geographic_concentration + single_facility_risk + supply_chain_depth
  display:
    value_format: text
    source_type: SEC_10K
    threshold_context: Geographic concentration, facility risk, and supply chain depth
  schema_version: 3
  acquisition:
    sources:
    - type: SEC_10K
      fields:
      - company.operational_resilience
  evaluation:
    formula: geographic_concentration + single_facility_risk + supply_chain_depth
    thresholds:
    - op: '>'
      value: 80.0
      label: RED
    - op: ==
      value: true
      label: RED
    - op: '>'
      value: 60.0
      label: YELLOW
    - op: ==
      value: shallow
      label: YELLOW
    mechanism: threshold
  presentation:
    detail_levels:
    - level: glance
      template: 'Resilience: {overall_assessment}'
    - level: standard
      template: 'Geographic concentration: {geographic_concentration_score}, Facility risk: {single_facility_risk}, Supply
        chain: {supply_chain_depth}'
    - level: deep
      fields:
      - geographic_concentration_score
      - primary_geography
      - single_facility_risk
      - supply_chain_depth
      - supply_chain_description
      - overall_assessment
    context_templates:
      TRIGGERED: 'Operational resilience concern: {detail}'
      CLEAR: Operational resilience adequate
    do_context:
      TRIGGERED_RED: '{company} Operational Resilience at {value} (threshold: Geographic concentration >80 OR single facility
        risk) signals elevated SEC Enforcement / Regulatory Compliance risk (F9). Operational resilience weakness signals vulnerability to disruption events. When disruptions occur, inadequate resilience extends recovery time and amplifies earnings impact, increasing SCA filing probability.'
      TRIGGERED_YELLOW: '{company} Operational Resilience at {value} (threshold: Geographic concentration >60 OR shallow supply
        chain) is in the caution zone for SEC Enforcement / Regulatory Compliance (F9). Monitor for deterioration — trend
        direction and peer comparison inform the D&O risk assessment.'
      CLEAR: '{company} Operational Resilience at {value} is within acceptable range for SEC Enforcement / Regulatory Compliance
        (F9) — this level is a protective factor in D&O risk assessment, reducing claim probability.'
  group: operational_complexity
  signal_class: evaluative
  field_path: operational_resilience
  depends_on:
  - signal: BASE.FILING.10K
    field: item_1_business
  - signal: BASE.FILING.10K
    field: item_1a_risk_factors
  epistemology:
    rule_origin: 'D&O underwriting practice: operational complexity as predictor of regulatory and governance risk'
    threshold_basis: Geographic concentration and single-facility dependency create catastrophic loss potential; shallow
      supply chains amplify disruption risk
  rap_class: host
  rap_subcategory: host.structure
- id: BIZ.OPS.complexity_score
  name: Operational Complexity Score
  work_type: evaluate
  layer: signal
  factors:
  - F9
  - F10
  peril_ids: []
  chain_roles: {}
  unlinked: true
  acquisition_tier: L1
  required_data:
  - SEC_10K
  data_locations:
    SEC_10K:
    - exhibit_21
    - item_1_business
  threshold:
    type: tiered
    red: Composite score >15 (multi-dimensional operational complexity)
    yellow: Composite score >8 (moderate operational complexity)
    clear: Composite score <=8 (operational complexity within normal range)
  claims_correlation: 0.6
  tier: 2
  depth: 3
  plaintiff_lenses:
  - SHAREHOLDERS
  - GOVERNMENT
  v6_subsection_ids:
  - '1.3'
  - '1.9'
  data_strategy:
    field_key: ops_complexity_score
    primary_source: SEC_10K
  worksheet_section: company_profile
  display_when: has_data
  provenance:
    origin: v6_phase_99
    confidence: high
    last_validated: '2026-03-10'
    source_url:
    source_date:
    source_author:
    added_by: phase_99
    data_source: SEC_10K
    threshold_provenance:
      source: underwriting_practice
      rationale: Composite of jurisdiction count, regulatory regime, workforce distribution, segment complexity, and 
        special structures (VIE, dual-class) weighted to 0-20 scale
    render_target: ops_complexity_score
    formula: jurisdiction_weighted + high_reg_weighted + segment_weighted + intl_pct_weighted + vie_present + 
      dual_class_present + unionization_flag
  display:
    value_format: numeric
    source_type: SEC_10K
    threshold_context: Weighted composite of operational complexity dimensions (0-20 scale)
  schema_version: 3
  acquisition:
    sources:
    - type: SEC_10K
      fields:
      - company.subsidiary_structure
      - company.workforce_distribution
      - company.operational_resilience
    - type: STATE
      fields:
      - text_signals.vie_spe
      - governance.dual_class
  evaluation:
    formula: jurisdiction_weighted + high_reg_weighted + segment_weighted + intl_pct_weighted + vie_present + 
      dual_class_present + unionization_flag
    thresholds:
    - op: '>'
      value: 15.0
      label: RED
    - op: '>'
      value: 8.0
      label: YELLOW
    mechanism: threshold
  presentation:
    detail_levels:
    - level: glance
      template: 'Complexity: {level}'
    - level: standard
      template: '{value}/20 — {detail}'
    - level: deep
      fields:
      - jurisdiction_count
      - high_reg_count
      - segment_count
      - international_pct
      - vie_present
      - dual_class_present
      - unionized_pct
    context_templates:
      TRIGGERED: 'Elevated operational complexity: score {value}'
      CLEAR: Operational complexity within normal range
    do_context:
      TRIGGERED_RED: '{company} Operational Complexity Score at {value} (threshold: Composite score >15 (multi-dimensional
        operational complexity)) signals elevated SEC Enforcement / Regulatory Compliance risk (F9, F10). Operational complexity increases the probability of internal control failures and financial reporting errors. Complex operations create more opportunities for misstatement and make audit verification more difficult.'
      TRIGGERED_YELLOW: '{company} Operational Complexity Score at {value} (threshold: Composite score >8 (moderate operational
        complexity)) is in the caution zone for SEC Enforcement / Regulatory Compliance (F9, F10). Monitor for deterioration
        — trend direction and peer comparison inform the D&O risk assessment.'
      CLEAR: '{company} Operational Complexity Score at {value} is within acceptable range for SEC Enforcement / Regulatory
        Compliance (F9, F10) — this level is a protective factor in D&O risk assessment, reducing claim probability.'
  group: operational_complexity
  signal_class: evaluative
  field_path: ops_complexity_score
  depends_on:
  - signal: BIZ.OPS.subsidiary_structure
    field: subsidiary_structure
  - signal: BIZ.OPS.workforce
    field: workforce_distribution
  - signal: BIZ.OPS.resilience
    field: operational_resilience
  epistemology:
    rule_origin: 'D&O underwriting practice: operational complexity as predictor of regulatory and governance risk'
    threshold_basis: Composite of jurisdiction count, regulatory regime, workforce distribution, segment complexity, and
      special structures (VIE, dual-class) weighted to 0-20 scale
  rap_class: host
  rap_subcategory: host.structure
