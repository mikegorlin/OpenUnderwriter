    source_date:
    source_author:
    added_by: phase_94
    data_source: SEC_10K
    threshold_provenance:
      source: d_and_o_claims_analysis
      rationale: High international workforce concentration creates multi-jurisdiction employment law exposure; high 
        unionization creates collective action and labor dispute risk
    render_target: workforce_distribution
    formula: international_pct + unionization_pct
