- id: BIZ.MODEL.concentration_risk
  name: Revenue Concentration Risk
  work_type: evaluate
  layer: hazard
  peril_ids: []
  chain_roles: {}
  unlinked: false
  acquisition_tier: L1
  required_data:
  - SEC_10K
  data_locations:
    SEC_10K:
    - segment_information
    - item_1_business
  threshold:
    type: tiered
    red: Single segment >50% OR single customer >10% OR single geography >40%
    yellow: Single segment >40% OR single customer >5% OR single geography >30%
    clear: Diversified across segments, customers, and geographies
  tier: 2
  depth: 2
  plaintiff_lenses:
  - SHAREHOLDERS
  v6_subsection_ids:
  - '1.2'
  factors:
  - F9
  claims_correlation: 0.7
  acquisition:
    sources:
    - type: SEC_10K
      fields:
      - company.revenue_segments
      - company.customer_concentration
      - company.geographic_footprint
  evaluation:
    formula: concentration_risk_composite
    thresholds:
    - op: '>='
      value: 3
      label: RED
    - op: '>='
      value: 2
      label: YELLOW
    mechanism: threshold
  presentation:
    context_templates:
      TRIGGERED: 'Revenue concentration risk: {evidence}'
      CLEAR: Revenue well-diversified across segments, customers, and geographies
    detail_levels:
    - level: glance
      template: 'Concentration score: {value}/3'
    - level: standard
      template: Concentration risk score {value}/3 — {context}
    do_context:
      TRIGGERED_RED: '{company} Revenue Concentration Risk at {value} (threshold: Single segment >50% OR single customer >10%
        OR single geography >40%) signals elevated SEC Enforcement / Regulatory Compliance risk (F9). Revenue concentration creates binary risk -- loss of a major revenue source forces material adverse disclosure. Concentrated revenue models amplify the stock decline from any single customer or product setback. Revenue concentration is a leading indicator of stock drop claims when concentrated segment underperforms.'
      TRIGGERED_YELLOW: '{company} Revenue Concentration Risk at {value} (threshold: Single segment >40% OR single customer
        >5% OR single geography >30%) is in the caution zone for SEC Enforcement / Regulatory Compliance (F9). Monitor for
        deterioration — trend direction and peer comparison inform the D&O risk assessment.'
      CLEAR: '{company} Revenue Concentration Risk at {value} is within acceptable range for SEC Enforcement / Regulatory
        Compliance (F9) — this level is a protective factor in D&O risk assessment, reducing claim probability.'
  data_strategy:
    field_key: concentration_risk_composite
    primary_source: SEC_10K
  worksheet_section: company_profile
  display_when: always
  provenance:
    origin: v6_bmod
    confidence: designed
    last_validated:
    source_url:
    source_date:
    source_author: v6.0
    added_by:
    data_source: SEC_10K
    threshold_provenance:
      source: d_and_o_claims_analysis
      rationale: Revenue concentration is a leading indicator of stock drop claims when concentrated segment 
        underperforms
    render_target: concentration_risk
    formula: ''
  display:
    value_format: score
    source_type: SEC_10K
    threshold_context: Score 0-3 based on concentration dimensions
  group: business_model
  signal_class: evaluative
  field_path: concentration_risk_composite
  depends_on: []
  schema_version: 3
  epistemology:
    rule_origin: 'D&O claims analysis: business model characteristics as predictors of claim type and frequency'
    threshold_basis: Revenue concentration is a leading indicator of stock drop claims when concentrated segment 
      underperforms
  rap_class: host
  rap_subcategory: host.structure
