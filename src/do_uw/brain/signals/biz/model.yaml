- id: BIZ.MODEL.revenue_type
  name: Revenue Model Type
  work_type: extract
  layer: hazard
  peril_ids: []
  chain_roles: {}
  unlinked: false
  acquisition_tier: L1
  required_data:
  - SEC_10K
  data_locations:
    SEC_10K:
    - revenue_recognition_note
  threshold:
    type: classification
    values:
    - RECURRING
    - PROJECT
    - TRANSACTION
    - HYBRID
  tier: 2
  depth: 2
  plaintiff_lenses:
  - SHAREHOLDERS
  v6_subsection_ids:
  - '1.2'
  factors:
  - F1
  claims_correlation: 0.6
  acquisition:
    sources:
    - type: SEC_10K
      fields:
      - company.revenue_model_type
  evaluation:
    formula: revenue_model_type
    thresholds:
    - op: ==
      value: TRANSACTION
      label: YELLOW
    - op: ==
      value: PROJECT
      label: YELLOW
    mechanism: threshold
  presentation:
    context_templates:
      TRIGGERED: Revenue model type ({value}) carries elevated revenue recognition litigation risk
      CLEAR: Revenue model type ({value}) has standard recognition patterns
    detail_levels:
    - level: glance
      template: 'Revenue model: {value}'
    - level: standard
      template: Revenue model type ({value}) — {context}
    do_context:
      TRIGGERED_RED: '{company} Revenue Model Type at {value} signals elevated Litigation History / Settlement Patterns risk
        (F1). Revenue model type determines the applicable accounting standards and recognition timing risks. Certain models (long-term contracts, subscription, percentage-of-completion) carry inherently higher restatement risk. Transaction and project revenue models have higher revenue recognition
        risk and D&O claim correlation.'
      TRIGGERED_YELLOW: '{company} Revenue Model Type at {value} is in the caution zone for Litigation History / Settlement
        Patterns (F1). Monitor for deterioration — trend direction and peer comparison inform the D&O risk assessment.'
      CLEAR: '{company} Revenue Model Type at {value} is within acceptable range for Litigation History / Settlement Patterns
        (F1) — this level is a protective factor in D&O risk assessment, reducing claim probability.'
  data_strategy:
    field_key: revenue_model_type
    primary_source: SEC_10K
  worksheet_section: company_profile
  display_when: always
  provenance:
    origin: v6_bmod
    confidence: designed
    last_validated:
    source_url:
    source_date:
    source_author: v6.0
    added_by:
    data_source: SEC_10K
    threshold_provenance:
      source: d_and_o_claims_analysis
      rationale: Transaction and project revenue models have higher revenue recognition risk and D&O claim correlation
    render_target: revenue_model_type
    formula: ''
  display:
    value_format: category
    source_type: SEC_10K
    threshold_context: Revenue recognition risk varies by model type
  group: business_model
  signal_class: evaluative
  field_path: revenue_model_type
  depends_on: []
  schema_version: 3
  epistemology:
    rule_origin: 'D&O claims analysis: business model characteristics as predictors of claim type and frequency'
    threshold_basis: Transaction and project revenue models have higher revenue recognition risk and D&O claim 
      correlation
  rap_class: host
  rap_subcategory: host.structure
