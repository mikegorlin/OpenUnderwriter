    thresholds:
    - op: '>'
      value: 3
      label: RED
    - op: '>'
      value: 0
      label: YELLOW
    mechanism: threshold
  presentation:
    detail_levels:
    - level: glance
      template: 'Business changes: {value}'
    - level: standard
      template: 'Business transformation: {value} change(s) — {status_label}'
    - level: deep
      fields:
      - event_business_change_count
    context_templates:
      TRIGGERED: 'Business transformation: {value} material change(s) detected'
      CLEAR: Stable business model -- no major pivots
    do_context:
      TRIGGERED_RED: '{company} Business Pivots & Restructurings at {value} (threshold: >3 major changes in 3 years (high
