# Domain: biz/sector.yaml  |  Count: 4
# Phase 98: Sector risk classification signals for D&O underwriting
# Classifies company's D&O risk position within its sector using static
# reference data: hazard tier, claim patterns, regulatory overlay, peer comparison
- id: SECT.hazard_tier
  name: Sector D&O Hazard Tier
  work_type: evaluate
  layer: signal
  factors:
  - F1
  peril_ids: []
  chain_roles: {}
  unlinked: false
  acquisition_tier: L1
  required_data:
  - REFERENCE_DATA
  data_locations:
    REFERENCE_DATA:
    - brain/config/sector_hazard_tiers.yaml
  threshold:
    type: tiered
    red: Sector hazard tier is Highest (>15 SCA filings per 1,000 companies)
    yellow: Sector hazard tier is High (8-15 SCA filings per 1,000 companies)
    clear: Sector hazard tier is Moderate or Lower
  claims_correlation: 0.8
  tier: 1
  depth: 1
  plaintiff_lenses:
  - SHAREHOLDERS
  v6_subsection_ids:
  - '1.2'
  data_strategy:
    field_key: sector_hazard_tier
    primary_source: REFERENCE_DATA
  worksheet_section: company_profile
  display_when: always
  provenance:
    origin: v6_sect
    confidence: designed
    last_validated:
    source_url:
    source_date:
    source_author: v6.0
    added_by:
    data_source: REFERENCE_DATA
    threshold_provenance:
      source: sca_settlement_data
      rationale: Sector-level SCA filing rates are the strongest predictor of D&O claim frequency; hazard tier directly 
        maps to expected annual filing probability
    render_target: sector_risk
    formula: lookup_hazard_tier(gics_code, sic_code, sector_hazard_tiers.yaml)
  display:
    value_format: tier
    source_type: REFERENCE_DATA
    threshold_context: D&O hazard tier based on GICS sub-industry SCA filing rate per 1,000 companies
  group: sector_risk
  signal_class: evaluative
  field_path: sector_hazard_tier
  depends_on: []
  schema_version: 3
  acquisition:
    sources:
    - type: REFERENCE_DATA
      fields:
      - brain/config/sector_hazard_tiers.yaml
    - type: COMPANY_IDENTITY
      fields:
      - company.gics_code
      - company.identity.sic_code
  evaluation:
    formula: sector_hazard_tier
    thresholds:
    - op: ==
      value: Highest
      label: RED
    - op: ==
      value: High
      label: YELLOW
    mechanism: threshold
  presentation:
    detail_levels:
    - level: glance
      template: '{tier} Hazard'
    - level: standard
      template: 'Sector hazard tier: {tier} ({filing_rate} SCA filings per 1,000 companies)'
    - level: deep
      fields:
      - sector_hazard_tier
      - sector_hazard_tier_details
    context_templates:
      TRIGGERED: 'Sector D&O hazard: {tier} -- {context}'
      CLEAR: 'Sector hazard tier: {tier} (below-average D&O filing rate)'
    do_context:
      TRIGGERED_RED: '{company} Sector D&O Hazard Tier at {value} (threshold: Sector hazard tier is Highest (>15 SCA filings
        per 1,000 companies)) signals elevated Litigation History / Settlement Patterns risk (F1). This host risk (company-level
        characteristics that attract or deter D&O claims) has historically correlated with increased D&O claim frequency and
        severity.'
      TRIGGERED_YELLOW: '{company} Sector D&O Hazard Tier at {value} (threshold: Sector hazard tier is High (8-15 SCA filings
        per 1,000 companies)) is in the caution zone for Litigation History / Settlement Patterns (F1). Monitor for deterioration
        — trend direction and peer comparison inform the D&O risk assessment.'
      CLEAR: '{company} Sector D&O Hazard Tier at {value} is within acceptable range for Litigation History / Settlement Patterns
        (F1) — this level is a protective factor in D&O risk assessment, reducing claim probability.'
  epistemology:
    rule_origin: 'Stanford SCAC database and Cornerstone settlement studies: sector-level D&O claim frequency and severity
      patterns'
    threshold_basis: Sector-level SCA filing rates are the strongest predictor of D&O claim frequency; hazard tier 
      directly maps to expected annual filing probability
  rap_class: host
  rap_subcategory: host.identity
