        mid_cap:
          threshold_adjustment: 0.8
          rationale: 'Mid-cap: occasional litigation expected'
        large_cap:
          threshold_adjustment: 1.3
          rationale: 'Large-cap: routine litigation volume expected'
        mega_cap:
          threshold_adjustment: 1.8
          rationale: 'Mega-cap: constant litigation is structural; focus on severity'
  presentation:
    do_context:
