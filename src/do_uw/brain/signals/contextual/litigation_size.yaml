  provenance:
    origin: phase_110_contextual
    confidence: HIGH
    data_source: DERIVED
    formula: Contextual re-evaluation of LIT.SCA.active_cases through size_tier lens
    threshold_provenance:
      source: calibrated
      rationale: SCA filing rates from Cornerstone annual report by company size bucket
  signal_class: inference
  group: active_matters
