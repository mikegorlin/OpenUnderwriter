- id: CTX.RISK.ma_lifecycle
  name: M&A Activity in Lifecycle Context
  work_type: evaluate
  layer: signal
  factors: []
  peril_ids: []
  chain_roles: {}
  unlinked: false
  tier: 1
  depth: 2
  threshold:
    type: info
  provenance:
    origin: phase_110_contextual
    confidence: HIGH
    data_source: DERIVED
    formula: Contextual re-evaluation of BIZ.MA.acquisition_activity through lifecycle_stage lens
    threshold_provenance:
      source: calibrated
      rationale: M&A litigation frequency from Cornerstone data by acquirer lifecycle category
  signal_class: inference
  group: corporate_events
  rap_class: host
  rap_subcategory: host.identity
  epistemology:
    rule_origin: 'D&O claims experience: M&A litigation risk varies by company lifecycle stage'
    threshold_basis: M&A litigation frequency from Cornerstone data by acquirer lifecycle category
  evaluation:
    mechanism: contextual
    contextual_rules:
      source_signal: BIZ.MA.acquisition_activity
      context_dimensions:
      - lifecycle_stage
      context_adjustments:
        pre_revenue:
          threshold_adjustment: 0.4
          rationale: 'Pre-revenue M&A: distraction from core development; high concern'
        growth:
          threshold_adjustment: 0.7
          rationale: 'Growth: acquisitive growth creates integration risk'
        mature:
          threshold_adjustment: 1.3
          rationale: 'Mature: strategic M&A is normal course; focus on size/fit'
        distressed:
          threshold_adjustment: 0.5
          rationale: 'Distressed: M&A during distress raises duty of loyalty concerns'
  presentation:
    do_context:
      TRIGGERED_RED: '{company} m&a activity in lifecycle context at {value} represents host risk (company-level characteristics
        that attract or deter D&O claims) — this level is associated with D&O risk assessment exposure based on D&O claims
        experience.'
      TRIGGERED_YELLOW: '{company} m&a activity in lifecycle context at {value} is a moderate indicator for D&O risk assessment,
        warranting review of supporting evidence: {evidence}.'
      CLEAR: '{company} m&a activity in lifecycle context at {value} is within normal parameters for D&O risk assessment —
        no D&O concern at this level.'
