    source_type: SEC_DEF14A
    threshold_context: ''
  group: structural_governance
  signal_class: evaluative
  field_path: dual_class
  depends_on: []
  schema_version: 3
  epistemology:
    rule_origin: 'ISS Governance QualityScore: dual-class share structure as governance
      concern -- unequal voting rights entrench management'
    threshold_basis: 'Dual-class with >10:1 voting ratio = RED: ISS governance concern;
      any dual-class = YELLOW per governance best practice'
  rap_class: host
  rap_subcategory: host.governance_structure
  evaluation:
    mechanism: threshold
  presentation:
    do_context:
      TRIGGERED_RED: '{company} Dual Class at {value} (threshold: Dual-class with
        >50% voting control by insiders) signals elevated Emerging Risk / Forward-Looking
        Exposure risk (F10). Dual-class share structure concentrates voting control
        and insulates management from shareholder accountability. Courts give less
        deference to boards that cannot be meaningfully challenged through the shareholder
        franchise. Dual-class with >10:1 voting ratio = RED: ISS governance concern;
        any dual-class = YELLOW per governance best practice.'
      TRIGGERED_YELLOW: '{company} Dual Class at {value} (threshold: Dual-class structure
        present) is in the caution zone for Emerging Risk / Forward-Looking Exposure
        (F10). Monitor for deterioration — trend direction and peer comparison inform
        the D&O risk assessment.'
      CLEAR: '{company} Dual Class at {value} is within acceptable range for Emerging
        Risk / Forward-Looking Exposure (F10) — this level is a protective factor
        in D&O risk assessment, reducing claim probability.'
