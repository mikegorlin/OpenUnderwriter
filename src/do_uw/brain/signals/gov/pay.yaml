    data_source: SEC_DEF14A
    threshold_provenance:
      source: standard
      rationale: ''
    render_target: compensation_analysis
    formula: ''
  display:
    value_format: pct_1dp
    source_type: SEC_DEF14A
    threshold_context: ''
  schema_version: 3
  acquisition:
    sources:
    - type: SEC_DEF14A
      fields:
      - extracted.governance.comp_analysis.say_on_pay_pct
      - extracted.governance.compensation.say_on_pay_support_pct
  evaluation:
    formula: say_on_pay_pct
    thresholds:
    - op: <
      value: 70.0
      label: RED
    - op: <
      value: 80.0
      label: YELLOW
    mechanism: threshold
  presentation:
    detail_levels:
    - level: glance
      template: 'Say-on-pay: {value}%'
    - level: standard
      template: Say-on-pay approval at {value}% — {status_label}
    - level: deep
      fields:
      - say_on_pay_pct
      - ceo_pay_ratio
    context_templates:
      TRIGGERED: 'Compensation concern: say-on-pay approval {value}% below threshold'
      CLEAR: Say-on-pay approval adequate at {value}%
    do_context:
      TRIGGERED_RED: '{company} Say-on-Pay Results at {value} (threshold: <70% approval)
        signals elevated Emerging Risk / Forward-Looking Exposure risk (F10). Low
        say-on-pay approval signals shareholder dissatisfaction with compensation
        governance. Failed or low say-on-pay votes frequently precede derivative actions
        against the board and individual compensation committee members. Say-on-pay
        <70% support = RED: ISS policy trigger for against recommendation on compensation
        committee; <80% = YELLOW.'
      TRIGGERED_YELLOW: '{company} Say-on-Pay Results at {value} (threshold: 70-80%
        approval) is in the caution zone for Emerging Risk / Forward-Looking Exposure
        (F10). Monitor for deterioration — trend direction and peer comparison inform
        the D&O risk assessment.'
      CLEAR: '{company} Say-on-Pay Results at {value} is within acceptable range for
        Emerging Risk / Forward-Looking Exposure (F10) — this level is a protective
        factor in D&O risk assessment, reducing claim probability.'
  group: compensation_analysis
  signal_class: evaluative
  field_path: say_on_pay_pct
  depends_on:
  - signal: BASE.FILING.DEF14A
    field: say_on_pay_pct
  epistemology:
    rule_origin: 'Dodd-Frank Act Section 951 (say-on-pay): mandatory advisory vote
      on executive compensation'
    threshold_basis: 'Say-on-pay <70% support = RED: ISS policy trigger for against
      recommendation on compensation committee; <80% = YELLOW'
  rap_class: agent
  rap_subcategory: agent.compensation_decisions
