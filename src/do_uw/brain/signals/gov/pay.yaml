    do_context:
      TRIGGERED_RED: '{company} Ceo Total at {value} (threshold: Pay ratio >500:1
        OR total comp >$50M) signals elevated Emerging Risk / Forward-Looking Exposure
        risk (F10). Excessive CEO total compensation relative to company performance
        creates say-on-pay activism risk and supports waste claims in derivative litigation
        against the compensation committee. Pay-related threshold from ISS proxy voting
        guidelines and Dodd-Frank requirements.'
      TRIGGERED_YELLOW: '{company} Ceo Total at {value} (threshold: Pay ratio >300:1
        OR total comp >$25M) is in the caution zone for Emerging Risk / Forward-Looking
        Exposure (F10). Monitor for deterioration — trend direction and peer comparison
        inform the D&O risk assessment.'
      CLEAR: '{company} Ceo Total at {value} is within acceptable range for Emerging
        Risk / Forward-Looking Exposure (F10) — this level is a protective factor
        in D&O risk assessment, reducing claim probability.'
