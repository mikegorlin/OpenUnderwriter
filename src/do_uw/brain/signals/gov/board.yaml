- id: GOV.BOARD.independence
  name: Board Independence
  work_type: evaluate
  layer: hazard
  factors:
  - F10
  peril_ids: []
  chain_roles:
    governance_to_derivative: trigger
    activist_to_derivative: amplifier
    product_to_do: amplifier
  unlinked: false
  acquisition_tier: L1
  required_data:
  - SEC_DEF14A
  data_locations:
    SEC_DEF14A:
    - board_members
    - independence_status
    - committee_composition
  threshold:
    type: percentage
    red: <50% independent
    yellow: <67% independent
    clear: '>67% independent'
  claims_correlation: 0.1
  tier: 2
  depth: 2
  plaintiff_lenses:
  - SHAREHOLDERS
  v6_subsection_ids:
  - '4.1'
  extraction_hints:
    field_patterns:
    - board_composition
    - independent_directors
    - board_size
    expected_type: numeric
    no_data_sentinel: DEF 14A not filed or board composition not parseable
    validation_rule: independence_ratio between 0 and 1
  data_strategy:
    field_key: xbrl_board_independence
    narrative_key: board_independence_narrative
    primary_source: SEC_DEF14A
  worksheet_section: litigation
  display_when: has_data
  provenance:
    origin: migrated_from_json
    confidence: inherited
    last_validated: null
    source_url: null
    source_date: null
    source_author: null
    added_by: null
    data_source: SEC_DEF14A
    threshold_provenance:
      source: standard
      rationale: ''
    render_target: board_composition
    formula: ''
  gap_bucket: intentionally-unmapped
  gap_keywords: []
  display:
    value_format: pct_1dp
    source_type: SEC_DEF14A
    threshold_context: ''
  schema_version: 3
  acquisition:
    sources:
    - type: SEC_DEF14A
      fields:
      - extracted.governance.board.independence_ratio
  evaluation:
    formula: board_independence
    thresholds:
    - op: <
      value: 50.0
      label: RED
    - op: <
      value: 67.0
      label: YELLOW
    mechanism: threshold
  presentation:
    detail_levels:
    - level: glance
      template: 'Board independence: {value}%'
    - level: standard
      template: Board independence at {value}% — {status_label}
    - level: deep
      fields:
      - board_independence
      - board_size
      - ceo_chair_duality
    context_templates:
      TRIGGERED: 'Governance concern: board independence {value}% below threshold'
      CLEAR: Board independence adequate at {value}%
    do_context:
      TRIGGERED_RED: '{company} Board Independence at {value} (threshold: <50% independent)
        signals elevated Emerging Risk / Forward-Looking Exposure risk (F10). Low
        board independence reduces the effectiveness of oversight and increases the
        probability that management self-dealing goes unchecked -- a failure that
        supports demand futility arguments in derivative actions against directors.
        Board independence <50% = RED: NYSE/NASDAQ listing requirement minimum; <67%
        = YELLOW: ISS policy trigger threshold.'
      TRIGGERED_YELLOW: '{company} Board Independence at {value} (threshold: <67%
        independent) is in the caution zone for Emerging Risk / Forward-Looking Exposure
        (F10). Monitor for deterioration — trend direction and peer comparison inform
        the D&O risk assessment.'
      CLEAR: '{company} Board Independence at {value} is within acceptable range for
        Emerging Risk / Forward-Looking Exposure (F10) — this level is a protective
        factor in D&O risk assessment, reducing claim probability.'
  group: board_composition
  signal_class: evaluative
  field_path: xbrl_board_independence
  depends_on: []
  epistemology:
    rule_origin: 'NYSE/NASDAQ listing requirements and ISS Governance QualityScore:
      board independence is a primary governance quality indicator'
    threshold_basis: 'Board independence <50% = RED: NYSE/NASDAQ listing requirement
      minimum; <67% = YELLOW: ISS policy trigger threshold'
  rap_class: host
  rap_subcategory: host.governance_structure
