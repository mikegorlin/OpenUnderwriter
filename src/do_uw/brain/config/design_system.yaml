# ══════════════════════════════════════════════════════════════
# DESIGN ELEMENTS — Named, standardized visual components
# Inspired by: WSJ, Economist, NYT graphics, Bloomberg Terminal, S&P Capital IQ
# ══════════════════════════════════════════════════════════════

design_elements:

  # ── CARDS (9 types) ──
  cards:
    MetricCard:
      description: "Large bold number with label, optional trend, colored background"
      variants: [Green, Amber, Red, Blue, Purple, Default]
      inspiration: "Bloomberg terminal KPI tiles"
      value_size: "15pt"
      label_size: "6.5pt uppercase"

    RiskCard:
      description: "Title + severity badge (HIGH/MED/LOW) + evidence bullets, colored left border"
      variants: [Red, Amber, Green]
      inspiration: "Economist risk assessment boxes"

    KeyValueCard:
      description: "Compact labeled pairs in bordered container, 1-2 column grid"
      variants: [1Col, 2Col]
      inspiration: "Capital IQ paired-column fact tables"

    AlertCard:
      description: "Prominent notification with colored border, headline, description, optional pills"
      variants: [Red, Amber, Green, Blue]
      inspiration: "WSJ breaking news alerts"

    ComparisonCard:
      description: "Side-by-side metric comparison, auto-colored by performance"
      inspiration: "Economist country comparison infographics"

    TimelineCard:
      description: "Vertical timeline with colored dots, dates, connecting line"
      inspiration: "NYT event timelines"

    DataTableCard:
      description: "Compact table with navy header, row count badge, alternating shading"
      inspiration: "Bloomberg data grids"

    NarrativeCard:
      description: "Text block with left accent border, colored background, title bar"
      variants: [Blue, Navy, Green, Amber, Red]
      inspiration: "Economist analysis boxes"

    MetricStrip:
      description: "Horizontal grid of metric cards (1-6 columns)"
      inspiration: "Bloomberg terminal header strip"

  # ── BADGES & PILLS (7 types) ──
  badges:
    StatusBadge:
      description: "Colored pill for check results (TRIGGERED/CLEAR/ELEVATED/SKIPPED)"
      colors: { TRIGGERED: "#DC2626", CLEAR: "#047857", ELEVATED: "#D97706", SKIPPED: "#6B7280", INFO: "#2563EB" }

    TierBadge:
      description: "Underwriting recommendation pill (WIN/WANT/WRITE/WATCH/WALK/NO_TOUCH)"
      colors: { WIN: "#16A34A", WANT: "#059669", WRITE: "#D97706", WATCH: "#EA580C", WALK: "#DC2626", NO_TOUCH: "#991B1B" }

    VerdictBadge:
      description: "Section verdict pill (FAVORABLE/NEUTRAL/CONCERNING/CRITICAL)"
      colors: { FAVORABLE: "#16A34A", NEUTRAL: "#6B7280", CONCERNING: "#D97706", CRITICAL: "#DC2626" }

    PillBadgeRow:
      description: "Flex-wrapped row of colored classification pills"

    DimensionBadge:
      description: "Tiny H/A/E risk dimension pills"
      colors: { H: "#1D4ED8", A: "#B91C1C", E: "#059669" }

    ConfidenceMarker:
      description: "Small italic gray text for data quality notes"

    FactorTag:
      description: "Small pill showing factor codes in evidence"

  # ── CALLOUTS & CONTAINERS (7 types) ──
  callouts:
    DiscoveryBox:
      description: "Gold left border callout for blind spot findings"
      inspiration: "NYT 'What We Found' boxes"
      border_color: "#D4A843"

    WarningBox:
      description: "Amber left border callout for elevated findings"
      border_color: "#D97706"

    GapNotice:
      description: "Gray data unavailability notice"
      border_color: "#9CA3AF"

    ContextNote:
      description: "Small italic text explaining D&O relevance"

    SCRBlock:
      description: "Situation-Complication-Resolution analytical framework"
      inspiration: "McKinsey pyramid principle"

    ImplicationsBox:
      description: "Navy left border container with D&O implications bullets"

    InsightBox:
      description: "Navy left border with 'UNDERWRITING INSIGHT' label"

  # ── INLINE CHARTS & INFOGRAPHICS (12 types) ──
  # These are SVG/CSS elements embedded directly in cards (not matplotlib)
  infographics:
    Sparkline:
      description: "Lightweight inline trend line (60x16px), auto-colored by direction"
      inspiration: "Edward Tufte sparklines"
      colors: { up: "#16A34A", down: "#DC2626", flat: "#6B7280" }

    TrendArrow:
      description: "Tiny directional triangle (12x12px)"
      colors: { up: "#16A34A", down: "#DC2626", flat: "#6B7280" }

    FactorBar:
      description: "Horizontal bar showing points/max with color intensity"
      inspiration: "Economist progress bars"

    ScoreGauge:
      description: "Semi-circular 180° arc showing 0-100 score with needle"
      inspiration: "Dashboard gauges"

    DecileDots:
      description: "10 rounded squares showing position in distribution"
      inspiration: "NYT dot distribution charts"

    RangeSlider:
      description: "Horizontal range indicator showing position between low/high"
      inspiration: "Bloomberg range bars"

    CompositionBar:
      description: "Stacked horizontal bar showing cash/debt composition"
      inspiration: "Economist stacked bars"

    EarningsCircles:
      description: "8px colored circles showing beat/miss history"
      inspiration: "NYT win/loss indicators"

    SeverityBlocks:
      description: "5-block severity bar (filled vs empty) for plaintiff exposure"

    EquityLiabilityBar:
      description: "Two-color mini bar showing equity/liability split"

    SpectrumBar:
      description: "Market cap tier position indicator"

    DataSourcePill:
      description: "Colored pill showing data provenance (XBRL/yfinance/LLM/etc)"

  # ── MATPLOTLIB CHARTS (13 types) ──
  # Full-panel charts rendered as PNG/SVG, embedded in worksheet
  charts:
    StockPerformanceChart:
      description: "Bloomberg-style price chart with sector overlay, drop markers, volume bars"
      theme: "Dark navy (#1A1A2E)"
      inspiration: "Bloomberg terminal equity charts"
      variants: [1Y, 5Y, 2Y_unified]

    RelativePerformanceChart:
      description: "Indexed to 100 comparing company vs sector vs S&P 500"
      inspiration: "WSJ performance comparison"

    VolatilityChart:
      description: "Rolling volatility + beta with colored zone backgrounds"
      inspiration: "Risk analytics dashboards"

    DrawdownChart:
      description: "Running drawdown with max annotated, sector reference"
      inspiration: "Hedge fund drawdown analysis"

    RadarChart:
      description: "10-spoke polar axes showing factor risk profile"
      theme: "Navy fill (25% alpha), gold outline"
      inspiration: "Economist country comparison radars"

    WaterfallChart:
      description: "Factor deductions stacking down from 100 with tier thresholds"
      type: "SVG (inline)"
      inspiration: "McKinsey waterfall charts"

    TornadoChart:
      description: "Horizontal sensitivity bars extending left/right from center"
      type: "SVG (inline)"
      inspiration: "Actuarial sensitivity analysis"

    LitigationTimeline:
      description: "Horizontal timeline with event markers by category"
      inspiration: "NYT event timelines"

    OwnershipDonut:
      description: "Donut chart showing institutional/insider/retail split"
      inspiration: "Capital IQ ownership charts"

    PxSMatrix:
      description: "2D scatter with probability vs severity zones"
      inspiration: "Risk management heat maps"

    DropAnalysisChart:
      description: "Price line with drop event annotations and catalyst attribution"
      inspiration: "Investigative journalism stock analysis"

    InsiderTimeline:
      description: "Stock price with insider trade overlays and cluster windows"

    DebtMaturityChart:
      description: "Bar chart with near-term (red) vs future (blue) maturities"
      inspiration: "Moody's debt maturity profiles"

  # ── TABLES (6 types) ──
  tables:
    DataTable:
      description: "Full-width with navy header, alternating rows, tabular-nums"
      inspiration: "Bloomberg data grids"

    KeyValueTable:
      description: "2-column facts table with light header"
      inspiration: "Capital IQ detail panels"

    PairedKVTable:
      description: "4 cols/row for CIQ-density display (Label|Value|Label|Value)"
      inspiration: "S&P Capital IQ paired columns"

    FinancialRow:
      description: "Label | Current | Prior | YoY Change with color-coded arrows"
      inspiration: "Earnings release tables"

    CheckSummaryTable:
      description: "Signal results with color-coded rows by severity"

    EvidenceTable:
      description: "3-column (Indicator|Value|Source) with severity coloring"

  # ── NARRATIVE FRAMEWORKS (4 types) ──
  narratives:
    Narrative5Layer:
      description: "Verdict badge → thesis → evidence grid → deep context → implications"
      inspiration: "McKinsey presentation structure"

    BullBearFraming:
      description: "Two-column positive/negative analysis"
      inspiration: "Sell-side equity research"

    EvidenceChain:
      description: "Bulleted evidence items with source citations"

    DualVoice:
      description: "'What Was Said' (factual) + 'Underwriting Commentary' (analytical)"
      inspiration: "Audit report dual-perspective"
