# ══════════════════════════════════════════════════════════════
# DESIGN SYSTEM — Card Catalog Design Language v4
# Source of truth for all visual presentation in the worksheet.
# ══════════════════════════════════════════════════════════════
#
# This file defines the visual language. Templates consume it.
# Change a color here → every card using that section updates.
# Add a card here → tracker and renderer pick it up.
#
# Principles:
#   1. Cards are MODULAR — insert/remove without affecting siblings
#   2. Cards are SELF-CONTAINED — own border, header, body
#   3. Section colors are the ONLY visual grouping mechanism
#   4. Inner content FLOWS — no card-level CSS bleeds into content
#   5. Data sources are ALWAYS visible — colored pills on every card

schema_version: 1

# ── Section Palette ──
# Each section has a primary color used for: card header, nav button active state,
# section number, accent line, border tint
sections:
  overview:
    number: "00"
    color: "#0F172A"
    nav_label: "Overview"
  exec_brief:
    number: "01"
    color: "#6D28D9"
    nav_label: "Exec Brief"
  company:
    number: "02"
    color: "#0369A1"
    nav_label: "Company"
  market:
    number: "03"
    color: "#EA580C"
    nav_label: "Stock & Market"
  financial:
    number: "04"
    color: "#059669"
    nav_label: "Financial"
  governance:
    number: "05"
    color: "#D97706"
    nav_label: "Governance"
  litigation:
    number: "06"
    color: "#DC2626"
    nav_label: "Litigation"
  forward:
    number: "07"
    color: "#0D9488"
    nav_label: "Forward"
  industry:
    number: "08"
    color: "#7C3AED"
    nav_label: "Industry"
  scoring:
    number: "09"
    color: "#0891B2"
    nav_label: "Scoring"
  uw_framework:
    number: "10"
    color: "#4338CA"
    nav_label: "UW Framework"
  meeting:
    number: "11"
    color: "#BE185D"
    nav_label: "Meeting Prep"
  audit:
    number: "12"
    color: "#64748B"
    nav_label: "Audit Trail"

# ── Global Colors ──
colors:
  background: "#F8FAFC"
  card_bg: "#FFFFFF"
  border: "#E2E8F0"
  text: "#1E293B"
  muted: "#64748B"
  faint: "#94A3B8"
  gold: "#D4A843"
  red: "#DC2626"
  amber: "#F59E0B"
  green: "#16A34A"
  blue: "#1D4ED8"

# ── Data Source Colors ──
# Used for pills showing where each card's data comes from
data_sources:
  XBRL:
    bg: "#DCFCE7"
    fg: "#166534"
    description: "SEC XBRL filings (audited, HIGH confidence)"
  yfinance:
    bg: "#FEF3C7"
    fg: "#92400E"
    description: "Yahoo Finance market data (MEDIUM confidence)"
  LLM:
    bg: "#F3E8FF"
    fg: "#7C3AED"
    description: "Claude LLM extraction/synthesis"
  Web:
    bg: "#DBEAFE"
    fg: "#1D4ED8"
    description: "Web search / news sources (LOW confidence)"
  Computed:
    bg: "#F1F5F9"
    fg: "#475569"
    description: "Derived/calculated from other data"
  SEC:
    bg: "#FFE4E6"
    fg: "#9F1239"
    description: "SEC EDGAR filings, enforcement data"
  Supabase:
    bg: "#E0F2FE"
    fg: "#075985"
    description: "GorlinBase D&O claims database"

# ── Typography ──
typography:
  font_family: "Inter, -apple-system, sans-serif"
  mono_family: "'JetBrains Mono', monospace"
  card_title: { size: "13px", weight: 800 }
  section_number: { size: "36px", weight: 900, opacity: 0.18 }
  section_title: { size: "18px", weight: 800 }
  sub_block_name: { size: "11px", weight: 700 }
  body_text: { size: "10.5px", weight: 400, line_height: 1.5 }
  kv_label: { size: "10px", weight: 400, color: "#64748B" }
  kv_value: { size: "10px", weight: 600, variant: "tabular-nums" }
  table_header: { size: "8.5px", weight: 700, transform: "uppercase" }
  table_cell: { size: "9.5px", weight: 400 }
  mini_card_value: { size: "13px", weight: 800 }
  mini_card_label: { size: "7px", weight: 700, transform: "uppercase" }

# ── Card Component ──
card:
  border_width: "2px"
  border_radius: "12px"
  border_color_opacity: 0.25  # section_color * this opacity
  header_padding: "10px 16px"
  body_padding: "0"  # content controls own padding
  margin_bottom: "16px"
  # Card header: full section color background, white text
  # Card number: 16px, 900 weight, 30% white opacity
  # Card title: 13px, 800 weight, white

# ── Sub-Block Component ──
sub_block:
  border_bottom: "1px solid #F1F5F9"
  header_padding: "8px 16px"
  body_padding: "0 16px 12px 44px"
  letter_size: "20px"
  letter_radius: "5px"
  # Letter uses section color background, white text

# ── Mini Card Component ──
mini_card:
  border_radius: "5px"
  padding: "6px 8px"
  border: "1px solid"
  # Background and border from card-specific color
  # Title: 7px uppercase, Value: 13px bold, Subtitle: 7.5px muted

# ── Alert Bar Component ──
alert:
  border_radius: "5px"
  padding: "8px 12px"
  variants:
    red: { bg: "#FEF2F2", border: "#FECACA", text: "#991B1B" }
    green: { bg: "#F0FDF4", border: "#BBF7D0", text: "#065F46" }
    amber: { bg: "#FFFBEB", border: "#FDE68A", text: "#92400E" }

# ── Status Badge Component ──
badge:
  font_size: "8px"
  font_weight: 700
  padding: "1px 6px"
  border_radius: "3px"
  variants:
    chart: { bg: "#DBEAFE", fg: "#1D4ED8" }
    table: { bg: "#FEF3C7", fg: "#92400E" }
    narrative: { bg: "#F3E8FF", fg: "#7C3AED" }
    cards: { bg: "#DCFCE7", fg: "#166534" }
    alert: { bg: "#FEF2F2", fg: "#991B1B" }
    visual: { bg: "#EDE9FE", fg: "#6D28D9" }
    layer: { bg: "#F1F5F9", fg: "#475569" }
    metric: { bg: "#F0FDF4", fg: "#166534" }

# ── Severity Colors ──
severity:
  safe: "#16A34A"
  grey: "#D97706"
  distress: "#DC2626"
  neutral: "#64748B"

