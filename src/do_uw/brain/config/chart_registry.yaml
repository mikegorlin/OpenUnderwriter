# Chart Type Registry
# Declarative catalog of all charts generated by the render pipeline.
# Each entry declares the chart's data requirements, signal linkage,
# supported output formats, and rendering function location.
#
# Adding a new chart: add an entry here + write a rendering function.
# No template surgery needed.
#
# call_style values:
#   standard  — fn(state, period, ds, colors, format)
#   minimal   — fn(state, period, format)  (no ds/colors)
#   radar     — fn(factor_scores, ds, colors, format)
#   ownership — fn(ownership, ds, colors, format)
#   timeline  — fn(state, ds, colors, format)

charts:
  # ── Stock Performance ──────────────────────────────────────────────
  - id: stock_1y
    name: "12 Month Price vs Sector & Market"
    module: do_uw.stages.render.charts.stock_charts
    function: create_stock_chart
    params:
      period: "1Y"
    signals:
      - STOCK.PRICE.chart_comparison
      - STOCK.PRICE.position
      - STOCK.PRICE.returns_multi_horizon
    formats: [html, pdf]
    data_requires:
      - extracted.market.stock
      - acquired_data.market_data.history_1y
    section: stock_charts
    position: 1
    call_style: standard
    overlays: [volume_bars, earnings_markers, drop_markers, divergence_bands]
    golden_reference: tests/golden_charts/stock_1y.png

  - id: stock_5y
