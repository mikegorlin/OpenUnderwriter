# Sector Regulatory Overlay
# Named regulators and regulatory intensity baseline per GICS industry group (4-digit)
# This is the SECTOR baseline (SECT-03); company-specific intensity is ENVR-01

metadata:
  sources:
    - "Federal Register regulatory agency databases"
    - "Congressional Research Service: Sector-Specific Regulatory Guides"
    - "Cornerstone Research: SEC Enforcement Statistics 2023"
    - "D&O Diary regulatory enforcement trend analysis"
  data_year: 2024
  methodology: >
    Regulatory intensity classification based on number of primary regulators
    with enforcement authority, frequency of enforcement actions, and regulatory
    burden (compliance cost as % of revenue). High = 5+ regulators with active
    enforcement; Moderate = 2-4 regulators; Low = 0-1 regulators with limited
    enforcement activity.
  note: >
    Sector-level baseline only. Company-specific regulatory intensity assessed
    in ENVR.regulatory_intensity signal using actual filing data.
  intensity_definitions:
    High: "5+ regulators with active enforcement authority; heavy compliance burden"
    Moderate: "2-4 regulators; moderate compliance requirements"
    Low: "0-1 sector-specific regulators; general SEC/DOJ oversight only"

overlays:
  # Energy
  "1010":  # Energy Equipment & Services
    industry_group: "Energy Equipment & Services"
    intensity: Moderate
    regulators: ["EPA", "OSHA", "DOT", "BSEE"]
