# Sector Peer Benchmarks
# Median D&O risk dimension values by GICS sector (2-digit code)
# Used for peer comparison: flag company as outlier when >1 std_dev from sector median

metadata:
  sources:
    - "Cornerstone Research: Securities Class Action Settlements — 2023 Review"
    - "NERA Economic Consulting: Recent Trends in Securities Class Action Litigation — 2023"
    - "Internal pipeline calibration from analyzed companies"
  data_year: 2023
  methodology: >
    Sector median values calibrated from aggregate D&O study data and internal
    pipeline run history. NOT derived from company-level regression analysis.
    Standard deviations estimated from published sector-level dispersion data.
    Outlier threshold: >1 standard deviation from sector median on any dimension.
  dimensions_explained:
    overall_score: "Median D&O risk score (0-100 scale, higher = more risk)"
    litigation_frequency: "SCA filings per 1,000 companies per year in this sector"
    governance_quality: "Median governance quality score (0-100 scale, higher = better)"
    financial_health: "Median Altman Z-Score equivalent (>3 = safe, <1.8 = distress)"
  provenance_note: >
    These are calibrated approximations from aggregate study data, not precise
    company-level statistics. Use for directional comparison only. Sector medians
    should be refined as more companies are analyzed through the pipeline.

