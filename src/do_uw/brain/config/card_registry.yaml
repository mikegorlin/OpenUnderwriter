  scoring.factor_scores: { source: computed, desc: "10-factor scores" }
  scoring.red_flags: { source: computed, desc: "Critical risk flags" }
  scoring.claim_probability: { source: computed, desc: "Claim probability estimate" }
  scoring.severity_scenarios: { source: computed, desc: "Severity percentiles" }
  scoring.tower_recommendation: { source: computed, desc: "Tower position recommendation" }
  scoring.peril_map: { source: computed, desc: "D&O peril mapping" }

  # Analysis
  analysis.signal_results: { source: computed, desc: "Brain signal evaluation results" }
  analysis.forensic_composites: { source: computed, desc: "Altman/Beneish/Piotroski/Ohlson" }
  analysis.temporal_signals: { source: computed, desc: "Temporal trend analysis" }
  analysis.patterns_detected: { source: computed, desc: "Pattern detection results" }
  analysis.hazard_profile: { source: computed, desc: "H1-H7 hazard dimensions" }

  # LLM Synthesis
  llm.executive_summary: { source: llm, desc: "Executive narrative synthesis" }
  llm.risk_thesis: { source: llm, desc: "Risk thesis with factors/mitigations" }
  llm.key_findings: { source: llm, desc: "Synthesized key risk findings" }
  llm.dual_voice: { source: llm, desc: "Factual + underwriting commentary" }
  llm.section_reviews: { source: llm, desc: "Per-section LLM review" }
  llm.company_profile: { source: llm, desc: "4-section company profile" }

  # Charts (generated assets)
  charts.stock_5y_svg: { source: matplotlib, desc: "5Y stock chart SVG" }
  charts.stock_1y_svg: { source: matplotlib, desc: "1Y stock chart SVG" }
  charts.unified_drop_svg: { source: matplotlib, desc: "2Y unified drop chart" }
  charts.drawdown_1y: { source: matplotlib, desc: "1Y drawdown chart" }
  charts.drawdown_5y: { source: matplotlib, desc: "5Y drawdown chart" }
  charts.volatility_1y: { source: matplotlib, desc: "1Y volatility chart" }
  charts.volatility_5y: { source: matplotlib, desc: "5Y volatility chart" }
  charts.radar: { source: matplotlib, desc: "10-factor radar chart" }
  charts.ownership_donut: { source: matplotlib, desc: "Ownership donut chart" }
  charts.litigation_timeline: { source: matplotlib, desc: "Litigation timeline" }

# ── CARD REGISTRY ──
# Each card is a lego brick. Toggle active, set order, configure data.
cards:

  # ── Section 0: Overview ──
  - id: "00"
    section: overview
    title: "Overview (Decision Dashboard)"
    active: true
    status: designed
    template: sections/report/page0_dashboard.html.j2
    data_keys: [company.ticker, company.legal_name, company.market_cap, market.current_price,
                market.exposed_market_cap, market.float_shares, market.short_interest_trend,
                xbrl.revenue, xbrl.total_assets, scoring.quality_score, scoring.tier,
                scoring.red_flags, scoring.claim_probability, litigation.securities_class_actions,
                charts.stock_5y_svg, charts.unified_drop_svg, llm.key_findings,
                market.earnings_history, market.analyst_recommendations]
    elements:
      - { letter: A, name: "5Y Stock Strip", type: CHART, chart_ref: L-01 }
      - { letter: B, name: "6 Financial Mini-Cards", type: CARDS, comp_ref: CARD-09 }
      - { letter: C, name: "Litigation Status Bar", type: ALERT, comp_ref: CARD-04 }
      - { letter: D, name: "2Y Drop Investigation Chart", type: CHART, chart_ref: L-03 }
      - { letter: E, name: "Key Risk Findings", type: ALERT, comp_ref: CALL-01 }
      - { letter: F, name: "UW Priority Metrics", type: CARDS, comp_ref: CARD-09 }
      - { letter: G, name: "Plaintiff Exposure Matrix", type: TABLE, comp_ref: INF-08 }

  # ── Section 1: Exec Brief ──
  - id: "01"
    section: exec_brief
    title: "Recommendation & Red Flags"
    active: true
    status: designed
    template: null  # part of exec_brief.html.j2
    data_keys: [scoring.tier, scoring.quality_score, scoring.red_flags, scoring.claim_probability]
    elements:
      - { letter: A, name: "Recommendation Box", type: VERDICT }
      - { letter: B, name: "Critical Red Flags", type: ALERT }
      - { letter: C, name: "Key Negatives & Positives", type: TABLE }

  - id: "02"
    section: exec_brief
    title: "Risk Thesis & Commentary"
