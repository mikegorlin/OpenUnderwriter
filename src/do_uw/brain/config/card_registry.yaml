# ══════════════════════════════════════════════════════════════
# CARD REGISTRY — The lego manifest
# ══════════════════════════════════════════════════════════════
#
# Every card in the worksheet. Toggle active/inactive, reorder,
# configure data pulls. The renderer reads this to assemble the worksheet.
#
# To remove a card: set active: false
# To reorder: change the order in the list
# To add a card: add a new entry with a unique id
#
# Each card declares:
#   - id: unique reference (e.g., "00", "15", "42")
#   - section: which section it belongs to
#   - title: display name
#   - active: true/false — is it rendered?
#   - template: which Jinja2 template renders it (null = not yet built)
#   - data_keys: what state/context keys this card reads from
#   - elements: sub-elements inside the card (for the tracker)
#   - status: design pipeline state
#
# STATUS VALUES:
#   draft     — card defined but no template exists
#   designed  — visual design approved
#   wired     — template exists and pulls real data
#   verified  — data verified against state.json across 3+ tickers
#   synthesized — LLM narrative/synthesis quality checked
#   qa_passed — full QA (visual + data + cross-ticker)
#
# ══════════════════════════════════════════════════════════════

schema_version: 1

# Global settings
settings:
  default_theme: catalog_v4
  show_data_source_pills: true
  show_card_numbers: true
  show_section_headers: true

# ── DATA POOL ──
# All available data elements that cards can pull from.
# Each element: key path in the render context, source, description.
data_pool:

  # Company Identity
  company.ticker: { source: state, desc: "Stock ticker symbol" }
  company.legal_name: { source: state, desc: "Legal entity name" }
  company.sic_code: { source: state, desc: "SIC industry code" }
  company.gics_code: { source: state, desc: "GICS classification" }
  company.exchange: { source: state, desc: "Exchange listing" }
  company.state_of_inc: { source: state, desc: "State of incorporation" }
  company.cik: { source: state, desc: "SEC CIK number" }
  company.filer_category: { source: state, desc: "SEC filer category" }
  company.years_public: { source: state, desc: "Years since IPO" }
  company.market_cap: { source: state, desc: "Market capitalization" }
  company.employee_count: { source: state, desc: "Total employees" }
  company.business_description: { source: state, desc: "Business model narrative" }
  company.revenue_segments: { source: state, desc: "Revenue segment breakdown" }
  company.geographic_footprint: { source: state, desc: "Geographic revenue split" }
  company.customer_concentration: { source: state, desc: "Customer concentration data" }
  company.supplier_concentration: { source: state, desc: "Supplier concentration data" }

  # Market / Stock
  market.current_price: { source: yfinance, desc: "Current stock price" }
  market.52w_high: { source: yfinance, desc: "52-week high" }
  market.52w_low: { source: yfinance, desc: "52-week low" }
  market.beta: { source: yfinance, desc: "Beta coefficient" }
  market.short_interest: { source: yfinance, desc: "Short interest %" }
  market.price_history_1y: { source: yfinance, desc: "1Y daily price data" }
  market.price_history_5y: { source: yfinance, desc: "5Y weekly price data" }
  market.insider_transactions: { source: yfinance, desc: "Insider buys/sells" }
  market.institutional_holders: { source: yfinance, desc: "Top institutional holders" }
  market.institutional_holder_changes: { source: yfinance, desc: "% change in institutional holdings (who's buying/dumping)" }
  market.major_holders: { source: yfinance, desc: "Insider/institutional/float breakdown" }
  market.float_shares: { source: yfinance, desc: "Tradeable float shares" }
  market.exposed_market_cap: { source: computed, desc: "Float × price — the litigation-relevant market cap plaintiffs claim on" }
  market.concentrated_holder_risk: { source: computed, desc: "Top 5 holder % — concentrated selling = stock drop catalyst" }
  market.short_interest_trend: { source: yfinance, desc: "Short interest current vs prior month — direction matters" }
  market.analyst_recommendations: { source: yfinance, desc: "Analyst ratings" }
  market.earnings_dates: { source: yfinance, desc: "Quarterly earnings dates" }
  market.earnings_history: { source: yfinance, desc: "EPS beat/miss history" }

  # Financials (XBRL)
  xbrl.revenue: { source: xbrl, desc: "Total revenue (audited)" }
  xbrl.net_income: { source: xbrl, desc: "Net income" }
  xbrl.total_assets: { source: xbrl, desc: "Total assets" }
  xbrl.total_liabilities: { source: xbrl, desc: "Total liabilities" }
  xbrl.stockholders_equity: { source: xbrl, desc: "Stockholders equity" }
  xbrl.cash: { source: xbrl, desc: "Cash and equivalents" }
  xbrl.long_term_debt: { source: xbrl, desc: "Long-term debt" }
  xbrl.operating_income: { source: xbrl, desc: "Operating income" }
  xbrl.ebitda: { source: xbrl, desc: "EBITDA" }
  xbrl.operating_cash_flow: { source: xbrl, desc: "Operating cash flow" }
  xbrl.goodwill: { source: xbrl, desc: "Goodwill" }
  xbrl.income_statement_3y: { source: xbrl, desc: "3-year income statement" }
  xbrl.balance_sheet_3y: { source: xbrl, desc: "3-year balance sheet" }
  xbrl.cash_flow_3y: { source: xbrl, desc: "3-year cash flow" }

  # Governance
  governance.board: { source: sec, desc: "Board composition" }
  governance.leadership: { source: sec, desc: "Named executive officers" }
  governance.compensation: { source: sec, desc: "Executive compensation" }
  governance.board_forensics: { source: web+llm, desc: "Director background investigation" }
  governance.ownership: { source: yfinance, desc: "Ownership structure" }
  governance.governance_score: { source: computed, desc: "ISS QualityScore" }

  # Litigation
  litigation.securities_class_actions: { source: supabase+sec, desc: "Active and historical SCAs" }
  litigation.derivative_suits: { source: sec, desc: "Derivative actions" }
  litigation.sec_enforcement: { source: sec, desc: "SEC enforcement actions" }
  litigation.regulatory_proceedings: { source: sec+web, desc: "Regulatory proceedings" }
