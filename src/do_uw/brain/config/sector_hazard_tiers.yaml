# Sector D&O Hazard Tier Classification
# Maps GICS sub-industry (8-digit) codes to D&O litigation hazard tiers
# Fallback chain: sub-industry (8-digit) -> sector (2-digit)

metadata:
  sources:
    - "Cornerstone Research: Securities Class Action Filings — 2023 Year in Review"
    - "NERA Economic Consulting: Recent Trends in Securities Class Action Litigation — 2023 Full-Year Review"
    - "Stanford Law School Securities Class Action Clearinghouse (SCAC) database"
  data_year: 2023
  methodology: >
    Filing rates per 1,000 publicly traded companies by GICS sub-industry,
    averaged over 2021-2023 three-year period. Tier assignments based on
    filing rate thresholds calibrated from Cornerstone and NERA annual reports.
    Sub-industry rates sourced from SCAC filing distributions by sector.
  tiers:
    Highest: ">15 filings per 1,000 companies (3x+ average)"
    High: "8-15 filings per 1,000 companies (1.5-3x average)"
    Moderate: "3-8 filings per 1,000 companies (0.5-1.5x average)"
    Lower: "<3 filings per 1,000 companies (<0.5x average)"
  notes: >
    Average SCA filing rate across all sectors is approximately 5 per 1,000
    companies per year. Rates vary significantly by sub-industry. Tier
    assignments are conservative -- borderline cases assigned to higher tier.

# GICS sub-industry level tiers (8-digit codes)
# Highest hazard: biotech, pharma, fintech, SPAC, social media
tiers:
  # --- HIGHEST HAZARD (>15 filings per 1,000) ---

  # Biotechnology
  "35203010":
    tier: Highest
    filing_rate: 28.5
    context: "Biotechnology has the highest SCA filing rate of any sub-industry; clinical trial failures and FDA decisions drive frequent 10b-5 claims"

  # Pharmaceuticals
  "35201010":
    tier: Highest
    filing_rate: 19.2
