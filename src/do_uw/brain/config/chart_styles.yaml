# Chart Style Registry
# Canonical visual standards for every chart type in the worksheet.
# All chart renderers MUST consume these values via chart_style_registry.py.
# No ad-hoc matplotlib formatting in renderer files.

defaults:
  dpi: 200
  font_family: ["Inter", "Calibri", "Arial", "DejaVu Sans"]
  title_fontsize: 12
  title_fontweight: bold
  title_color: "#0B1D3A"
  label_fontsize: 9
  tick_fontsize: 8
  legend_fontsize: 7
  grid_alpha: 0.3
  grid_linewidth: 0.5
  spine_linewidth: 0.5
  hide_spines: [top, right]

themes:
  light:
    bg: "#FFFFFF"
    grid: "#E2E8F0"
    text: "#0B1D3A"
    text_muted: "#64748B"
    price_up: "#0B1D3A"
    price_down: "#B91C1C"
    fill_up_alpha: "#0B1D3A15"
    fill_down_alpha: "#B91C1C20"
    etf_line: "#D4A843"
    spy_line: "#94A3B8"
    divergence_alpha: "#D4A84320"
    drop_yellow: "#D97706"
    drop_red: "#B91C1C"
    header_bg: "#0B1D3A"
    header_text: "#FFFFFF"
    volume_normal: "#CBD5E1"
    volume_spike: "#B91C1C"
    earnings_line: "#D1D5DB"
    earnings_text_pos: "#0B1D3A"
    earnings_text_neg: "#B91C1C"
    earnings_text_neutral: "#94A3B8"
    litigation_line: "#E65100"
    litigation_text: "#E65100"
  dark:
    bg: "#0B1D3A"
    grid: "#1A2D4A"
    text: "#E2E8F0"
    text_muted: "#94A3B8"
    price_up: "#D4A843"
    price_down: "#E57373"
    fill_up_alpha: "#D4A84333"
    fill_down_alpha: "#E5737333"
    etf_line: "#D4A843"
    spy_line: "#94A3B8"
    divergence_alpha: "#D4A84320"
    drop_yellow: "#D4A843"
    drop_red: "#E57373"
    header_bg: "#0B1D3A"
    header_text: "#FFFFFF"
    volume_normal: "#1A2D4A"
    volume_spike: "#E57373"
    earnings_line: "#334155"
    earnings_text_pos: "#D4A843"
    earnings_text_neg: "#E57373"
    earnings_text_neutral: "#94A3B8"
    litigation_line: "#FF6D00"
    litigation_text: "#FF6D00"

chart_types:
  stock:
    theme: dark
    figure_size: [10, 6.5]
    header_height_pct: 0.10
    main_chart_pct: 0.58
    volume_pct: 0.13
    colors:
      price_up: "#D4A843"
      price_down: "#E57373"
      fill_up_alpha: "#D4A84333"
      fill_down_alpha: "#E5737333"
      etf_line: "#D4A843"
      spy_line: "#94A3B8"
    overlays:
      divergence_alpha: "#D4A84320"
      drop_yellow: "#D4A843"
      drop_red: "#E57373"
      volume_normal: "#1A2D4A"
      volume_spike: "#E57373"
      earnings_line: "#334155"
      earnings_text_pos: "#D4A843"
      earnings_text_neg: "#E57373"
      earnings_text_neutral: "#94A3B8"
      litigation_line: "#FF6D00"
      litigation_text: "#FF6D00"

  drawdown:
    theme: light
    figure_size: [10, 4]
    header_height_pct: 0.12
    main_chart_pct: 0.70
    colors:
      drawdown_fill: "#B91C1C"
      drawdown_fill_alpha: 0.25
      annotation_color: "#B91C1C"

  volatility:
    theme: light
    figure_size: [10, 7]
    vol_subplot_pct: 0.46
    beta_subplot_pct: 0.30
    header_height_pct: 0.08
    colors:
      ewma_line: "#E67E22"
      regime_low: "#16A34A"
      regime_elevated: "#D97706"
      regime_crisis: "#B91C1C"
    zone_thresholds:
      low: 20.0
      high: 40.0

  drop_analysis:
    theme: light
    figure_size: [10, 6]
    colors:
      marker_moderate: "#D97706"
      marker_severe: "#B91C1C"
      earnings_miss: "#B91C1C"
      guidance_cut: "#D97706"
      restatement: "#7C3AED"
      management_departure: "#2563EB"
      litigation: "#DC2626"
      regulatory: "#9333EA"
      analyst_downgrade: "#EA580C"
      acquisition: "#0891B2"
      market_wide: "#6B7280"
      unknown: "#374151"
      other_event: "#4B5563"

  relative_performance:
    theme: light
    figure_size: [10, 5]
    colors:
      outperform_fill_alpha: 0.10
      underperform_fill_alpha: 0.10

  radar:
    theme: light
    figure_size: [7, 7]
    colors:
      fill: "#0B1D3A"
      fill_alpha: 0.25
      outline: "#D4A843"
      outline_width: 2.5
      point_color: "#0B1D3A"
      point_size: 50

  ownership:
    theme: light
    figure_size: [6, 4.5]
    colors:
      institutional: "#0B1D3A"
      insider: "#D4A843"
      retail: "#94A3B8"
      dual_class_warning: "#B91C1C"

  timeline:
    theme: light
    figure_size: [8, 4]
    colors:
      case_filing: "#CC0000"
      settlement: "#E67300"
      enforcement_action: "#CC0000"
      regulatory: "#FFB800"
      stock_drop: "#4A90D9"
      executive_change: "#4A90D9"
      derivative: "#E67300"

  pxs_matrix:
    theme: light
    figure_size: [8, 6]
    colors:
      zone_green: "#2b8a3e"
      zone_yellow: "#e67700"
      zone_orange: "#c92a2a"
      zone_red: "#862e9c"
      primary_dot_edge: "#FFFFFF"
      range_bar: "#666666"
      scenario_dot: "#999999"
      attachment_line: "#e65100"
      annotation_bg: "#f0f0f0"
      annotation_border: "#cccccc"

  sparkline:
    theme: light
    figure_size: [1, 0.25]
    colors:
      up: "#16A34A"
      down: "#B91C1C"
      flat: "#6B7280"
      area_up: "#16A34A20"
      area_down: "#B91C1C20"
