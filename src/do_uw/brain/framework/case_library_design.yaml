# ---------------------------------------------------------------
# Section 4: Case Library Maintenance
# ---------------------------------------------------------------

maintenance:
  new_case_addition:
    trigger: "New SCA filing or significant enforcement action"
    process:
      - step: 1
        action: "Create case_id from ticker and year"
      - step: 2
        action: "Populate schema fields from SCAC data and public filings"
      - step: 3
        action: "Reconstruct signal profile from known facts at filing date"
      - step: 4
        action: "Assign signal_profile_confidence (HIGH/MEDIUM/LOW)"
      - step: 5
        action: "Add to case library with outcome=ongoing"
      - step: 6
        action: "Update outcome when resolution occurs"

  signal_profile_updates:
    description: >
      When new signals are added to the brain (new YAML signal files),
      historical case profiles should be reviewed to determine if the
      new signal would have fired. For most historical cases, new
      signals will be set to UNKNOWN unless the case facts clearly
      indicate a RED or CLEAR value.

  versioning:
    description: >
      Each case library entry is immutable once created. Updates
      (e.g., outcome resolution, signal profile refinement) create
      a new version. The latest version is used for matching.
    schema:
      version: int
      created_at: datetime
      updated_at: datetime
      update_reason: string

  quality_metrics:
    minimum_seed_cases: 20
    target_library_size: 100
    signal_profile_completeness: >
      Target: >50% of signals have a known value (not UNKNOWN)
      for HIGH-confidence cases. Accept lower completeness for
      MEDIUM/LOW confidence.
