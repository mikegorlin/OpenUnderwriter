  - id: antitrust_claims
    name: "Antitrust → D&O Exposure"
    peril_id: COMMERCIAL
    description: >
      Antitrust investigation or private action creates D&O
      exposure through treble damages and potential criminal
      liability for officers.
    trigger_signals:
      - LIT.OTHER.antitrust
    amplifier_signals:
      - LIT.REG.ftc_investigation
      - BIZ.COMP.market_position
    mitigator_signals:
      - LIT.DEFENSE.forum_selection
    evidence_signals:
      - BIZ.COMP.market_share
      - BIZ.COMP.competitive_advantage
    frequency_factors: [F1]
    severity_factors: [F7]
    patterns: []
    red_flags: []
    historical_filing_rate: 0.01
    median_severity_usd: 35000000
