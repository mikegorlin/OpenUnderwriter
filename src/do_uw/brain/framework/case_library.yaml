# Case Library: 20 Canonical D&O Cases for Precedent Match Engine
# Phase 109-02: Pattern Engines + Named Patterns
#
# Each entry represents a historical D&O case with a reconstructed
# signal profile (the "fingerprint" at time of filing) and outcome.
# Used by the Precedent Match engine for weighted Jaccard similarity.
#
# Signal IDs reference brain/signals/*.yaml (514-signal corpus).
# Status values: RED (clearly triggered), YELLOW (elevated but not critical),
# CLEAR (signal was evaluated and not triggered), UNKNOWN (no data available).
#
# signal_profile_confidence:
#   HIGH = landmark case with deep reconstruction (50+ signals)
#   MEDIUM = key-facts level reconstruction (10-20 signals)
#   LOW = estimated from case type (not used in seed library)

