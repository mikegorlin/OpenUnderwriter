# RAP SCAC Validation: H/A/E Taxonomy Coverage of Real-World D&O Claims
# Validates that every SCAC (Stanford Securities Class Action Clearinghouse)
# claim type and broader D&O claim universe is explainable by the H/A/E
# taxonomy. Ensures no orphan claim types exist.
#
# Created: Phase 102-02 (v7.0 Signal-Render Integrity)
# Sources: Stanford SCAC, Cornerstone Research Annual Reports, NERA Litigation
#          Trends, Willis Towers Watson D&O Claims Analysis, Marsh D&O Benchmarking

version: 1
generated_from: "Phase 102-02 SCAC validation"
taxonomy_version: 1
taxonomy_ref: "src/do_uw/brain/framework/rap_taxonomy.yaml"

# ==============================================================================
# CLAIM TYPE UNIVERSE
# ==============================================================================
# Organized by: Securities Fraud Claims, Trigger-Based Claims, Derivative/Other
# Each claim type documents the full H/A/E causal pathway.

claim_types:

  # ============================================================================
  # SECURITIES FRAUD CLAIMS -- Statutory Basis
  # ============================================================================

  - id: "10b5_fraud_accounting"
    name: "10b-5 Fraud -- Accounting Irregularities"
    scac_category: "Rule 10b-5"
    trigger: "Restatement or accounting error disclosure"
    host_factors:
      subcategories: ["host.financials", "host.structure"]
      explanation: >
        Complex financial structures with multiple segments, VIEs, or SPEs
        create opacity that enables manipulation. Debt-heavy balance sheets
        create incentive to manage earnings to maintain covenant compliance.
      example_signals: ["FIN.DEBT.structure", "BIZ.STRUC.nongaap", "FIN.PROFIT.margins"]
    agent_factors:
      subcategories: ["agent.financial_conduct", "agent.disclosure_conduct"]
      explanation: >
        Management decisions to manipulate or misrepresent financials are the
        direct claim trigger. Forensic indicators (Beneish M-Score, F-Score)
        detect manipulation patterns before restatement.
      example_signals: ["FIN.ACCT.restatement", "FIN.FORENSIC.m_score_composite", "FIN.FORENSIC.fis_composite"]
    environment_factors:
      subcategories: ["environment.market_signals", "environment.peer_context"]
      explanation: >
        Stock decline creates plaintiff standing and determines damages quantum.
        Peer financial comparisons reveal anomalies that support fraud inference.
      example_signals: ["STOCK.PRICE.recent_drop_alert", "FIN.PEER.margin_compression"]
    causal_chain: "restatement_to_sca"
    existing_peril: "SECURITIES"
    allegation_theory: "A_DISCLOSURE"
    frequency: "common"
    severity: "high"
    taxonomy_coverage: "full"

  - id: "10b5_fraud_misrepresentation"
    name: "10b-5 Fraud -- Material Misrepresentation/Omission"
    scac_category: "Rule 10b-5"
    trigger: "Disclosure of previously concealed material information"
    host_factors:
      subcategories: ["host.identity", "host.structure"]
      explanation: >
        Market cap determines class size and damages. Business complexity
        creates more disclosure obligations and more opportunities for
        material omissions.
      example_signals: ["BIZ.SIZE.market_cap", "BIZ.OPS.segments", "BIZ.MODEL.description"]
    agent_factors:
      subcategories: ["agent.disclosure_conduct", "agent.executive_conduct"]
      explanation: >
        Management's deliberate choice to omit or misrepresent material facts.
        Insider trading during concealment period proves scienter. Filing
        language changes reveal management awareness of undisclosed risks.
      example_signals: ["NLP.MDA.tone_shift", "NLP.RISK.new_risk_factors", "GOV.INSIDER.cluster_sales"]
    environment_factors:
      subcategories: ["environment.market_signals", "environment.external_warnings"]
      explanation: >
        Stock drop on corrective disclosure establishes damages. External
        sources (journalists, short sellers) often uncover concealed facts.
      example_signals: ["STOCK.PRICE.recent_drop_alert", "STOCK.SHORT.report", "FWRD.WARN.blind_spot"]
    causal_chain: "stock_drop_to_sca"
    existing_peril: "SECURITIES"
    allegation_theory: "A_DISCLOSURE"
    frequency: "very_common"
    severity: "high"
    taxonomy_coverage: "full"

  - id: "section_11_ipo"
    name: "Section 11 -- Registration Statement Liability (IPO)"
    scac_category: "Section 11"
    trigger: "Post-IPO stock decline below offering price"
    host_factors:
      subcategories: ["host.identity", "host.financials"]
      explanation: >
        Short public tenure (recent IPO) is the structural prerequisite.
        Financial position at time of offering establishes the baseline
        against which misstatements in registration are measured.
      example_signals: ["BIZ.SIZE.public_tenure", "BIZ.SIZE.growth_trajectory", "FIN.PROFIT.margins"]
    agent_factors:
      subcategories: ["agent.corporate_events", "agent.disclosure_conduct"]
      explanation: >
        IPO is a corporate event decision. Registration statement content
        is a disclosure decision. No scienter required (strict liability)
        but management's disclosure choices still determine claim viability.
      example_signals: ["BIZ.EVENT.ipo_date", "FWRD.EVENT.lockup_expiry", "FIN.GUIDE.track_record"]
    environment_factors:
      subcategories: ["environment.market_signals", "environment.ownership"]
      explanation: >
        Stock decline below offering price creates standing. Lockup expiry
        and insider selling patterns affect damages calculation. Institutional
        ownership composition affects class certification.
      example_signals: ["STOCK.PRICE.recent_drop_alert", "STOCK.OWN.structure", "STOCK.OWN.concentration"]
    causal_chain: "ipo_to_section11"
    existing_peril: "SECURITIES"
    allegation_theory: "A_DISCLOSURE"
    frequency: "moderate"
    severity: "high"
    taxonomy_coverage: "full"

  - id: "section_11_spo"
    name: "Section 11 -- Secondary/Follow-On Offering"
    scac_category: "Section 11"
    trigger: "Post-offering stock decline with alleged registration misstatements"
    host_factors:
      subcategories: ["host.financials", "host.structure"]
      explanation: >
        Financial position and business complexity determine scope of
        disclosure obligations in registration statement.
      example_signals: ["FIN.DEBT.structure", "FIN.LIQ.position", "BIZ.OPS.segments"]
    agent_factors:
      subcategories: ["agent.corporate_events", "agent.financial_conduct"]
      explanation: >
        Offering is a corporate event. Financial conduct issues (earnings
        management before offering, subsequent restatement) establish
        misstatement in registration.
      example_signals: ["FWRD.EVENT.offering", "FIN.ACCT.restatement", "FIN.QUALITY.non_gaap_divergence"]
    environment_factors:
      subcategories: ["environment.market_signals"]
      explanation: >
        Stock decline below offering price creates standing and damages.
      example_signals: ["STOCK.PRICE.recent_drop_alert", "STOCK.PRICE.position"]
    causal_chain: "ipo_to_section11"
    existing_peril: "SECURITIES"
    allegation_theory: "A_DISCLOSURE"
    frequency: "moderate"
    severity: "moderate"
    taxonomy_coverage: "full"

  - id: "section_12_prospectus"
    name: "Section 12 -- Prospectus Liability"
    scac_category: "Section 12(a)(2)"
    trigger: "Material misstatement in prospectus used in offering"
    host_factors:
      subcategories: ["host.financials", "host.structure"]
      explanation: >
        Financial complexity creates more prospectus content and more
        opportunity for misstatements. Structure determines disclosure burden.
      example_signals: ["FIN.DEBT.structure", "BIZ.STRUC.nongaap", "BIZ.OPS.segments"]
    agent_factors:
      subcategories: ["agent.corporate_events", "agent.disclosure_conduct"]
      explanation: >
        Offering decision and prospectus content are agent actions.
        Management controls what appears in prospectus and is liable
        for material misstatements or omissions.
      example_signals: ["FWRD.EVENT.offering", "FWRD.DISC.forward_looking", "NLP.MDA.tone_shift"]
    environment_factors:
      subcategories: ["environment.market_signals"]
      explanation: >
        Market conditions and stock performance post-offering determine
        whether investors suffer losses and have standing.
      example_signals: ["STOCK.PRICE.recent_drop_alert", "STOCK.VALUATION.pe_ratio"]
    causal_chain: "ipo_to_section11"
    existing_peril: "SECURITIES"
    allegation_theory: "A_DISCLOSURE"
    frequency: "low"
    severity: "moderate"
    taxonomy_coverage: "full"

  - id: "section_14a_proxy"
    name: "Section 14(a) -- Proxy Statement Fraud"
    scac_category: "Section 14(a)"
    trigger: "Material misstatement in proxy solicitation materials"
    host_factors:
      subcategories: ["host.governance_structure", "host.identity"]
      explanation: >
        Governance architecture determines proxy content obligations.
        Board structure, committee composition, and executive profiles
        are key proxy disclosures.
      example_signals: ["GOV.BOARD.independence", "GOV.BOARD.committees", "GOV.RIGHTS.classified"]
    agent_factors:
      subcategories: ["agent.compensation_decisions", "agent.corporate_events"]
      explanation: >
        Say-on-pay outcomes, compensation design, and M&A transaction
        terms disclosed in proxy are agent decisions. Proxy fraud claims
        target management's disclosure choices in solicitation materials.
      example_signals: ["GOV.PAY.say_on_pay", "GOV.PAY.quantum", "FWRD.EVENT.ma_closing"]
    environment_factors:
      subcategories: ["environment.ownership", "environment.peer_context"]
      explanation: >
        Institutional ownership composition affects proxy contest dynamics.
        Proxy advisory recommendations (ISS, Glass Lewis) provide external
        benchmark for adequacy of proxy disclosures.
      example_signals: ["STOCK.OWN.institutional", "GOV.ACTIVIST.13d_filings", "GOV.EFFECT.proxy_advisory"]
    causal_chain: null
    existing_peril: "FIDUCIARY"
    allegation_theory: "D_GOVERNANCE"
    frequency: "moderate"
    severity: "moderate"
    taxonomy_coverage: "full"

  - id: "section_15_control_person"
    name: "Section 15/20(a) -- Control Person Liability"
    scac_category: "Section 15 / Section 20(a)"
    trigger: "Derivative liability attaching to controlling persons of primary violators"
    host_factors:
      subcategories: ["host.governance_structure", "host.structure"]
      explanation: >
        Corporate structure and governance hierarchy determine who qualifies
        as a "control person." Parent-subsidiary relationships, ownership
        stakes, and reporting lines establish control.
      example_signals: ["GOV.BOARD.ceo_chair", "BIZ.STRUC.subsidiaries", "EXEC.PROFILE.ceo"]
    agent_factors:
      subcategories: ["agent.executive_conduct", "agent.financial_conduct"]
      explanation: >
        Control person claims are derivative -- they require an underlying
        violation by the controlled entity. Agent conduct of the primary
        entity establishes the underlying violation.
      example_signals: ["GOV.INSIDER.cluster_sales", "FIN.ACCT.restatement", "EXEC.DEPARTURE.cfo_departure_timing"]
    environment_factors:
      subcategories: ["environment.market_signals"]
      explanation: >
        Stock decline establishes damages for the underlying violation
        that the control person claim piggybacks on.
      example_signals: ["STOCK.PRICE.recent_drop_alert"]
    causal_chain: "stock_drop_to_sca"
    existing_peril: "SECURITIES"
    allegation_theory: "A_DISCLOSURE"
    frequency: "common"
    severity: "moderate"
    taxonomy_coverage: "full"
    notes: >
      Always paired with an underlying 10b-5 or Section 11 claim.
      Coverage analysis is derivative of underlying claim coverage.

  # ============================================================================
  # TRIGGER-BASED CLAIM CATEGORIES
  # ============================================================================

  - id: "trigger_guidance_miss"
    name: "Guidance Miss / Earnings Surprise"
    scac_category: "Rule 10b-5"
    trigger: "Company misses previously issued guidance, stock drops"
    host_factors:
      subcategories: ["host.identity", "host.dependencies"]
      explanation: >
        Company size determines damages. Revenue concentration creates
        earnings surprise risk when a major customer/segment underperforms.
        Industry growth rate sets baseline expectations.
      example_signals: ["BIZ.SIZE.market_cap", "BIZ.DEPEND.customer_conc", "BIZ.COMP.industry_growth"]
    agent_factors:
      subcategories: ["agent.disclosure_conduct", "agent.executive_conduct"]
      explanation: >
        Issuing aggressive guidance and failing to update when circumstances
        change is the core Agent conduct. Insider trading between guidance
        issuance and miss proves scienter. NLP analysis of MDA tone shifts
        may show management knew problems were emerging.
      example_signals: ["FIN.GUIDE.track_record", "FIN.GUIDE.earnings_reaction", "GOV.INSIDER.unusual_timing"]
    environment_factors:
      subcategories: ["environment.market_signals", "environment.external_warnings"]
      explanation: >
        Analyst consensus provides the market expectation against which
        the miss is measured. External warnings (supply chain issues,
        industry downturn) may establish that management should have
        known guidance was unachievable.
      example_signals: ["STOCK.ANALYST.consensus", "STOCK.PRICE.recent_drop_alert", "FWRD.MACRO.trade_policy"]
    causal_chain: "guidance_to_sca"
    existing_peril: "SECURITIES"
    allegation_theory: "B_GUIDANCE"
    frequency: "very_common"
    severity: "moderate"
    taxonomy_coverage: "full"

  - id: "trigger_insider_trading"
    name: "Insider Trading Allegations"
    scac_category: "Rule 10b-5 / Section 16(b)"
    trigger: "Insiders trade while in possession of material non-public information"
    host_factors:
      subcategories: ["host.governance_structure"]
      explanation: >
        Governance controls around insider trading (blackout windows,
        10b5-1 plan requirements, compliance monitoring) determine the
        structural defense posture.
      example_signals: ["GOV.BOARD.committees", "GOV.EFFECT.sox_404", "EXEC.PROFILE.ceo"]
    agent_factors:
      subcategories: ["agent.executive_conduct", "agent.financial_conduct"]
      explanation: >
        Insider trading is quintessential Agent conduct. Cluster selling,
        unusual timing relative to announcements, trades outside 10b5-1
        plans, and trading during blackout periods are behavioral signals.
      example_signals: ["GOV.INSIDER.cluster_sales", "GOV.INSIDER.unusual_timing", "GOV.INSIDER.net_selling", "EXEC.INSIDER.cluster_selling"]
    environment_factors:
      subcategories: ["environment.market_signals", "environment.market_patterns"]
      explanation: >
        Trading volume analysis reveals informed trading. Market patterns
        can distinguish company-specific trading from sector-wide activity.
      example_signals: ["STOCK.TRADE.volume_patterns", "STOCK.PATTERN.informed_trading"]
    causal_chain: "stock_drop_to_sca"
    existing_peril: "SECURITIES"
    allegation_theory: "A_DISCLOSURE"
    frequency: "common"
    severity: "high"
    taxonomy_coverage: "full"

  - id: "trigger_restatement"
    name: "Accounting Restatement"
    scac_category: "Rule 10b-5"
    trigger: "Company restates previously filed financial statements"
    host_factors:
      subcategories: ["host.financials", "host.structure", "host.governance_structure"]
      explanation: >
        Complex financial structure (multiple segments, acquisitions, non-GAAP
        metrics) creates accounting complexity. Internal controls architecture
        (SOX 404, audit committee quality) determines detection capability.
      example_signals: ["FIN.DEBT.structure", "BIZ.STRUC.nongaap", "GOV.EFFECT.sox_404", "GOV.EFFECT.audit_committee"]
    agent_factors:
      subcategories: ["agent.financial_conduct", "agent.governance_events"]
      explanation: >
        Restatement is a direct Agent event -- it reveals that prior
        financial statements (Agent disclosure) were materially wrong.
        Material weakness findings and auditor changes are governance
        events that often accompany restatements.
      example_signals: ["FIN.ACCT.restatement", "FIN.ACCT.restatement_magnitude", "GOV.EFFECT.material_weakness", "GOV.EFFECT.auditor_change"]
    environment_factors:
      subcategories: ["environment.market_signals", "environment.peer_context"]
      explanation: >
        Stock reaction to restatement determines damages. Peer accounting
        comparisons may establish anomalies were detectable earlier.
      example_signals: ["STOCK.PRICE.recent_drop_alert", "FIN.PEER.margin_compression"]
    causal_chain: "restatement_to_sca"
    existing_peril: "SECURITIES"
    allegation_theory: "A_DISCLOSURE"
    frequency: "common"
    severity: "high"
    taxonomy_coverage: "full"

  - id: "trigger_regulatory_investigation"
    name: "Regulatory Investigation Disclosure"
    scac_category: "Rule 10b-5"
    trigger: "Disclosure of SEC/DOJ or industry regulator investigation"
    host_factors:
      subcategories: ["host.environment_exposure", "host.dependencies"]
      explanation: >
        Regulatory intensity as a structural attribute determines baseline
        investigation probability. Industry-specific regulatory dependencies
        create additional exposure surfaces.
      example_signals: ["ENVR.reg_intensity", "BIZ.DEPEND.regulatory_dep", "BIZ.MODEL.regulatory_dep"]
    agent_factors:
      subcategories: ["agent.litigation_actions", "agent.financial_conduct"]
      explanation: >
        Regulatory investigations target Agent conduct (fraud, manipulation,
        compliance failures). SEC enforcement pipeline (subpoena, Wells
        notice, complaint) tracks the progression of alleged misconduct.
      example_signals: ["LIT.REG.sec_investigation", "LIT.REG.wells_notice", "LIT.REG.sec_active"]
    environment_factors:
      subcategories: ["environment.external_warnings", "environment.peer_context"]
      explanation: >
        External warnings (whistleblowers, news investigations) often
        precede formal regulatory action. Industry-wide enforcement
        sweeps create contagion risk for sector peers.
      example_signals: ["NLP.WHISTLE.language_detected", "LIT.SECTOR.litigation_wave", "FWRD.WARN.blind_spot"]
    causal_chain: "enforcement_to_penalty"
    existing_peril: "REGULATORY"
    allegation_theory: "A_DISCLOSURE"
    frequency: "moderate"
    severity: "high"
    taxonomy_coverage: "full"

  - id: "trigger_product_failure"
    name: "Product/Drug Failure (Clinical Trial, FDA, Safety)"
    scac_category: "Rule 10b-5"
    trigger: "Product recall, clinical trial failure, FDA rejection, safety issue"
    host_factors:
      subcategories: ["host.dependencies", "host.environment_exposure", "host.structure"]
      explanation: >
        Revenue concentration on specific product creates binary event risk.
        Regulatory dependency (FDA approval pipeline) is a structural
        vulnerability. Business model type (pharma, device, tech) determines
        product failure exposure.
      example_signals: ["BIZ.DEPEND.customer_conc", "BIZ.DEPEND.regulatory_dep", "BIZ.MODEL.description"]
    agent_factors:
      subcategories: ["agent.disclosure_conduct", "agent.corporate_events"]
      explanation: >
        Management's disclosure of product risks, clinical trial progress,
        and regulatory status are Agent conduct. Failure to disclose known
        product issues is the basis for fraud claims. FDA submissions are
        corporate event decisions.
      example_signals: ["NLP.RISK.new_risk_factors", "FWRD.DISC.forward_looking", "BIZ.EVENT.product_launch"]
    environment_factors:
      subcategories: ["environment.market_signals", "environment.external_warnings"]
      explanation: >
        Stock drop on product failure creates standing. FDA actions,
        competitive product launches, and analyst downgrades provide
        external context.
      example_signals: ["STOCK.PRICE.recent_drop_alert", "STOCK.ANALYST.downgrades", "FWRD.WARN.blind_spot"]
    causal_chain: "stock_drop_to_sca"
    existing_peril: "CONSUMER"
    allegation_theory: "C_PRODUCT_OPS"
    frequency: "common"
    severity: "high"
    taxonomy_coverage: "full"

  - id: "trigger_customer_loss"
    name: "Customer/Vendor Loss Announcement"
    scac_category: "Rule 10b-5"
    trigger: "Loss of major customer or vendor disrupts revenue, stock declines"
    host_factors:
      subcategories: ["host.dependencies", "host.structure"]
      explanation: >
        Customer concentration is the structural prerequisite. Companies
        with >20% revenue from a single customer face catastrophic earnings
        surprise risk on customer loss.
      example_signals: ["BIZ.DEPEND.customer_conc", "BIZ.DEPEND.contract_terms", "BIZ.DEPEND.distribution"]
    agent_factors:
      subcategories: ["agent.disclosure_conduct", "agent.executive_conduct"]
      explanation: >
        Failure to disclose deteriorating customer relationships or known
        contract non-renewal is the Agent conduct claim. Insider trading
        before customer loss announcement proves scienter.
      example_signals: ["NLP.RISK.new_risk_factors", "FWRD.DISC.forward_looking", "GOV.INSIDER.unusual_timing"]
    environment_factors:
      subcategories: ["environment.market_signals", "environment.peer_context"]
      explanation: >
        Stock drop creates standing. Industry conditions (customer financial
        health, competitor offerings) provide context for customer loss.
      example_signals: ["STOCK.PRICE.recent_drop_alert", "STOCK.ANALYST.consensus"]
    causal_chain: "stock_drop_to_sca"
    existing_peril: "SECURITIES"
    allegation_theory: "C_PRODUCT_OPS"
    frequency: "moderate"
    severity: "moderate"
    taxonomy_coverage: "full"

  - id: "trigger_merger_failed"
    name: "Failed Merger / Acquisition Issues"
    scac_category: "Rule 10b-5 / Fiduciary"
    trigger: "M&A deal fails, synergy shortfalls, or integration problems disclosed"
    host_factors:
      subcategories: ["host.structure", "host.financials"]
      explanation: >
        Business complexity affects integration difficulty. Financial
        position (debt from acquisition financing) amplifies post-deal stress.
        Goodwill on balance sheet creates impairment risk.
      example_signals: ["BIZ.STRUC.subsidiaries", "FIN.DEBT.structure", "FIN.DEBT.maturity"]
    agent_factors:
      subcategories: ["agent.corporate_events", "agent.disclosure_conduct"]
      explanation: >
        M&A transaction is an Agent decision. Synergy projections in
        deal materials are disclosure conduct. Failure to disclose
        integration problems or overstated synergies is the fraud basis.
      example_signals: ["FWRD.EVENT.ma_closing", "FWRD.EVENT.synergy", "FWRD.WARN.goodwill_risk"]
    environment_factors:
      subcategories: ["environment.market_signals", "environment.external_warnings"]
      explanation: >
        Stock decline on deal failure/problems creates damages. Analyst
        assessment of deal value and integration progress provides
        external benchmark.
      example_signals: ["STOCK.PRICE.recent_drop_alert", "STOCK.ANALYST.target_price"]
    causal_chain: "ma_to_claims"
    existing_peril: "FIDUCIARY"
    allegation_theory: "E_MA"
    frequency: "common"
    severity: "high"
    taxonomy_coverage: "full"

  - id: "trigger_stock_drop_no_catalyst"
    name: "Stock Drop Without Specific Catalyst"
    scac_category: "Rule 10b-5"
    trigger: "Significant stock decline with alleged prior concealment of negative trends"
    host_factors:
      subcategories: ["host.identity", "host.financials"]
      explanation: >
        Market cap determines damages. Financial position (deteriorating
        margins, cash burn) provides the basis for "known but concealed"
        negative trends.
      example_signals: ["BIZ.SIZE.market_cap", "FIN.PROFIT.margins", "FIN.LIQ.cash_burn"]
    agent_factors:
      subcategories: ["agent.disclosure_conduct", "agent.financial_conduct", "agent.executive_conduct"]
      explanation: >
        Concealment of deteriorating fundamentals is the Agent conduct.
        Earnings quality deterioration suggests management concealment.
        Insider trading during concealment period proves scienter.
      example_signals: ["FIN.TEMPORAL.cash_flow_deterioration", "FIN.QUALITY.non_gaap_divergence", "GOV.INSIDER.net_selling"]
    environment_factors:
      subcategories: ["environment.market_signals", "environment.market_patterns"]
      explanation: >
        Stock drop pattern (idiosyncratic vs market-wide) determines
        whether decline is attributable to company conduct. Death spiral
        or event collapse patterns indicate catastrophic loss.
      example_signals: ["STOCK.PRICE.recent_drop_alert", "STOCK.PATTERN.event_collapse", "STOCK.PATTERN.death_spiral"]
    causal_chain: "stock_drop_to_sca"
    existing_peril: "SECURITIES"
    allegation_theory: "A_DISCLOSURE"
    frequency: "moderate"
    severity: "variable"
    taxonomy_coverage: "full"

  - id: "trigger_ipo_allocation"
    name: "IPO/SPO Allocation or Pricing Issues"
    scac_category: "Section 11 / Section 12"
    trigger: "Allegations of improper allocation, pricing manipulation, or laddering"
    host_factors:
      subcategories: ["host.identity"]
      explanation: >
        Company size, sector attractiveness, and public tenure (new IPO)
        determine allocation pressure and pricing dynamics.
      example_signals: ["BIZ.SIZE.market_cap", "BIZ.SIZE.public_tenure"]
    agent_factors:
      subcategories: ["agent.corporate_events", "agent.disclosure_conduct"]
      explanation: >
        IPO/SPO pricing and allocation decisions are Agent events.
        Disclosure in prospectus about pricing methodology and
        underwriter relationships is Agent disclosure conduct.
      example_signals: ["BIZ.EVENT.ipo_date", "FWRD.EVENT.lockup_expiry"]
    environment_factors:
      subcategories: ["environment.market_signals", "environment.ownership"]
      explanation: >
        Market conditions at offering determine pricing pressure.
        Ownership composition post-IPO reveals allocation patterns.
      example_signals: ["STOCK.PRICE.position", "STOCK.OWN.structure", "STOCK.OWN.concentration"]
    causal_chain: "ipo_to_section11"
    existing_peril: "SECURITIES"
    allegation_theory: "A_DISCLOSURE"
    frequency: "low"
    severity: "moderate"
    taxonomy_coverage: "full"

  # ============================================================================
  # EMERGING CLAIM CATEGORIES
  # ============================================================================

  - id: "trigger_crypto_blockchain"
    name: "Cryptocurrency/Blockchain Claims"
    scac_category: "Rule 10b-5 / Section 11"
    trigger: "Crypto-related fraud, token offering issues, blockchain technology claims"
    host_factors:
      subcategories: ["host.structure", "host.environment_exposure"]
      explanation: >
        Business model reliance on cryptocurrency/blockchain creates
        structural exposure. Regulatory uncertainty in crypto space
        amplifies inherent risk.
      example_signals: ["BIZ.MODEL.description", "ENVR.reg_intensity"]
    agent_factors:
      subcategories: ["agent.disclosure_conduct", "agent.corporate_events"]
      explanation: >
        Management's claims about blockchain technology, token offerings,
        and crypto-related revenue are disclosure conduct. Token launches
        and crypto pivots are corporate events.
      example_signals: ["NLP.RISK.new_risk_factors", "BIZ.EVENT.product_launch"]
    environment_factors:
      subcategories: ["environment.market_signals", "environment.external_warnings"]
      explanation: >
        Crypto market volatility provides external context. Regulatory
        evolution (SEC enforcement waves against crypto) creates
        environment-driven claim triggers.
      example_signals: ["STOCK.PRICE.recent_drop_alert", "FWRD.MACRO.regulatory_changes"]
    causal_chain: null
    existing_peril: "EMERGING"
    allegation_theory: "C_PRODUCT_OPS"
    frequency: "growing"
    severity: "variable"
    taxonomy_coverage: "partial"
    gap_analysis: >
      Partial coverage: The taxonomy handles crypto claims through general
      disclosure and product/ops frameworks, but lacks dedicated crypto/
      blockchain-specific signals. For Liberty's excess position, general
      securities fraud framework coverage is adequate since the underlying
      legal theories (10b-5, Section 11) are standard. Future consideration
      for v8.0+ if crypto D&O claims volume warrants dedicated signals.

  - id: "trigger_spac"
    name: "SPAC-Related Claims"
    scac_category: "Section 11 / Rule 10b-5"
    trigger: "SPAC merger, de-SPAC transaction, target company issues post-merger"
    host_factors:
      subcategories: ["host.identity", "host.structure"]
      explanation: >
        SPAC structure (blank check company, limited operating history)
        creates unique structural risk. Post-de-SPAC, the target's
        business complexity determines ongoing exposure.
      example_signals: ["BIZ.SIZE.public_tenure", "BIZ.MODEL.description", "BIZ.STRUC.subsidiaries"]
    agent_factors:
      subcategories: ["agent.corporate_events", "agent.disclosure_conduct"]
      explanation: >
        De-SPAC transaction is an Agent event. Projections in SPAC proxy
        statement (typically aggressive) become fraud basis when targets
        underperform. Sponsor conflicts of interest are Agent conduct.
      example_signals: ["FWRD.EVENT.ma_closing", "FIN.GUIDE.track_record", "BIZ.STRUCT.related_party"]
    environment_factors:
      subcategories: ["environment.market_signals", "environment.market_patterns"]
      explanation: >
        Post-de-SPAC stock decline (common pattern) creates standing.
        Market patterns show systematic SPAC underperformance.
      example_signals: ["STOCK.PRICE.recent_drop_alert", "STOCK.PATTERN.event_collapse"]
    causal_chain: "ipo_to_section11"
    existing_peril: "EMERGING"
    allegation_theory: "A_DISCLOSURE"
    frequency: "growing"
    severity: "moderate"
    taxonomy_coverage: "full"
    notes: >
      SPAC claims are well-covered because they use standard securities
      fraud legal theories (Section 11, 10b-5) despite novel structures.

  - id: "trigger_esg"
    name: "ESG/Sustainability Misrepresentation"
    scac_category: "Rule 10b-5 / Section 14(a)"
    trigger: "Greenwashing claims, ESG metric fraud, sustainability commitment failures"
    host_factors:
      subcategories: ["host.environment_exposure", "host.identity"]
      explanation: >
        ESG gap exposure is a structural attribute. Companies with high
        carbon footprint, environmental liabilities, or social controversies
        have inherent ESG risk surface area.
      example_signals: ["ENVR.esg_gap", "ENVR.climate_risk", "BIZ.CLASS.primary"]
    agent_factors:
      subcategories: ["agent.disclosure_conduct"]
      explanation: >
        Management's ESG claims and sustainability commitments are
        disclosure conduct. Gap between claims and reality is the fraud
        basis. Proxy statement ESG disclosures create Section 14(a) exposure.
      example_signals: ["NLP.MDA.tone_shift", "NLP.RISK.new_risk_factors", "FWRD.DISC.forward_looking"]
    environment_factors:
      subcategories: ["environment.external_warnings", "environment.peer_context"]
      explanation: >
        External ESG ratings, activist campaigns targeting ESG failures,
        and peer ESG comparisons provide the context for greenwashing claims.
      example_signals: ["FWRD.WARN.blind_spot", "GOV.ACTIVIST.13d_filings", "FIN.PEER.margin_compression"]
    causal_chain: null
    existing_peril: "EMERGING"
    allegation_theory: "A_DISCLOSURE"
    frequency: "growing"
    severity: "variable"
    taxonomy_coverage: "partial"
    gap_analysis: >
      Partial coverage: The taxonomy has ENVR.esg_gap and ENVR.climate_risk
      as structural exposure signals, but lacks dedicated ESG disclosure
      quality signals (e.g., ESG.DISC.consistency, ESG.DISC.third_party_audit).
      For Liberty's excess position, the general disclosure framework
      (NLP signals, risk factor analysis) provides adequate baseline coverage.
      Recommend v8.0+ ESG-specific signals if SEC climate disclosure rules
      drive significant claims volume.

  - id: "trigger_cyber_breach"
    name: "Cyber Breach / Data Privacy"
    scac_category: "Rule 10b-5 / Caremark"
    trigger: "Data breach, ransomware, privacy violation creates D&O exposure"
    host_factors:
      subcategories: ["host.environment_exposure", "host.structure"]
      explanation: >
        Cyber risk exposure and data-intensive business model are structural
        attributes. Companies handling PII, payment data, or healthcare
        data have inherently higher cyber D&O exposure.
      example_signals: ["BIZ.UNI.cyber_posture", "BIZ.UNI.cyber_business", "ENVR.data_privacy"]
    agent_factors:
      subcategories: ["agent.litigation_actions", "agent.governance_events"]
      explanation: >
        Cyber breach triggers are classified as Agent because claims allege
        inadequate board oversight of cyber risk (Caremark theory) and
        failure to disclose known vulnerabilities. Material weakness in
        IT controls is a governance event.
      example_signals: ["LIT.OTHER.cyber_breach", "GOV.EFFECT.material_weakness", "NLP.RISK.new_risk_factors"]
    environment_factors:
      subcategories: ["environment.market_signals", "environment.external_warnings"]
      explanation: >
        Stock drop on breach disclosure creates standing. Regulatory
        actions (FTC, state AGs) provide external enforcement.
      example_signals: ["STOCK.PRICE.recent_drop_alert", "FWRD.WARN.blind_spot"]
    causal_chain: "cyber_to_sca"
    existing_peril: "EMERGING"
    allegation_theory: "D_GOVERNANCE"
    frequency: "growing"
    severity: "high"
    taxonomy_coverage: "full"

  - id: "trigger_ai_misrepresentation"
    name: "AI/Technology Misrepresentation"
    scac_category: "Rule 10b-5"
    trigger: "Overstated AI capabilities, AI washing, algorithmic bias liability"
    host_factors:
      subcategories: ["host.dependencies", "host.structure"]
      explanation: >
        Technology dependency and AI revenue concentration are structural
        attributes. Business model reliance on AI/ML creates exposure
        surface for AI-specific claims.
      example_signals: ["BIZ.DEPEND.tech_dep", "BIZ.MODEL.description"]
    agent_factors:
      subcategories: ["agent.disclosure_conduct", "agent.corporate_events"]
      explanation: >
        AI capability claims in earnings calls, investor presentations,
        and filings are disclosure conduct. Product launches claiming AI
        capabilities are corporate events. AI washing (overclaiming AI
        involvement) is the primary fraud basis.
      example_signals: ["BIZ.UNI.ai_claims", "FWRD.DISC.forward_looking", "NLP.MDA.tone_shift"]
    environment_factors:
      subcategories: ["environment.market_signals", "environment.external_warnings"]
      explanation: >
        AI hype cycles create valuation bubbles that amplify damages.
        Regulatory evolution around AI creates emerging compliance risks.
      example_signals: ["STOCK.VALUATION.pe_ratio", "FWRD.MACRO.ai_regulation", "FWRD.WARN.ai_revenue_concentration"]
    causal_chain: "ai_claims"
    existing_peril: "EMERGING"
    allegation_theory: "C_PRODUCT_OPS"
    frequency: "growing"
    severity: "variable"
    taxonomy_coverage: "partial"
    gap_analysis: >
      Partial coverage: BIZ.UNI.ai_claims exists as an Agent signal, and
      FWRD.WARN.ai_revenue_concentration captures dependency risk, but
      there are no dedicated signals for algorithmic bias exposure,
      AI governance maturity, or AI-specific regulatory compliance.
      For Liberty's excess position, the general disclosure and product/ops
      framework provides adequate coverage. Recommend v8.0+ AI-specific
      governance and compliance signals as regulatory landscape crystallizes.

  - id: "trigger_pandemic_ops"
    name: "Pandemic-Related Operational Claims"
    scac_category: "Rule 10b-5"
    trigger: "Inadequate pandemic response, misleading recovery claims, supply chain failure"
    host_factors:
      subcategories: ["host.dependencies", "host.environment_exposure"]
      explanation: >
        Supply chain dependencies, geographic concentration, and workforce
        dependencies are structural attributes that determine pandemic
        impact severity.
      example_signals: ["BIZ.DEPEND.distribution", "BIZ.DEPEND.labor", "ENVR.macro_sensitivity"]
    agent_factors:
      subcategories: ["agent.disclosure_conduct", "agent.corporate_events"]
      explanation: >
        Management's disclosure of pandemic impact, recovery projections,
        and operational status are Agent conduct. Premature recovery
        guidance that misses creates fraud basis.
      example_signals: ["FIN.GUIDE.track_record", "NLP.RISK.new_risk_factors", "FWRD.DISC.forward_looking"]
    environment_factors:
      subcategories: ["environment.external_warnings", "environment.market_signals"]
      explanation: >
        Pandemic conditions are quintessential Environment factors. Macro
        disruption, supply chain stress, and sector-wide impacts provide
        external context.
      example_signals: ["FWRD.MACRO.supply_chain", "FWRD.MACRO.economic_conditions", "STOCK.PRICE.recent_drop_alert"]
    causal_chain: "stock_drop_to_sca"
    existing_peril: "SECURITIES"
    allegation_theory: "C_PRODUCT_OPS"
    frequency: "declining"
    severity: "moderate"
    taxonomy_coverage: "full"

  # ============================================================================
  # DERIVATIVE AND OTHER D&O CLAIMS
  # ============================================================================

  - id: "derivative_caremark"
    name: "Caremark Duty of Oversight"
    scac_category: "Derivative / Breach of Fiduciary Duty"
    trigger: "Board failure to monitor compliance, resulting in corporate trauma"
    host_factors:
      subcategories: ["host.governance_structure", "host.environment_exposure"]
      explanation: >
        Board structure (independence, committee composition, expertise)
        determines baseline oversight capability. Regulatory intensity
        determines oversight obligations -- highly regulated companies
        face higher Caremark exposure.
      example_signals: ["GOV.BOARD.independence", "GOV.BOARD.committees", "GOV.BOARD.expertise", "ENVR.reg_intensity"]
    agent_factors:
      subcategories: ["agent.governance_events", "agent.litigation_actions"]
      explanation: >
        Material weakness findings, late filings, and auditor changes
        are governance events that evidence oversight failure. Active
        litigation (SEC investigation, product liability) provides the
        "corporate trauma" trigger for Caremark claims.
      example_signals: ["GOV.EFFECT.material_weakness", "GOV.EFFECT.late_filing", "LIT.REG.sec_investigation"]
    environment_factors:
      subcategories: ["environment.peer_context", "environment.external_warnings"]
      explanation: >
        Peer compliance failures create "red flags" that the board should
        have been monitoring. External warnings (whistleblowers, news
        reports) that the board allegedly ignored.
      example_signals: ["LIT.SECTOR.litigation_wave", "NLP.WHISTLE.language_detected", "FWRD.WARN.blind_spot"]
    causal_chain: "governance_to_derivative"
    existing_peril: "FIDUCIARY"
    allegation_theory: "D_GOVERNANCE"
    frequency: "growing"
    severity: "variable"
    taxonomy_coverage: "full"
    notes: >
      Post-Marchand v. Barnhill (2019), Caremark claims have dramatically
      increased in frequency. The H/A/E framework captures this well:
      Host (governance structure), Agent (oversight failures/events),
      Environment (red flags board should have seen).

  - id: "derivative_corporate_waste"
    name: "Corporate Waste"
    scac_category: "Derivative"
    trigger: "Excessive compensation, irrational transactions, or asset destruction"
    host_factors:
      subcategories: ["host.governance_structure"]
      explanation: >
        Governance structure (board independence, compensation committee
        composition) determines susceptibility to waste claims. Weak
        governance enables excessive spending.
      example_signals: ["GOV.BOARD.independence", "GOV.BOARD.committees", "GOV.BOARD.tenure"]
    agent_factors:
      subcategories: ["agent.compensation_decisions", "agent.corporate_events"]
      explanation: >
        Compensation design (excessive packages, golden parachutes, perks)
        and irrational corporate transactions are Agent decisions that
        form the basis of waste claims.
      example_signals: ["GOV.PAY.quantum", "GOV.PAY.say_on_pay", "GOV.PAY.perks", "BIZ.STRUCT.related_party"]
    environment_factors:
      subcategories: ["environment.ownership", "environment.peer_context"]
      explanation: >
        Activist investors and proxy advisors drive waste claims. Peer
        compensation comparisons establish what is "excessive."
      example_signals: ["GOV.ACTIVIST.13d_filings", "GOV.EFFECT.proxy_advisory"]
    causal_chain: "governance_to_derivative"
    existing_peril: "FIDUCIARY"
    allegation_theory: "D_GOVERNANCE"
    frequency: "moderate"
    severity: "low"
    taxonomy_coverage: "full"

  - id: "derivative_self_dealing"
    name: "Self-Dealing / Conflict of Interest"
    scac_category: "Derivative"
    trigger: "Directors or officers engage in transactions benefiting themselves at company expense"
    host_factors:
      subcategories: ["host.governance_structure", "host.structure"]
      explanation: >
        Related party transaction framework and governance controls
        determine self-dealing exposure. Companies with controlling
        shareholders face higher self-dealing risk.
      example_signals: ["GOV.BOARD.independence", "BIZ.STRUCT.related_party", "STOCK.OWN.concentration"]
    agent_factors:
      subcategories: ["agent.compensation_decisions", "agent.executive_conduct"]
      explanation: >
        Self-dealing transactions are quintessential Agent conduct.
        Related party transactions, excessive compensation, and personal
        use of corporate assets are the direct claim triggers.
      example_signals: ["BIZ.STRUCT.related_party", "GOV.PAY.perks", "GOV.PAY.quantum"]
    environment_factors:
      subcategories: ["environment.ownership"]
      explanation: >
        Ownership concentration (controlling shareholders) creates
        self-dealing dynamics. Institutional investors may bring
        derivative suits to challenge conflicted transactions.
      example_signals: ["STOCK.OWN.concentration", "STOCK.OWN.structure"]
    causal_chain: "governance_to_derivative"
    existing_peril: "FIDUCIARY"
    allegation_theory: "D_GOVERNANCE"
    frequency: "moderate"
    severity: "moderate"
    taxonomy_coverage: "full"

  - id: "derivative_books_records"
    name: "Books and Records Demands (Section 220)"
    scac_category: "Books & Records / 220 Action"
    trigger: "Shareholder demands inspection of corporate books under DGCL Section 220"
    host_factors:
      subcategories: ["host.governance_structure"]
      explanation: >
        Governance transparency and information disclosure practices
        determine likelihood of 220 demands. Less transparent companies
        face more demands.
      example_signals: ["GOV.BOARD.independence", "GOV.EFFECT.sox_404"]
    agent_factors:
      subcategories: ["agent.governance_events", "agent.litigation_actions"]
      explanation: >
        220 demands are typically precursors to derivative suits.
        They are triggered by specific governance events (departures,
        investigations) that create suspicion of wrongdoing.
      example_signals: ["GOV.EXEC.departure_context", "LIT.REG.sec_investigation", "GOV.EFFECT.material_weakness"]
    environment_factors:
      subcategories: ["environment.ownership"]
      explanation: >
        Shareholder composition determines who brings 220 demands.
        Activist investors frequently use 220 as litigation preparation.
      example_signals: ["STOCK.OWN.institutional", "GOV.ACTIVIST.13d_filings"]
    causal_chain: "governance_to_derivative"
    existing_peril: "FIDUCIARY"
    allegation_theory: "D_GOVERNANCE"
    frequency: "moderate"
    severity: "low"
    taxonomy_coverage: "full"
    notes: >
      220 actions are precursors, not standalone claims. High frequency
      as litigation preparation tool. Coverage is adequate through
      general governance framework.

  - id: "erisa_fiduciary"
    name: "ERISA Breach of Fiduciary Duty"
    scac_category: "ERISA"
    trigger: "Fiduciary breach in employee benefit plan administration (stock-drop cases)"
    host_factors:
      subcategories: ["host.dependencies", "host.financials"]
      explanation: >
        Employee count and benefit plan size determine ERISA exposure.
        Companies with large 401(k) plans holding company stock have
        structural ERISA risk.
      example_signals: ["BIZ.SIZE.employees", "BIZ.DEPEND.labor"]
    agent_factors:
      subcategories: ["agent.financial_conduct", "agent.governance_events"]
      explanation: >
        Plan fiduciary decisions about company stock in 401(k) plans
        are Agent conduct. Failure to divest company stock despite
        knowledge of undisclosed problems is the claim basis.
      example_signals: ["FIN.ACCT.restatement", "GOV.EFFECT.material_weakness"]
    environment_factors:
      subcategories: ["environment.market_signals"]
      explanation: >
        Stock drop while company stock is in employee plans creates
        ERISA damages. Market conditions affect plan losses.
      example_signals: ["STOCK.PRICE.recent_drop_alert", "STOCK.PRICE.position"]
    causal_chain: null
    existing_peril: "EMPLOYMENT"
    allegation_theory: "D_GOVERNANCE"
    frequency: "moderate"
    severity: "moderate"
    taxonomy_coverage: "full"
    notes: >
      ERISA stock-drop cases typically piggyback on securities fraud
      claims. Coverage follows from underlying fraud claim coverage.

  - id: "merger_objection"
    name: "Merger Objection (Duty of Care/Loyalty in M&A)"
    scac_category: "Merger Objection / Fiduciary"
    trigger: "Shareholders challenge merger terms, process, or disclosures"
    host_factors:
      subcategories: ["host.governance_structure", "host.financials"]
      explanation: >
        Board structure and independence affect duty of care analysis.
        Financial position affects whether Revlon duties are triggered
        (sale of control vs strategic transaction).
      example_signals: ["GOV.BOARD.independence", "GOV.BOARD.committees", "FIN.DEBT.structure"]
    agent_factors:
      subcategories: ["agent.corporate_events", "agent.compensation_decisions"]
      explanation: >
        M&A transaction is an Agent decision. Deal protections, management
        buyout terms, go-shop provisions, and change-of-control payments
        are compensation/event decisions subject to fiduciary scrutiny.
      example_signals: ["FWRD.EVENT.ma_closing", "GOV.PAY.quantum", "BIZ.STRUCT.related_party"]
    environment_factors:
      subcategories: ["environment.ownership", "environment.market_signals"]
      explanation: >
        Shareholder composition determines who objects. Market valuation
        provides benchmark for deal price adequacy. Competing offers
        affect duty analysis.
      example_signals: ["STOCK.OWN.institutional", "STOCK.VALUATION.pe_ratio", "GOV.ACTIVIST.13d_filings"]
    causal_chain: "ma_to_claims"
    existing_peril: "FIDUCIARY"
    allegation_theory: "E_MA"
    frequency: "very_common"
    severity: "low"
    taxonomy_coverage: "full"
    notes: >
      ~85% of public M&A transactions face merger objection suits.
      Most are nuisance value. H/A/E framework covers this well because
      the claim requires: Host (governance structure for duty analysis),
      Agent (deal decision), Environment (market price benchmark).

  - id: "whistleblower_retaliation"
    name: "Whistleblower Retaliation"
    scac_category: "Employment / SOX / Dodd-Frank"
    trigger: "Employee alleges retaliation for reporting misconduct"
    host_factors:
      subcategories: ["host.dependencies", "host.governance_structure"]
      explanation: >
        Workforce size and labor dependencies determine retaliation
        exposure. Compliance program structure (hotline, investigation
        process) affects claim viability.
      example_signals: ["BIZ.SIZE.employees", "BIZ.DEPEND.labor", "GOV.EFFECT.sox_404"]
    agent_factors:
      subcategories: ["agent.governance_events", "agent.executive_conduct"]
      explanation: >
        Retaliation (termination, demotion, assignment changes) is Agent
        conduct. Whistleblower language in filings and internal
        investigation disclosures signal active whistleblower situations.
      example_signals: ["NLP.WHISTLE.language_detected", "NLP.WHISTLE.internal_investigation", "GOV.EXEC.departure_context"]
    environment_factors:
      subcategories: ["environment.external_warnings"]
      explanation: >
        Glassdoor sentiment, employee review trends, and news coverage
        of workplace issues provide external warning signals.
      example_signals: ["FWRD.WARN.blind_spot", "FWRD.WARN.glassdoor_sentiment"]
    causal_chain: "whistleblower_to_claims"
    existing_peril: "EMPLOYMENT"
    allegation_theory: "D_GOVERNANCE"
    frequency: "moderate"
    severity: "moderate"
    taxonomy_coverage: "full"

  - id: "employment_class_action"
    name: "Employment Class Action (D&O-Covered)"
    scac_category: "Employment"
    trigger: "Discrimination, wage/hour, or workplace safety class actions reaching D&O level"
    host_factors:
      subcategories: ["host.dependencies", "host.identity"]
      explanation: >
        Employee count, geographic spread, and industry sector determine
        employment litigation exposure. Labor-intensive businesses face
        higher exposure.
      example_signals: ["BIZ.SIZE.employees", "BIZ.DEPEND.labor", "BIZ.CLASS.primary"]
    agent_factors:
      subcategories: ["agent.governance_events", "agent.executive_conduct"]
      explanation: >
        Board oversight of employment practices (or lack thereof) is
        the Agent conduct in D&O-covered employment claims. Executive
        conduct may directly cause claims (hostile work environment,
        discriminatory decisions).
      example_signals: ["GOV.EXEC.character_conduct", "GOV.BOARD.diversity", "GOV.EFFECT.material_weakness"]
    environment_factors:
      subcategories: ["environment.external_warnings", "environment.peer_context"]
      explanation: >
        Employee sentiment trends, Glassdoor reviews, and industry
        employment litigation patterns provide external context.
      example_signals: ["FWRD.WARN.glassdoor_sentiment", "LIT.SECTOR.litigation_wave"]
    causal_chain: "whistleblower_to_claims"
    existing_peril: "EMPLOYMENT"
    allegation_theory: "D_GOVERNANCE"
    frequency: "moderate"
    severity: "moderate"
    taxonomy_coverage: "full"

  - id: "bankruptcy_claims"
    name: "Bankruptcy-Related Claims (Zone of Insolvency, Deepening Insolvency)"
    scac_category: "Bankruptcy / Insolvency"
    trigger: "Company enters zone of insolvency, fiduciary duties shift to creditors"
    host_factors:
      subcategories: ["host.financials"]
      explanation: >
        Financial position is the primary Host factor. Leverage, liquidity,
        debt maturity, covenant compliance, and cash burn rate determine
        proximity to insolvency.
      example_signals: ["FIN.LIQ.cash_burn", "FIN.LIQ.position", "FIN.DEBT.coverage", "FIN.DEBT.maturity"]
    agent_factors:
      subcategories: ["agent.financial_conduct", "agent.corporate_events", "agent.governance_events"]
      explanation: >
        Deepening insolvency claims allege management took actions that
        worsened the company's financial position (incurring debt, making
        distributions, hiding losses). Late filing, auditor changes, and
        going concern qualification delays are governance events.
      example_signals: ["FIN.TEMPORAL.cash_flow_deterioration", "FWRD.WARN.zone_of_insolvency", "GOV.EFFECT.late_filing"]
    environment_factors:
      subcategories: ["environment.market_signals", "environment.market_patterns"]
      explanation: >
        Stock delisting risk and death spiral patterns indicate market
        recognition of insolvency trajectory. Credit market conditions
        affect refinancing ability.
      example_signals: ["STOCK.PRICE.delisting_risk", "STOCK.PATTERN.death_spiral", "FIN.DEBT.credit_rating"]
    causal_chain: "distress_to_bankruptcy"
    existing_peril: "FINANCIAL_DISTRESS"
    allegation_theory: "A_DISCLOSURE"
    frequency: "event_driven"
    severity: "catastrophic"
    taxonomy_coverage: "full"

  - id: "antitrust_do"
    name: "Antitrust / Competition D&O Claims"
    scac_category: "Antitrust / Competition"
    trigger: "Antitrust investigation or private treble-damage action creates D&O exposure"
    host_factors:
      subcategories: ["host.dependencies", "host.identity"]
      explanation: >
        Market position and competitive landscape determine antitrust
        exposure. Dominant market share companies face structural
        antitrust risk.
      example_signals: ["BIZ.COMP.market_position", "BIZ.COMP.market_share", "BIZ.COMP.competitive_advantage"]
    agent_factors:
      subcategories: ["agent.litigation_actions"]
      explanation: >
        Antitrust violations (price fixing, market allocation, predatory
        pricing) are Agent conduct. FTC/DOJ investigations represent
        enforcement of alleged anticompetitive behavior.
      example_signals: ["LIT.OTHER.antitrust", "LIT.REG.ftc_investigation"]
    environment_factors:
      subcategories: ["environment.peer_context", "environment.external_warnings"]
      explanation: >
        Industry consolidation patterns and competitor litigation
        provide context. Regulatory enforcement priorities shift
        across administrations.
      example_signals: ["BIZ.COMP.consolidation", "FWRD.MACRO.regulatory_changes"]
    causal_chain: "antitrust_claims"
    existing_peril: "COMMERCIAL"
    allegation_theory: "C_PRODUCT_OPS"
    frequency: "stable"
    severity: "high"
    taxonomy_coverage: "full"

  - id: "scienter_fraud"
    name: "Scienter-Based Fraud (Intentional/Reckless)"
    scac_category: "Rule 10b-5 (Scienter)"
    trigger: "Plaintiff establishes strong inference of intentional or reckless fraud"
    host_factors:
      subcategories: ["host.governance_structure"]
      explanation: >
        Governance structure determines whether organizational knowledge
        can be imputed to directors/officers. Weak internal controls
        support recklessness inference.
      example_signals: ["GOV.EFFECT.sox_404", "GOV.BOARD.independence", "GOV.EFFECT.audit_committee"]
    agent_factors:
      subcategories: ["agent.executive_conduct", "agent.financial_conduct", "agent.disclosure_conduct"]
      explanation: >
        Scienter is proven through Agent conduct: insider trading timing
        (strongest indicator), earnings management patterns, disclosure
        changes that show management awareness. Multiple Agent signals
        converging create strong scienter inference.
      example_signals: ["GOV.INSIDER.cluster_sales", "GOV.INSIDER.unusual_timing", "FIN.FORENSIC.fis_composite", "NLP.MDA.tone_shift"]
    environment_factors:
      subcategories: ["environment.market_signals"]
      explanation: >
        Stock drop magnitude affects plaintiff incentive and PSLRA
        lead plaintiff competition. Market conditions affect whether
        loss is attributable to fraud or market forces.
      example_signals: ["STOCK.PRICE.recent_drop_alert", "STOCK.PRICE.returns_multi_horizon"]
    causal_chain: "stock_drop_to_sca"
    existing_peril: "SECURITIES"
    allegation_theory: "A_DISCLOSURE"
    frequency: "common"
    severity: "high"
    taxonomy_coverage: "full"
    notes: >
      Scienter is not a separate claim type but a required element of
      10b-5 claims. The H/A/E framework is particularly strong here:
      Agent signals (insider trading, forensics, disclosure) directly
      map to scienter evidence.

  - id: "non_scienter_strict"
    name: "Non-Scienter Strict Liability (Section 11)"
    scac_category: "Section 11 (Strict Liability)"
    trigger: "Material misstatement in registration statement, no intent required"
    host_factors:
      subcategories: ["host.identity", "host.financials"]
      explanation: >
        Offering-eligible companies (recent IPO/SPO) have structural
        Section 11 exposure. Financial position at time of offering
        determines scope of potential misstatements.
      example_signals: ["BIZ.SIZE.public_tenure", "FIN.PROFIT.margins", "FIN.DEBT.structure"]
    agent_factors:
      subcategories: ["agent.corporate_events", "agent.disclosure_conduct"]
      explanation: >
        Registration statement content is Agent disclosure. Due diligence
        defense requires showing reasonable investigation -- Agent conduct.
        No scienter means Agent financial forensics are less relevant,
        but disclosure quality still matters.
      example_signals: ["BIZ.EVENT.ipo_date", "FWRD.EVENT.lockup_expiry", "FIN.GUIDE.track_record"]
    environment_factors:
      subcategories: ["environment.market_signals"]
      explanation: >
        Stock decline below offering price creates standing (traceable
        to registration statement). Market conditions at time of
        offering affect damages calculation.
      example_signals: ["STOCK.PRICE.recent_drop_alert", "STOCK.PRICE.position"]
    causal_chain: "ipo_to_section11"
    existing_peril: "SECURITIES"
    allegation_theory: "A_DISCLOSURE"
    frequency: "moderate"
    severity: "high"
    taxonomy_coverage: "full"

