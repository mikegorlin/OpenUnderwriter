    impact_for_liberty: "low"
    rationale: >
      Supply chain D&O claims (board oversight of supply chain risk)
      are captured through general Caremark framework and BIZ.DEPEND
      signals. Dedicated supply chain signals would improve specificity
      but are not a critical gap for Liberty's excess position.
    recommendation: "v9.0+ consideration"
    priority: "low"

