# ==============================================================================
# CROSS-VALIDATION: ALLEGATION THEORIES
# ==============================================================================
# Verify 5 allegation theories align with H/A/E subcategories.

allegation_theory_validation:
  - theory: "A_DISCLOSURE"
    description: "Securities fraud based on material misrepresentation or omission"
    factor_mapping: ["F1", "F3", "F5"]
    h_a_e_alignment:
      primary_host: ["host.financials", "host.identity", "host.structure"]
      primary_agent: ["agent.financial_conduct", "agent.disclosure_conduct", "agent.executive_conduct"]
      primary_environment: ["environment.market_signals"]
    rationale: >
      A_DISCLOSURE is the broadest theory and touches all three H/A/E
      dimensions. Host factors determine exposure surface area, Agent
      conduct provides the fraud basis, and Environment market signals
      create standing through stock decline. The theory maps cleanly:
      F1 (litigation/regulatory) = Agent litigation_actions,
      F3 (financial anomalies) = Agent financial_conduct,
      F5 (operational risk) = Host structure + Agent disclosure_conduct.

  - theory: "B_GUIDANCE"
    description: "Securities fraud based on guidance misses and forward-looking statements"
    factor_mapping: ["F2", "F5"]
    h_a_e_alignment:
      primary_host: ["host.dependencies"]
      primary_agent: ["agent.disclosure_conduct", "agent.executive_conduct"]
      primary_environment: ["environment.market_signals", "environment.external_warnings"]
    rationale: >
      B_GUIDANCE is Agent-dominant -- guidance issuance and management
      of expectations are quintessential Agent disclosure conduct.
      F2 (stock/market factors) maps to Environment market_signals.
      F5 (operational risk) maps to Host dependencies (what creates
      the guidance risk -- revenue concentration, customer dependency).
      Clean alignment: the company's structural vulnerabilities (Host)
      make aggressive guidance (Agent) risky in certain market
      conditions (Environment).

  - theory: "C_PRODUCT_OPS"
    description: "Claims arising from product failures, operational issues, or regulatory non-compliance"
    factor_mapping: ["F7", "F8"]
    h_a_e_alignment:
      primary_host: ["host.dependencies", "host.environment_exposure", "host.structure"]
      primary_agent: ["agent.litigation_actions", "agent.corporate_events"]
      primary_environment: ["environment.peer_context", "environment.external_warnings"]
    rationale: >
      C_PRODUCT_OPS has strong Host component -- business model, regulatory
      dependencies, and product concentration are structural attributes.
      F7 (operational complexity) maps to Host structure and dependencies.
      F8 (financial distress) connects to Host financials when product
      failure creates existential risk. Agent conduct (product decisions,
      safety oversight) triggers claims. Environment (regulatory actions,
      peer failures) amplifies.

  - theory: "D_GOVERNANCE"
    description: "Derivative suits, fiduciary breach, and governance failure claims"
    factor_mapping: ["F9", "F10"]
    h_a_e_alignment:
      primary_host: ["host.governance_structure"]
      primary_agent: ["agent.governance_events", "agent.compensation_decisions", "agent.executive_conduct"]
      primary_environment: ["environment.ownership"]
    rationale: >
      D_GOVERNANCE splits cleanly between Host governance structure
      (board design, controls architecture) and Agent governance events
      (departures, findings, decisions). F9 (governance quality) maps
      primarily to Host governance_structure with Agent overlay from
      governance_events. F10 (external governance pressure) maps to
      Environment ownership (activists, proxy advisors). This is the
      theory with the cleanest Host-Agent separation.

  - theory: "E_MA"
    description: "M&A-related claims including merger objections and deal failure litigation"
    factor_mapping: ["F4"]
    h_a_e_alignment:
      primary_host: ["host.governance_structure", "host.financials"]
      primary_agent: ["agent.corporate_events", "agent.compensation_decisions"]
      primary_environment: ["environment.ownership", "environment.market_signals"]
    rationale: >
      E_MA is Agent-dominant -- M&A is a corporate event decision.
      F4 (M&A/event risk) maps directly to Agent corporate_events.
      Host governance_structure affects duty of care/loyalty analysis.
      Host financials determine deal financing and valuation metrics.
      Environment ownership (shareholder composition, activist pressure)
      determines who objects. Environment market_signals provide price
      benchmark for deal adequacy. Clean three-dimensional alignment.

# ==============================================================================
# COVERAGE GAP ANALYSIS
# ==============================================================================

coverage_gaps:

  - gap_id: "GAP_01"
    area: "Cryptocurrency/Blockchain-Specific Signals"
    affected_claim_types: ["trigger_crypto_blockchain"]
    current_coverage: "partial"
    missing_signals:
      - "No dedicated crypto regulatory compliance signal"
      - "No token offering classification signal (utility vs security)"
      - "No crypto custody risk signal"
    impact_for_liberty: "low"
    rationale: >
      Liberty's excess position means crypto claims would first exhaust
      primary and lower excess layers. General securities fraud framework
      (10b-5, Section 11) covers the legal theories. Crypto-specific
      signals would improve early detection but are not critical gaps.
    recommendation: "v8.0+ consideration if crypto D&O claims volume grows"
    priority: "low"

  - gap_id: "GAP_02"
    area: "ESG Disclosure Quality Signals"
    affected_claim_types: ["trigger_esg"]
    current_coverage: "partial"
    missing_signals:
      - "No ESG disclosure consistency signal (claims vs actual metrics)"
      - "No third-party ESG audit/verification signal"
      - "No SEC climate disclosure rule compliance signal"
      - "No Scope 1/2/3 emissions accuracy signal"
    impact_for_liberty: "moderate"
    rationale: >
      ESG/greenwashing claims are growing rapidly, especially as SEC
      climate disclosure rules take effect. Liberty's excess position
      provides some buffer, but ESG claims can reach catastrophic
      severity. The general disclosure framework covers basic ESG
      misrepresentation, but dedicated ESG quality signals would
      improve detection.
    recommendation: "v8.0 consideration -- add ESG.DISC signal family"
    priority: "moderate"

  - gap_id: "GAP_03"
    area: "AI Governance and Compliance Signals"
    affected_claim_types: ["trigger_ai_misrepresentation"]
    current_coverage: "partial"
    missing_signals:
      - "No algorithmic bias exposure signal"
      - "No AI governance maturity signal"
      - "No AI-specific regulatory compliance signal (EU AI Act, US exec orders)"
      - "No AI model risk management signal"
    impact_for_liberty: "moderate"
    rationale: >
      AI D&O claims are the fastest-growing category. BIZ.UNI.ai_claims
      captures active claims, and FWRD.WARN.ai_revenue_concentration
      captures dependency, but governance maturity around AI deployment
      is not measured. As regulatory frameworks crystallize (EU AI Act),
      compliance signals will become critical.
    recommendation: "v8.0 priority -- add AI.GOV signal family"
    priority: "moderate"

  - gap_id: "GAP_04"
    area: "Supply Chain D&O Exposure"
